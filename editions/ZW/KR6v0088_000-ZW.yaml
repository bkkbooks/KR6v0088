body:
  text: 如來廣孝十種報恩道場儀南宋思覺集整理者趙文煥侯沖題解如來廣孝十種報恩道場儀本名孝順設供拔苦報恩道場儀又名如來廣孝十種報恩道場教誡儀文中國佛教典籍南宋四川綿竹大中祥符寺僧人思覺集八卷明清時期雲南阿吒力僧和應赴僧常用科儀本科儀由教誡儀文提綱密教四部分組成在現存阿吒力科儀中規模最大保存下來的本子也最多就內容來看乃引述宗密佛說盂蘭盆經疏慈覺孝行錄一般記載作孝友文或勸孝文和契嵩孝論並摘取經藏而成集中國古代佛教孝道著述之大成是研究中國佛教報恩行孝思想的重要資料宗賾慈覺孝行錄久佚本科儀引述其中部分內容從而為研究其思想保存了難得的資料本科儀引錄孝行錄和佛說報父母恩德經的部分文字亦見於大足寶頂山大佛灣石刻題記參見藏外佛教文獻第四輯第頁故本科儀亦是研究大足佛教勸孝石刻和佛說報父母恩德經的重要資料本科儀不見中外歷代佛書著錄亦未為歷代大藏經所收思覺在教誡中稱本朝慈覺禪師可知他與慈覺同為宋人文中又提到隆興丞相虞允文則本科儀之作不早於南宋孝宗隆興元年本科儀本名孝順設供拔苦報恩道場儀在建齋做道場時與大方便佛報恩經配合使用後被改名為如來廣孝十種報恩道場儀並從儀文上中析出紀讚從儀文中中析出庭際放生儀文作為可分別單獨行持法事的小科儀大方便佛報恩經亦不一定與科儀配合來行持法會從內容來看如來廣孝十種報恩道場儀除收錄孝順設供拔苦報恩道場儀大部分內容外還增加了部分新的章節故可以說是孝順設供拔苦報恩道場儀的擴充整理本以趙文煥藏如來廣孝十種報恩道場儀為底本標題從之校本為甲本楊建鴻先生藏靈泉寺清康熙貳拾捌年捌月抄孝順設供拔苦報恩道場儀文存卷上卷中乙本延光居士印加居士藏清嘉慶四年抄本孝順設供拔苦報恩道場儀文卷中卷下報恩道場提綱報恩道場密教及報恩道場紀讚丙本張龍光先生藏段宗培抄如來廣孝十種報恩道場儀文卷下舊抄本底本上有金襴寺常住記墨印乙本上有毗尼庵心曜記硃印整理過程中不再注明錄文
