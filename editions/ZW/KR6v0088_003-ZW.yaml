body:
  text: 武帝龍飛大業成尊臨天下不為榮浮雲富貴知如幻逝水光陰念所生願用髮膚酬至德甘為奴僕委鴻名我今為報為人子父母非輕四海輕奏樂炷香設禮舉香讚心燃五分普遍十方香嚴童子悟真常鼻觀實難量瑞靄祥光堪獻法中王南無香雲蓋菩薩三聲清淨慧菩薩摩訶薩又夫此水者浩浩長江之內滔滔苦海之間金風動而虎派龍牙法雨灑而銀堆雪浪或居於阿耨池畔或居於香象口中流時滴滴至曹溪灑時涓涓通覺海茲當紀讚十種報恩敬陳醮典猶恐人物往來身霑穢汙有干金相冒瀆聖聰故憑法水灌灑醮筵外塵勞悉令清淨解穢靈章雷音諷誦念咒醮筵內外悉清淨光明藏菩薩摩訶薩夫寶燭者光明燭性本然祖師心印在何邊明鏡在心心在外不離當念在目前一月普光一切水世尊拈起掌青蓮迦葉微微剖顏笑一燈傳世百燈傳桃花峰頂風聲靜夜冷寒窗色更鮮若人會得傳燈意便是如來第一禪檀那虔誠燃燭供養燭影輝煌銀漢落穹蒼紫霧盤施丹鳳儀仙掌慧焰初騰瑞氣衝宵漢鷲嶺分來燈燈無盡藏覺樹花開大地咸生春色法音遐震普天共仰玄提將造佛之階梯先由於初地報恩法會讚十種恩眾等虔誠稱揚寶號佛面猶如淨滿月亦如千日放光明圓光普照於十方喜捨慈悲皆具足南無大孝釋迦牟尼佛念大孝釋迦牟尼佛初更鼓打鼕鼕的太子身騎白馬便騰空念南無大孝釋迦佛雪山岩畔現法身五更太子去修行念南無釋迦牟尼佛喪則致其哀祭則致其嚴念南無大孝釋迦佛開宗明義三千口只因家和永不分念南無大孝釋迦佛孟宗哭竹冬生筍郭巨埋兒天錫金念南無大孝釋迦佛王祥臥冰雪壘腰黃香扇枕奉雙親念南無大孝釋迦佛丁蘭刻木為娘叫董永賣身殯葬父念南無大孝釋迦佛割股救婆劉媳婦曹俄殺子奉雙親念南無大孝釋迦佛羔羊跪乳報父母人不報恩為何因念南無大孝釋迦佛慈鴉返哺報父母行孝之人天眼開念南無大孝釋迦佛目連救母生天去至今孝道永傳名念南無大孝釋迦佛上報四重恩下濟三途苦念南無大孝釋迦佛苦左肩擔父右肩擔母恩難報父恩難報母念南無大孝釋迦佛苦十月懷胎苦推乾就濕母恩難報父母念南無大孝釋迦佛苦臨期生產苦恩難報母生身守父母念南無大孝釋迦佛恩難報父恩難報母念南無大孝釋迦佛眾等皈命禮南無大孝釋迦佛拈香南無香雲蓋菩薩願香雲繚遶夫此香者善根種就心地栽培清奇本自天然雕琢豈由人力蘭麝叢中推第一旃檀林裡選無雙焚時瑞氣靄金爐散作祥雲遶玉殿一縷寒煙纔起處十方諸佛悉遙聞薰成戒定慧香普供上中下座今於此際豈敢埋藏爇向爐中耑伸供養三身四智圓明十號之尊八藏五乘微妙一真之教悲增智增之菩薩有學無學之聖僧圭峰慈覺明教大師伏願六通洞鑒五眼迴施允我激切之誠克副懇禱之願更祈過現雙親存亡利樂光降醮筵受請供養南無大方便佛報恩經和大孝釋迦牟尼佛讚十種恩儀當演如來十種報深恩普勸諸人孝二親為人若不行孝道恐後難逢父母身法師指示朗宣洪文涅槃經云奇哉父母生育我等受大苦惱滿足十月懷抱我身既生之後推乾就濕除去不淨大小便利乳哺長養將護我身以是義故我當報恩隨順供養道經云天下人民皆因父母寄胎誕育而生此身受氣在胎其苦無量懷胎十月迅速不停受孕滿時支脈俱解其中非一因以喪身幼小嬰兒提攜養育洗浣穢濁不憚艱辛寧損己安欲兒安處詩云父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極三教本無異說二親俱有重恩父有生成之功則固比於天母有養育之勞則固比於地原其大要略舉十焉佛告阿難父母恩德有其十種何者為十所謂懷躭守護恩臨產受苦恩生子忘憂恩嚥苦吐甘恩回乾就濕恩乳哺養育恩洗濯不淨恩為造惡業恩遠行憶念恩究竟憐憫恩我今為報過現父母十種恩德各望志誠同為緣助皈依大孝釋迦佛四聲胡跪讚禮志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛兜率宮中降母胎胎中廓爾總兼該能容法界如來孕不礙塵沙佛子來傷嘆子縈三障業纏綿母受一年災願親無復懷躭苦永托蓮臺上品開我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶一歲孩兒抱在娘懷裏將乳共兒吃了昏昏睡抱在房中尋些生活計願兒成人報答娘恩意舉懷躭守護恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛摩耶樹下欲攀枝正值如來降誕時妙體瑩然生右脅慈親宛爾展雙眉子生迫窄牛遭剝母苦昏迷鬼欲持臨產片時恩力重願親早得證無為我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶兩歲孩兒漸漸立得地娘見兒行肚裏生歡喜口裏不吃吐與孩兒吃願兒成人來報娘恩意臨產受苦恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛悉達纔生目四方各行七步表殊常父因返拜情尤悅母得生天喜不忘懶顧自身春漸老笑觀兒子日偏長至公不宰真端的報德須依大法王我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶三歲孩兒閃在門外裏娘見兒行生得娘喜氣叉手教兒便來娘懷裏願兒成人報答娘恩意生子忘憂恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛往省歸寧笑不休養親法乳古無儔飽吞必到菩提岸爛嚼終乘般若舟為子吐甘滋舌本忍心嚥苦皺眉頭我今願托如來力隨侍親歸法性遊我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶四歲孩兒閃在門而外看見三寶合掌便禮願兒早早離了塵勞地龍華會上與娘親授記嚥苦吐甘恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛紫摩金身色可誇冰清玉潔了無瑕面如秋夜團團月足步紅蓮朵朵花就濕投身甘穢濁回乾任子臥橫斜願親迥出塵埃表無復情雲四面遮我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶五歲孩兒便知天和地送在學堂學些由山水到我靈山替娘蒙授記願兒成人報答娘恩意回乾就濕恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛歡喜園中興味濃母恩求報意偏工慈風乍扇恩波舉法雨纔施業火空血乳養兒甯起念齒牙嚼飯肯欺功雪山真味何曾失會得宜將日日供我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶六歲孩兒送在學堂裏細讀詩書學些文章義娘去送飯送與孩兒吃願兒成人報答娘恩意乳哺養育恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛太子初生道力餘九龍吐水浴金軀不須俗子頻揩拭端為眾生作範模頗恨形軀多垢穢徒勞父母幾勤劬泥蓮河畔垂千古效學如來得也無我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶七歲孩兒五更清早起不叫爺娘便去學堂裏娘在家中心裏生憂慮願兒成人報答娘恩意洗濯不淨恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛導化人天戒力強堅持世嗣即繁昌故拋禁苑為人子終證菩提號法王情愛有些纏子女冤讎無限惱爺娘如何截斷從前事不見金牛刃落霜我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶八歲孩兒才得漸成氣欲想劬勞恩深難得起二十四孝都在人心裏長大成人方知娘恩意為造惡業恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛故國天宮任往還喜將禪悅奉慈顏父王意地澄如水慈母情田靜若山有子已行千里遠勞親注想百年間勸君且學如來行莫似萊衣只戲斑我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶九歲孩兒纔得漸成氣郭巨埋兒他從孝心起王祥臥冰感動天和地孟宗哭竹現筍與娘吃遠行憶念恩難報志心皈命禮娑婆教主我等本師大孝釋迦牟尼佛父母俱拋亦自安淨居忉利去何難塵剎互遍曾無礙根境相含切好看老死路途雖隔絕髮膚情念沒遮欄人間甘旨難呈獻願侍雙親般涅槃我今稱讚願賜加威攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶十歲孩兒自有衝天志不學諸人空老一百歲孝順爺娘還生孝順子普勸諸人報答娘恩意究竟憐憫恩難報現在父母恩難報過去父母恩難報志心皈命禮恩父慈母天下悲傷懷胎十月受艱辛每日昏沈如重病臨期生產命在須臾是男是女母心慌乳哺三年娘辛苦推乾就濕恩受嬌兒伏能長大成人先要婚姻完備殺生害命造惡無邊男女對對團圓母親無常來到喉中氣斷眼下分離三魂杳杳往陰司七魄幽幽歸地府閻羅判問作何善因當時口內無回言兩眼雙雙流淚獄官判問聽說原由你在世上為人多造罪愆深重生男養女血污地祗江邊洗濯衣裳不淨穢污水府陰司按內惡薄分明如今取到陰司只得將身受苦獄官分付馬面牛頭等時打上鐵床重重腳縛扚拷油鐺火熬煎煮炮燒將身勒上刀山又使牛耕鋸解愁雲暗暗黑霧漫漫親男親女在何方恩愛夫妻不見面啼聲大哭日夜悽惶早知有此業因緣何不生前求懺悔如今方省儘是虛沒奉勸世上為人早早回心向善早朝念佛暮禮如來百年命盡了無常不怕陰司並地府南無大悲大願大聖大慈報恩德菩薩摩訶薩伏願不違本誓憐愍有情攝受報恩人同行出世孝誦報恩德真言曰唵引阿陀那僧娑婆訶志心皈命禮靈山會上釋迦尊報答爺娘養育恩養我一身無報答發心齋戒禮血盆在堂父母增延壽過去父母早超昇我今禮拜佛如來願我雙親離苦難南無大悲大願大聖大慈我等本師大孝釋迦牟尼佛南無三界師四生父釋迦如來兜率來儀相南無三界師四生父釋迦如來王宮托化相南無三界師四生父釋迦如來子夜出城相南無三界師四生父釋迦如來泥蓮沐浴相南無三界師四生父釋迦如來雪山修道相南無三界師四生父釋迦如來樹下降魔相南無三界師四生父釋迦如來靈山說法相南無三界師四生父釋迦如來雙林入滅相佛說威靈降寶臺眾生有難挂心懷觀音菩薩灑淨水靈山請出世尊來南無讚如來第一號毗那園內摩耶到無憂樹下降金身累劫修行成佛道南無讚如來第二號九龍吐水霞光照地湧金蓮捧世尊累劫修行成佛道南無讚如來第三號四門遊翫觀生老回頭看時不久常累劫修行成佛道南無讚如來第四號棄捨皇宮去修道夜至三更天神報累劫修行成佛道南無讚如來第五號天王乘馬雲中報城南留下馬蹄蹤累劫修行成佛道南無讚如來第六號不戀皇宮去修道信香一炷付耶輸累劫修行成佛道南無讚如來第七號雀巢冠頂三層遶蘆芽穿膝不曾移累劫修行成佛道南無讚如來第八號盤陀石上談經教泥蓮河內浴金身累劫修行成佛道南無讚如來第九號梵王太子親身到耶輸宮主離火坑累劫修行成佛道南無讚如來第十號夫人踏往靈山告世尊一指化紅蓮累劫修行成佛道南無讚如來十一號時時演說三乘教度盡眾生佛會來累劫修行成佛道南無讚如來十二號泥蓮沐浴清波沼洗滌塵勞溫湯澡累劫修行成佛道南無讚如來圓滿號天宮裏面多快樂仙童玉女捧香華累劫修行成佛道願共諸眾生一心頭面禮大孝釋迦佛長空象駕日輪紅命生迦羅淨梵宮富落雪山修萬行貴榮鹿苑闡宗風金光照處天人集玉輦行時釋梵宗滿月慈容黃金相堂堂具足法王雄身色如金山端嚴甚微妙如淨琉璃中內現真金相世尊功德難盡讚揚紀讚疏章法師宣讀稱念真如湛寂體圓明念南無大孝釋迦佛稱念南無大孝釋迦牟尼佛昔日我佛梵王太子在摩耶腹中顯神通七步現天宮念南無大孝釋迦佛稱念南無大孝釋迦牟尼佛我佛降誕生時外壇化奏稱念南無大孝釋迦牟尼佛遙望光臨道場宣引駕祥雲菩薩釋迦示六年之苦行道果圓成破六欲之天魔神光閃爍菩薩齊修於六度為眷屬之莊嚴聲聞皆證於六通作前後之圍遶授記則六合乾坤震動說法則六時花雨繽紛妙德難思恩光普被今當紀讚上聖答報親恩虔具疏文一函上詣總相門中呈進躬伸禮請報恩會上諸佛菩薩紀讚壇中無邊賢聖法報化身釋迦文佛十方剎海諸大菩薩聲聞羅漢護法善神造著孝論三大祖師普座下禮請光臨道場證盟修奉伏惟使者抱持情涃參叩蓮臺瞻望聖顏雲臨法會檀那捧杯奠茶餞送遙望慈悲光臨法場凡情上達大圓鏡又加持獻花寶座淨金輪座至報恩德真言妙寶蓮花清淨座法空空寂妙難思空中妙有普莊嚴此是如來法空座唵引伽摩羅耶娑婆訶莊嚴清淨金剛座我佛跏趺轉法輪一千諸佛證菩提次第現身登寶座唵引紹知伽陀虎𤙣畔武帝至尊仁孝念甘為奴僕報劬勞著儀動地雨天花父母非輕四海輕唵引阿陀那僧娑婆訶信禮報恩德菩薩奏樂炷香陳供醮儀獻於諸聖位前讚供養偈我今奉獻甘露食量等須彌無過上色香美味遍十方合會聖賢哀納受普伸供養真言曰唵誐誐南三婆嚩嚩嚩嚩奠茶化錢謝恩四叩首畢奏樂詣於十種報恩位前炷香設禮陳獻醮儀一報天地蓋載恩二報日月照臨恩三報國王水土恩四報父母養育恩現在雙親增福壽過去父母早超昇普伸供養真言曰唵阿陀那僧娑婆訶報恩德菩薩摩訶薩謝恩設禮十二叩首大眾遶壇吟偈回向長把一心禮佛天命延鞏固自悠然富因廣積來生福貴為深根宿世緣金磬聲中吟風韻玉龍頂上裊龍涎滿門俱是俊才子堂上恭欽二老仙如來廣孝十種報恩提綱密教儀文節次合集終附十種報恩讚大孝釋迦出廣長舌相演說真經普勸人歸向父母劬勞廣說無邊量十種深恩次第依經唱懷躭守護父母恩難報身重如山困悶多憂惱飲食無味唇口常乾燥起臥昏沈夜夢多顛倒一謝懷躭守護恩大孝釋迦牟尼佛臨產受苦父母恩難報破腹開腸苦痛多憂惱血流遍地忙把神來告保護娘身子母團圓好二謝臨產受苦恩大孝釋迦牟尼佛生子忘憂父母恩難報喘氣微微忙把孩兒抱是男是女只是親生好愛惜嬌兒恰似牟尼寶三謝生子忘憂恩大孝釋迦牟尼佛嚥苦吐甘父母恩難報美味甘甜只要孩兒飽神袖懷揣不避人嫌臊養大成人要侍雙親老四謝嚥苦吐甘恩大孝釋迦牟尼佛回乾就濕父母恩難報乾處兒眠濕處娘身倒生怕哭啼常把孩兒抱屎尿交流從不瞋煩惱五謝推乾就濕恩大孝釋迦牟尼佛乳哺養育父母恩難報兩乳開懷只願孩兒飽八斛四鬥斗佛口分明交拶碎娘身恰似枯竹槁六謝乳哺養育恩大孝釋迦牟尼佛洗濯不淨父母恩難報生遇冬天溫水將兒澡垢穢腥膻洗時無煩惱此等恩情長大將何報七謝洗濯不淨恩大孝釋迦牟尼佛遠行憶念父母恩難報買賣經商父母多年少母在家中倚定門上靠腸斷目暝只等孩來到八謝遠行憶念恩大孝釋迦牟尼佛為造惡業父母恩難報養女生男只要聰明好莫起讎嫌父母生煩惱孝順爺娘萬代享安樂九謝為造惡業恩大孝釋迦牟尼佛究竟憐憫父母恩難報受戒持齋皈依如來教願我雙親離苦生天道不墮輪迴流傳萬世孝十謝究竟憐憫恩大孝釋迦牟尼佛斗轉星移在碧霄香煙寥落白雲飄如來暫宿那伽定明日精虔再叩朝
