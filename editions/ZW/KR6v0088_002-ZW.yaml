body:
  text: 第一時陞座加持四十二字母真言歌讚南無大方便佛報恩經和大孝釋迦牟尼佛豎宗立教儀宣演和經題比丘某等伏聞明教大師云養不足以報父母而聖人以德報之德不足以達父母而聖人以道達之道也者非世之所謂道也妙神明出生死聖人之至道者也德也者非世之所謂德也備萬物被幽明聖人之至德者也且君子之所謂孝者先意承志諭父母於道非真養者也夫天下之報恩者吾聖人可謂至報恩者也天下之為孝者吾聖人可謂純孝者也吾從聖人之後而其德不修其道不明吾徒負父母而愧乎聖人者也故知善天下道為大顯其親德為優告則不得其道德不告則得道而成德所以聖人輒遁於山林逮其以道而返德被乎上下天下稱之曰有子若此尊其父母曰大聖人之父母聖人可謂略始而圖終善行權也古之君子有所為而如此者吳太伯其人也必大志可以彰大用必大潔可以持大正聖人推勝德於人天顯至正於凡嚮故聖人之法不願乎世嗣古之君子有所為而如此者伯夷叔齊其人也道固尊於人故道雖在子而父母可以拜之冠義近之矣禮曰以冠而字之成人之道也見於母母拜之俗固本於真而其真已修則雖僧可以與王侯抗禮也而武事近之矣禮曰介者不拜為其拜而蓌拜也不拜重節也母拜重禮也禮節先王猶重大道焉可不重乎俗曰聖人無父固哉小人之好毀也彼眸盲然而豈見聖人為孝之深渺哉然天下以儒為孝而不以佛為孝者是見儒而未見佛也佛也極焉以儒守之以佛廣之以儒人之以佛神之孝其至且大矣水固趨下也洫而決之其所至不亦速乎火固炎上也噓而鼓之其所舉不亦遠乎故聖人之為道也無所不善聖人之善也未始遺親親也者形生之大本也人道之大恩也惟大聖人能重其大本也能報其大恩也今天下之為道者孰與於聖人也聖人之道大臻巍巍乎獨尊於天下不可得而生不可得而滅也及其應物尚順乎人道不敢忘其母之既死不敢拒其父之見命故方其成道之初登天先以其道諭其母氏三月復歸於世應命還其故國父於道而其國皆化逮其喪父也聖人躬與諸釋負其棺以趨葬聖人所謂與人道而大順也是故當知善固有其大者也固有其小者也固有其奧者也固有其淺者也奧道妙乎死生變化也大善徹乎天地神明也佛之道其奧道者乎佛之善其大善者乎故論語云多聞擇其善者而從之不其然哉不其然哉大孝瞿曇道最尊都緣累劫報親恩三牲日奉非真養萬德身嚴乃本根返拜不妨驚梵釋初行已解指乾坤堪嗟我輩相違背虛負劬勞血一盆大孝釋迦牟尼佛儒釋以孝為宗諸佛設教以孝為宗菩薩修行以孝為本夫孝也者有可見也有不可見也可見者孝之行也不可見者孝之理也理也者孝之所以出也行也者孝之所以形容也修其形容而其中不修則其事父母之不篤惠人不誠修其中而形容亦修其惟事父母而惠人是亦振天地感鬼神也天地與孝同理也鬼神與孝同靈也故天地鬼神不可以不孝求不可以詐孝欺故書云夫孝置之而塞乎天地普之而橫乎四海施之後世而無朝夕又云天之經也地之義也民之行也至哉大矣又孝也者大戒之所以先也戒也者眾善之所以生也為善微戒善何生焉為戒微善戒何自焉故經云孝名為戒亦名制止若有眾生持此戒者孝心即是佛心孝行即同佛行故知孝之一字眾妙之門慈覺頌云佛以孝為宗岩前古路通微塵菩薩子盡入此門中即其義也我聞佛語孝為宗孝行原來佛行同內蘊佛心遵雅訓外行孝行紹宗風母胎集會真身露父臆捫摸妄業空多少知恩菩薩子古今盡入此門中大孝釋迦牟尼佛加持大獻藥真言歌讚明行孝所因儀當演大方便佛報恩經云佛在王舍城耆闍崛山中與大比丘眾二萬八千人俱爾時阿難入城乞食有一婆羅門子孝養父母擔負老母亦次第乞若得好食仰奉於母若得惡食而自食之阿難見已歡喜讚言善哉善哉善男子供養父母奇特難及有一梵志亦是大眾唱導之師執著邪論語阿難言汝師瞿曇自言善好有大功德惟有空名而無實行適生七日其母命終逾出宮城父王苦惱是故當知是不孝人阿難聞已心生慚愧還至佛所具陳上事爾時世尊熙怡微笑從其面門放五色光照於十方一切佛土彼諸世界諸菩薩眾來至佛所心生戀慕佛攝光明遶身七匝還從彼入阿難白佛言世尊事佛已來未見佛笑笑必有意願佛說之大眾之中有七寶蓮花從地化生是時如來即陞華座於淨身中現五趣身一一趣中有萬八千種形類現八千種身乃至虛空法界不可思議眾生等身告阿難言如來本於生死中時於如是等微塵數不可思議形類一切眾生中具足受身以受身故一切眾生亦曾為如來父母如來亦曾為一切眾生而作父母為一切父母故常勤修習難行苦行不休不息為孝父母知恩報恩故今速得阿耨多羅三藐三菩提吾當為汝略說孝養父母苦行因緣是知如來行孝不止一生原其報恩歷塵沙劫昔年因行既不可思議今日果報亦不可思議如來孝行有何因一一如經為指陳喜見婆羅供母氏空驚梵志毀能仁后薨王哭情雖隔光遶蓮花道最尊若論我師非孝敬誰於五趣現多身大孝釋迦佛正明宿世苦行因緣佛告阿難及諸大眾昔有國王生一太子號須闍提身黃金色時宮殿神語大王言羅睺大臣近生惡逆不久至此其王驚怖抱持太子即出進路歸投鄰國其王夫人亦隨王行糧餉已盡前路猶遠王與夫人舉聲大哭云何今日受此禍對王欲小停懼冤家至正欲前進饑渴所迫王又思惟不作方便三人併命不離此死我今何不殺於夫人以活我身並續子命即便拔刀太子白言欲作何等王實語之太子言何處有子噉於母肉既不噉肉子亦當死何不殺子濟父母命王言寧可喪命終不殺子噉其肉也子諫父言惟願父母莫殺子身可日日持刀就子身上割肉三斤分作三分二分奉上父母一分自食父母聽子割而食之身肉轉盡骨髓相連尋便倒地王即抱持舉身大哭我等無狀橫噉汝肉使汝痛苦太子言已噉子肉進路至此可於身中盡割餘肉用濟父母可達所在爾時父母又復割之隨路而去十方蚊虻聞血肉香遍體咂食痛不可言太子即作誓言今我此身供養父母願我父母常得餘福臥安覺安諸蚊虻等皆得飽滿令我來世得成作佛願以法食除汝饑渴生死重病佛告阿難彼父母者即今父母是彼太子者即我身是也又忍辱太子者知其父王身嬰重病命在旦夕往告諸臣父王困篤今當奈何諸臣報言求覓藥草了不可得太子問言所求藥草為是何物大臣言正是從生至長不瞋人眼睛及其人髓若得此藥即全王命若不得者命在不久太子言但使父王病得挼者假使捨百千身亦不為難況我今日此穢身也大臣言如此之事隨太子意爾時太子心生歡喜即呼旃陀羅斷骨出髓剜其兩目爾時大臣即搗此藥奉上大王王即服之病即除瘥問諸大臣汝等如何得此妙藥大臣言今此藥者忍辱太子之所辦也王即問言太子何在大臣言太子在外身體傷損命去不遠王到子所其命已終王及夫人舉聲大哭即以牛頭旃檀香木闍維太子所有身骨起塔供養又經云西天有鳥食人稻子田主捕之復剪其羽中有一鳥欲剪垂淚主問其故鳥曰我母無目不能自給皆我求食而養今無毛羽母即餓死是以故泣主人語曰汝可取稻還與汝母莫為疑難忽不見來主怪念之尋其居處見在巢中抱母而泣主人曰何不取稻供母因甚在此悲號痛哭報主人曰我母既亡取食無用主人遂將存亡二鳥而歸存者曰我欲自死主人放之上飛數丈投地而終又雜寶藏經云有一鸚鵡父母俱盲常採花果先奉父母時有田主初種穀時而作誓言所種之穀與眾生共食時鸚鵡子採取穀穗以供父母是時田主按行苗稼見剪稻穗忽生瞋怒網捕鸚鵡鸚鵡告言先有好心施物無吝如何今日而見網捕但田者如母種子如父實語如子田主如王擁護由己作是語已田主歡喜問鸚鵡言汝取此穀意復為誰答言有盲父母願以奉之爾時世尊而說偈言此經偈出寶積經內又復重念作鸚鵡取人稻穀養二親稻主執我生瞋恚云何盜我熟苗稼我即報言汝種時願與一切眾生共我今取以養父母是故不名為偷盜稻主即時生歡喜我是禽獸汝是人善哉鸚鵡有智慧能懷孝養供父母我從今去以稻施任汝供養於二親如是過去無量事無有苦行而不作未曾有懷疲厭意以求無上清淨道吟偈正明苦行報恩時諦聽令人重愴悽割肉闍提原是我捨身忍辱更求誰剪翊竟免西天鳥脫網曾為鸚鵡兒淨飯摩耶今日看方知有子大慈悲大孝釋迦牟尼佛加持佛頂印咒真言毗盧無見頂相真言歌讚反生慰勞儀當演賧子經云佛告阿難昔有菩薩名曰慈慧孝養父母供侍師長時迦夷國中有一長者孤無兒子夫婦兩目皆盲心願入山求無上慧菩薩念言此人發意欲學佛道若入山者或墮溝坑若我壽終當為作子爾時慈慧終其年壽即便往生盲父母家父母歡喜愛之甚重字曰賧子至孝仁慈奉侍父母賧子十歲白父母言本發大意欲入深山豈以子故而絕本願願隨父母俱共入山侍養之宜不失時節父母與子即便入山賧到山中種種豐實時父母渴欲便飲水賧披鹿皮提瓶汲水國王出獵箭誤中賧正射其胸被毒箭已舉身皆痛即時命終王心怖懼即將數人詣父母所具言上事父母聞之舉身自撲如泰山崩仰天訴言我子賧者天下至孝無有能過一旦無子俱亦當死大王今者牽我二人往子屍上王即引導至於子所父抱其頭母抱兩腳著於膝上各以兩手捫摸賧箭仰天呼呼言諸天龍神我子賧者天下至孝於是父母俱出誓言若賧至孝天地所知箭當拔出時天帝釋見是事已來住賧前以神妙藥灌賧口中藥入口已箭拔毒出更生如故父母聞已兩目皆開王大歡喜禮父母已還禮帝釋及彼賧子賧與王言欲興福者安慰人民當令奉戒王與大眾敬奉賧教佛告阿難彼賧子者吾身是也又佛報恩經云善友太子入海採寶留滯他國未入海時養一白雁爾時夫人往到其所語其雁言太子昔時常供汝今入大海生死未分汝今云何不念太子雁即悲鳴報夫人言欲覓太子者不敢違命爾時夫人即自作書繫其雁頸其雁飛空至於大海次第往到利師跋國遙見太子斂身而下太子取書撥封披讀即知父母追念太子兩目失明尋即歸國父母聞之歡喜奉迎王與夫人目瞑不見太子形容以手捫摸作如是言父母念汝憂苦如是太子問訊起居事訖即持寶珠作咒願言此寶珠是如意寶珠者令父母兩目明淨如故作是願已尋即平復父母見子歡喜無量時善友者亦如來是也又聞薩埵太子捨身濟虎父母聞已悶絕擗地良久乃甦即時奔至捨身之處爾時餓虎食肉已盡惟有骸骨狼籍在地母扶其頭父捉其足哀號悶絕絕而復甦時彼太子命終之後生兜率天天眼徹視見前捨身父母悲悼啼哭過甚或能於此喪身失命我今當往諫諭父母即從天下住於空中種種言詞解諫父母父母仰問是何神耶天曰我是太子摩訶薩埵我由濟虎生兜率天父母當知有法歸無生必有終生死常途何獨沒於煩惱之海不自覺悟父母報言汝行大慈恩及一切捨我取終吾心念汝荒塞寸絕於是天人復以偈句報謝父母父母於是小得惺悟如上所述皆是如來神智洞達妙用難思若不迥出常倫安能反生慰勞實報恩者可不深思回身三界孝慈深悲救還生慰勞心賧子更生天遺藥盲親再見主傾金採珠歸國方饒益飼虎生天解訪尋笑彼法華窮子意捨身逃逝不歸欽大孝釋迦牟尼佛因孝成佛儀當演佛報恩經云須闍提太子割彼身肉養父母已即發誓願願我成佛以法施人發誓願已天宮震動時天帝釋現太子前謂太子言汝捨難捨供養父母如是功德唯願生天耶為魔王梵王耶太子言我求無上正真之道天帝釋言汝大愚也佛道長遠久受勤苦然後乃成太子言我若欺誑天帝釋者令我身瘡始終莫愈若不爾者令我平復說是語已身即平復天帝作禮言吾不及汝會成佛時願先度我今成正覺皆由宿願又文殊白佛言世尊座中菩薩見佛三十二相八十種好端正無比有何因緣得如是乎佛言我於世世喜燃燈於佛寺及師長父母前用是因故佛身光明殊妙無比我於世世隨時花果上佛比丘師僧父母用是因故花果見佛無不傾嚮我於世世事師父母若見臥時不敢驚覺若欲使覺當持音樂或乃誦經而往覺之用是因故如來在內嘿然無聲諸天釋梵持諸音樂而往覺之我於世世有好飲食終不獨食若師長父母飲食終不減損而自食之用是因故如來雖無所食亦不饑渴身亦不羸我於世世奉上師長父母舍宅衣服飲食用是因故諸天鬼神齎持世間所有珍寶以用上佛又言三十二相八十種好一一相好復有無量百千種微妙相好一一相好皆是由我從初發心堅固菩提知恩報恩修是妙行是故今得無上菩提視諸眾生猶如父母以是因緣得二種相一者目紺青色二者眼如牛王無上依經云我以種種供養父母去來往反勤行此事以此因緣得足下輪相轂網成就千網莊嚴若我於師尊長起迎問訊合掌恭敬以此業緣得二種相一者手指纖長𦢚直沒節二者其身方大端正莊嚴若我於師父母扶持侍養自手摩傳酥油膏藥按摩洗浴得手足柔軟潤澤細滑掌色赤好如紅蓮花故戒經云使我疾成無上正真之道者由孝德也然而因孝成佛於理必然若人有智窮盡古今方知如來歷劫行孝傷夫梵志依附邪宗止見一生便興誹謗原其本意其謗有三彼云適生七日其母命終即第一謗也言如來薄福禍其母故又云逾出宮城父王苦惱即第二謗也言如來不告抗其父故又云是故當知是不孝人即第三謗也言其正謗佛不孝故向下引教一一通之寶積經云佛言迦葉以何因緣適生七日母氏命終善男子此是摩耶夫人命根盡故非菩薩咎菩薩先在兜率天時以天眼觀摩耶夫人命根欲盡故來下生又摩耶生忉利天從虛空下到王宮中語淨飯王言大王當知我得善利往昔懷胎清淨眾生受於快樂今生三十三天還受快樂彼樂此樂一種無殊爾時摩耶即以天身還彼天宮此即通彼第一謗也又經云佛言我昔為王有四太子王尚未崩四子諍立王自念言我今為王欲得子姓既有相伐有不如無吾不忍見恐殺無辜但當捨家作沙彌爾是故我今慈心救物遂得成佛度脫天下此即通彼第二謗也又佛告阿難我於往昔作如是言願於五濁諸惡眾生不孝父母不敬師長我於爾時當成正覺以是願故我所入城多有眾生毀罵於我我於今者以本願力為如是等諸惡眾生起大悲心而為說法阿難言如來應正等覺荷擔如是罪垢眾生而為說法佛言如是如是如汝所說何以故如來大悲之所攝故此即通彼第三謗也故大顛禪師云佛也者覆天人之器也其視天下猶父之於子也人若毀之是猶子刃其父也而諸菩薩常修悲智以報佛恩何況世人不知恩德反生毀謗何其甚哉世尊相好絕無倫只為從前孝二親美饌名衣常奉給慈心軟語每諮詢託胎福母功難繼為子捐王道轉新罪垢眾生俱荷負如何只麼毀能仁大孝釋迦牟尼佛加持如來相好十力真言歌讚方便化導父母令入佛道普曜經云佛言我初出家與父母誓若得佛道還度父母今得佛道必當還國不違前誓又寶積經云佛在迦毗羅國尼俱陀林告優陀夷言汝可入城教化父王時優陀夷受佛教已即入王宮現諸神變王見歡喜便與釋種來至佛所世尊遙見告諸比丘汝若欲見三十三天遊戲眾者當觀釋種何以故釋種遊行與天無異王到佛所侍從圍遶爾時世尊為度王故過於人上在虛空中自在遊行諸天侍衛時淨飯王見其事已作是念言如來本不以轉輪聖王生於顧戀何以故我今於此為人圍遶世尊乃有天人侍衛即於是時頭面作禮而作是言佛初生時無人扶持而行七步觀察十方我於是時頭面禮足後至村落閻浮樹下坐於清涼日雖西移影初不動我於爾時頭面作禮我今第三復禮佛足爾時世尊為父王故而說偈言大王昔來於我所實自初無信敬心欲以輪王令我作以四天下生戀惜譬如本昔有神龜隨海水潮至陸地其海潮水回還去龜便墜墮深井中井中舊鼈問神龜汝本何處今至此廣智海龜答井鼈我遇海潮墮此井其海潮水回原時我行遲遲遂不及以斯我今失時節墜此小井共汝住井鼈復問海龜言其海多少井中水豈復寬廣於斯耶為大為小願速說廣智海龜答井鼈無智住人穿鑿處我於大海水中居在彼經歷多年載猶尚不知海處中況復了達其彼岸如是大王都不知我之神通威德力欲以輪王四天下世間勢力戀惜我我今現作法輪王統領三千大千界如法正治離刀杖得於八部最勝供又摩訶摩耶經云佛在忉利天歡喜國中三月安居告文殊言汝詣母所道我在此願母暫屈敬禮三寶並以偈頌向母說之爾時世尊即說偈曰釋迦大仙師成就一切智在於閻浮提猶如千眼天慇懃情渴仰久欲奉慈顏本昔王宮中生我七日已神昇受天福姨母長乳我致得成正覺應供度眾生今故至於此說法報往恩願母與眷屬屈來到此處敬禮佛法眾並受真淨法爾時文殊受佛教敕往摩耶夫人所具以白之摩耶聞已乳自流出而作是言若決定是悉達者當令乳汁直至口中作是語已兩乳流出猶如白蓮花入佛口中摩耶見已踴躍遍身如千葉蓮花日照開敷即與文殊俱詣佛所佛見母來舉身動搖便以梵音而白母言身所經處與苦樂俱當修涅槃永離苦樂摩耶聞已長跪佛前以偈讚曰汝從無量劫當飲我乳汁故離生老死得成無上道宜應報恩養斷我三毒本唯願施慈悲速令成妙果孜孜覓便與尋方見善雙親反激昂膝屈父王離禁殿乳流母氏在天堂萬般神變蒙天衛千葉蓮花向日芳戲綵凡間老萊子回心學佛道尤光大孝釋迦佛為父母轉大法輪儀當演經云爾時如來為淨飯王宣說六界差別法門竟又白王言大王何謂佛法大王一切諸法皆是佛法王聞說已即白佛言若一切法是佛法者一切眾生亦應是佛佛言若不顛倒見眾生者即是其佛所言佛者如夢見眾生也如實見眾生者即是見實際實際者即是法界法界者不可顯示但有言說但假施設應如是觀大王一切法無生一切法無滅是陀羅尼門何以故於此一切法無動無搖無取無捨是名陀羅尼門彼陀羅尼門無有相貌無有自性無可施設無造無作無來無去無穢無淨無愛無憎乃至非解脫非不解脫大王應當以此法門入一切法大王是色自體非曾有非當有非今有受想行識亦復如是大王色無所依色無有生色無有滅受想行識亦復如是大王如涅槃界無有生滅色乃至識亦無生滅譬如法界無生無滅色乃至識亦無生滅如是大王一切法是如來境界不可思議亦是如來境界不共法亦是如來境界不共一切凡夫境界故是故一切聲聞緣覺不毀不讚不得不失非覺非不覺乃至非可聞非不可聞何以故彼法無有如是法可得扶舉可得推倒何以故一切諸法離自性故大王今可於此法中而安其心深觀此法勿信於他時淨飯王即作是念於諸法中無法可得無有如是法得證是法號為佛者諸法實不可得王與釋種即時獲得無生法忍爾時世尊復白母言諦聽諦聽善思念之初中後善其義深遠其語巧妙純一無雜具足清白梵行之相摩耶聞已佛神力故即識宿命並以善根純熟時故破八十億煙然之結得須陀洹果即起合掌而白佛言生死牢獄已證解脫一切眾生在於五道皆由結縛願我來世得成正覺當斷一切此患根本世尊一切眾生在於生死而不能知出要之道佛言眾生所以不得解脫皆由三毒致令生死若人要求解脫妙果宜斷苦本斷苦本已則離妄想離妄想已則無攀緣不復貪著色香味觸離我計著及於我所汝等從今可以此法互相開示長獲利益汝等今者聽我所說我於過去無數劫來為諸眾生廣修苦行得成菩提佛說法已與母辭別從天宮下還閻浮提是知如來以法供養俾令斷結得證道果而世人但能真養不以法味為甘旨者豈可同日而語哉偈云有子超凡豈偶然法輪為轉化人天如如法界原非動念念攀緣徒自纏顛倒見亡登實際須陀洹證破煙然同歸寂滅餐甘露後世忘恩未是賢大孝釋迦佛加持佛頂轉法輪真言至摩訶摩耶咒歌讚究竟奉親儀當演佛在王舍城耆闍崛山中光明煒煒喻如日出照明世間時淨飯王四大俱作殘害其體喘息不定種種療治無能愈者告諸王曰我命雖逝不以為苦但恨不見我子悉達如來已知父王悒悒遲今欲向終要見諸子告難陀曰淨飯王者是我曹父能生聖子利益世間今宜往詣報育養恩世尊即以十力四無所畏佛不共法放大光明其光照耀內外通達光照王身患苦得安王遂怪言是何光也脫是我子悉達來也佛便入宮王見佛來遙舉兩手接足而言唯願如來手觸我身令我得安我今最後得見世尊痛恨即除佛告難陀睹王本時顏色端正今得重病端正何在時王合掌以偈讚嘆佛言唯願大王莫復愁悒所以然者道德純備無有缺減佛即以手著父王額王是清淨戒行之人心垢已離今應歡悅不宜煩惱當諦思念諸經法義於不牢固得堅固志已種善根是故大王宜應歡喜命雖欲終自可寬意時王聞已喜不自勝即以自手捉於佛手著於心上王於臥處合掌心禮無常對至命盡氣絕忽就後世佛告眾言父王淨飯是清淨人捨此生已生淨居天眾會聞已即捨愁毒爾時世尊已入涅槃時阿那律見佛滅已即昇忉利往摩耶所以偈說之摩耶聞已悲泣垂淚而作是言佛入涅槃世間眼滅昔日在於淨飯王宮始生七日我便命終竟未抱育展母子情姨母乳養及已長大逾城出家既成道已開示慧眼如何一旦便入涅槃即與天女趨雙樹間頭頂作禮而作是言共於過去無量劫來長為母子未曾捨離一旦於今無相見期嗚呼苦哉眾生福盡即以天花用散棺上爾時世尊以大神力令諸棺蓋皆自開發合掌而起身毛孔中放千光明一一光明有千化佛悉共合掌向彼摩耶以梵音聲問訊母言遠屈來下此閻浮提諸行法爾勿須啼泣阿難白佛後世眾生必當問我世尊入滅復何所說云何答之佛告阿難汝當答言世尊已入涅槃摩耶從天來下至金棺所爾時如來為後世不孝諸眾生故從金棺出身毛孔中放千光明一一光明有千化佛悉皆合掌向彼摩耶阿難白佛當何名此經云何奉持佛言我於昔日忉利天上為母說法今復在此母子相見汝為後世諸眾生故次第演說此經名曰佛臨涅槃母子相見經如是奉持爾時世尊與母辭別即便合棺摩耶夫人悲泣即禮右遶十匝還歸天上眾等當知世尊以願力寧其親眾生以業力背其親願力堅固歷萬變而不差業力虛浮雖百年而何益均是人子豈無孝心哉為法酬恩屢啟端方知究竟奉親難別離世數誰能免悲智家風切好看淨飯一心呈玉偈摩耶十匝遶金棺此身堅密何曾礙笑倒雲門赤肉團大孝釋迦牟尼佛普勸大眾儀當演比丘某等謹白大眾上來依經敘述本師歷劫以來迄至今生孝養父母苦行因緣乃至成佛還度父母令得道果眾等聽聞當生省悟既省悟已當正思惟我等自無始來不聞正法不知恩德常與父母互為冤讎不復相識反生殘害所以輪迴長夜永無出期今自忖量實生慚愧諦觀如來孝行今古無儔可不皈依可不瞻慕故北京奧法師以五家之孝發明如來之大孝且天子以愛敬自親不慢不惡他人為孝以教流百姓道光四海為益佛以度脫父母及一切眾生為孝以恩霑九類悲含法界為益諸侯以不矯不溢謹節為孝以守富貴保安社稷為益佛以無我無人謙虛下意為孝以圓福慧不退轉為益鄉大夫以服先王之法服謹為言行為孝以守宗廟為益佛以服諸佛之定服謹慮身口為孝以守像法為益士以敬事君長為孝以保祿位守祭祀為益佛以皈依聖賢為孝以成行位紹繼佛種為益庶人以勤於農桑為孝謹身節用敬養父母為益佛以勤修定慧為孝以少欲知足增長智慧方便為益如是對辦一一超過故名大孝又辯正論云其孝有三小孝用力中孝用勞大孝不匱不匱者即如來之孝也回軒實相之域凝神寂照之場指泥洹而長歸垂法身而遐覽既乃母氏天降剖金棺而演法父王即世執寶幢而送終斯不匱之道也且如世人暫放一子出家其福資於九族捨三惡道報得生天況如來累劫行出世之孝者乎是知難報之恩唯佛能報難行之行唯佛能行難捨之身唯佛能捨難成之道唯佛能成眾等今日可不信向為父母者宜勉行持始自今生終於覺果誓願依如來之大教報父母之大恩導父母於一乘證如來之大覺毗盧本是一凡夫曠劫修行作楷模今日因之成道已諸人還有所生無輪迴路上安能捨解脫門中正好趨世出世間須兩立休於苦海更盤盓大孝釋迦牟尼佛加持集法悅捨苦陀羅尼歌讚下座止讚禮
