持護命善門真言歌讚能養其親居而致敬要當色養承顏音容喜慍親侍更防閒當念寒溫定省趍庭問詩禮忘還爭知道父王返拜身踴七多間繼而能奉養克全至樂戲老萊斑舁輿負米喜躍忍多艱粗可百年相守眼光落淚雨空潸何日早扶持恃怙笑傲涅槃山敘病則致其憂儀當演大方便佛報恩經病則致其憂觀親疾弗瘳七旬無寢寐百藥治何休帝王親嘗湯藥進如來割肉未曾酬仁師宣唱講解因由親病當知子負憂求醫問藥莫知休賣身破產終無吝設拜肩輿不用羞代死要為潛耀輩吮癰當作士岩儔更能仰叩真慈父天理爭教疾弗瘳敘喪則致其哀儀當演大方便佛報恩經喪則致其哀終宵淚滿腮心喪於永劫莫若効如來董永賣身殯葬父烏鴉助土築墳臺請師提唱內有奇哉儀至歷生辜負臨喪孝子具真哀擗踴號咷五內摧嘔血數升悲在膂忘餐七日淚橫腮目連大叫真賢者調御舁棺信善哉不向真乘消愛見從前感動總癡孩加持誦華聚陀羅尼真言歌讚欽奉雙親厥躬有疾可知人子懷憂問醫求藥早夜不曾休七日頓忘眠寢投天地涕淚交流時看診古人三載不暇脫衣裘哀喪制起痛摧五內泣血吞愁臥苫枕塊一日似三秋重念幽冥阻隔神魂向何處尋求須修薦歸投佛法九品定遲留敘祭則致其嚴儀當演大方便佛報恩經祭則致其嚴三牲日具鮮孟宗因祭筍竹內哭蒼天若薦蘋蘩修福供釋迦老子更無言五般孝行請為敷宣儀至超於苦海當思祭則致其嚴礿禘蒸嘗禮法兼明法唯忻陳簠簋克誠配享奉虀鹽休將大辯齋蔬棄須信青提缽飯甜人哭鬼歌無用怪來昆善惡佛能占敘化風遠被儀當演大方便佛報恩經化風遠被眾皆知愛敬由來合爨居鴉鵲同巢真罕有馬牛相乳實希奇仁風扇處警醒群迷淳風遠被化澆漓本固須知葉不衰三世同財財愈盛積年合爨爨常炊馬牛相乳和如此鴉鵲同巢義可知禍亂不生災害殄君臣父子太平時大孝釋迦佛加持誦莊嚴王陀羅尼歌讚禮奉蒸嘗春秋忌諱祭須必致其嚴扣冰泣竹隨力辦虀鹽羅列蘋蘩蘊藻潢汙與行潦滋霑君看取鬼歌人哭因果佛能占當知純孝節化風遠被草偃閭閻靈芝甘露祥瑞快觀瞻堯舜君黎民同樂君臣父子官吏清廉無餘事家家樂孝花暖蜜蜂甜敘孝行感驗儀當演大方便佛報恩經孝行因緣不可量龍吟虎嘯亦非常沙門爪賜曇恭母陳氏持齋往淨方多多行相一一明彰孝感如前驗頗詳神明造物衛行藏白鳩標瑞棲其宇芝草呈祥挺在堂陳氏夢尼生淨土李公刺血發奇香隆興丞相心詞妙天下人心好忖量敘普勸大眾儀當演大方便佛報恩經彌羅八歲入山修五母號咷哭未休世出世間行孝道揚名空向後人留許多言教眾好參求君看五母哭彌羅憂海無風強起波定果色墮癡愛綱金剛杵碎死生魔傷嗟棄本甘纏縛黽勉知恩好切磋念念迴光酬罔極流光催老急如梭加持誦寶樓閣真言歌讚孝出誠心親為本始驗由感格高穹從前靈異一一淨玲瓏方稱為人之子天曹與地府論功虞丞相只緣孝感穩坐廟堂中諸人當此際追思恃怙生育吾躬可忘報效儒釋法門通禍福已知深淺遠超透生死樊籠凡間子縱教類我蜾蠃只成蟲回向止第三時禮請投疏陞座加持三寶字母真言敘真俗混融儀當演大方便佛報恩經比丘某稽首和南謹白清淨大眾今此道場第三時中敷陳軌范伏聞真俗混融皆崇出世之孝辭親割愛上酬罔極之恩朗法師荷擔遊學陳陸州養親織履兄則坐禪息定弟則繼業傳家能報不報當酬未酬三復斯文一生事辦儀至金剛種智真俗混融見法身偉哉慈覺導迷津不歸只願求成佛再見無期待出塵以法斷恩恩豈斷酬恩入法法尤親胞胎愛欲君休戀正覺初成看漸新敘法供養為最儀當演大方便佛報恩經擔父母報劬勞圍遶須彌一二遭剜睛割肝行孝道世尊尚且笑兒曹月光常願奉其母證涅槃山道最高以法供養震動鯨鼇父母橫擔左右肩未能少報半分全血流沒踝非為孝道以資親始是賢德護因兒生正信月雲為子脫塵緣奇哉童子真難繼直養為懷志可憐加持誦七俱胝咒至無量法門咒歌讚敬奉賢愚理融真俗皆由大孝鈞陶偉哉慈覺見解北宸高百二十門功行始終為感慨劬勞須參透未生前底月下嶺猿號為親興法食如來曠劫妙用堪褒慈風法雨均濟冷騷騷演出三乘五教空性相頓漸滔滔知恩處母胎中說何用斷機刀敘勸父母歸依三寶儀當演大方便佛報恩經迦葉老顯功能啟導雙親漸漸增長者子兒生墮地皈依佛法比丘僧子年七歲塵埃戲舍利稱為照世燈皈依三寶請為敷陳胎中已解奉三皈墮地稱名也大奇長者若教無慧眼慈親安得破狐疑融歸一法原同體兼攝群凡作住持無上福田最尊貴酬恩佛子可忘之勸持五戒十善以作人天之孝儀當演經題持戒律脫塵埃不辱其親大孝哉福不臻臨孝不篤雙親何日托蓮臺密多長者遊天竺父母西方作禮來法師講解切勿沈埋法中正勝戒宜遵守護須還清淨人過海浮囊無缺漏先天妙物出陶甄如能檢束方知本倘不堅持反辱親天上人間增妙報密多見佛了前因加持誦皈依三寶真言至百千印咒歌讚一片閑雲古今常住出生佛法僧三覺而常照和合軌持諳因果聖凡總體從來苦誓願諮參有親者普皆回向彌勒且同龕堅心持五戒專行十善奉旨供甘人天勝報行看遠而譚愛惜浮囊過海勸善戒追慕瞿曇三祗滿度親事畢方是保家男勸修四諦以作小乘之孝儀當演經題小乘法報親魂四諦標持不可論八萬四千諸婇女俱來法會作沙門證無學果羊車載三會龍華睹世尊慈風扇處捲盡迷雲小乘為養事堪呈三轉迴環四諦分應斷應知禪兀兀已修已證醉醺醺能行自利逃紅焰求證單空坐碧雲三會度人皆父母大悲彌勒豈謾君勸修中乘以作緣覺之孝儀當演經題華嚴藏理幽玄此是中乘十二緣鹿母當年五百子辟支佛現在其前聲聞緣覺猶知本仁者如何不可憐請師提唱了悟丹田中乘為養死生窮緣獨雖殊二覺同不向支支分四種何由法法會三空四生證果根機利百劫成功觀智融鹿母當年因供養後生一子法王雄加持誦四聖諦真言歌讚學佛修行小乘為養高拋生死樊籠苦知集斷與滅道成功三會度親無數大悲佛彌勒相同阿羅漢克全孝道遠引似溟鴻緣生緣滅定中乘為養尤更玲瓏觀華悟道化火證真空鹿母當年供養五百子寶塔尊崇因發願後生一子今作法王雄勸修六度以作大乘之孝儀當演經題遇文殊問智首六度波羅還知否三祗果滿證菩提女子腹中叉著手百劫千生為報恩萬載功名常不朽一段鴻文請師抖擻大乘為養智悲全頓發菩提出愛纏劫滿三祗方殺賊行鋪六度好行舡腹中女子因無限膝下嬰兒果漸圓色究竟天增氣焰必須託彼坐紅蓮勸修一乘以作如來之孝儀當演經題三界主甚奇哉大事因緣出世來長子小男相問答即三而一互融排一乘報本酬恩乳塵剎眾生父母胎如來大孝請講根荄一乘為養妙嚴都塵剎眾生父母軀長子全身周沙界小男無處不文殊摩耶生佛原來幻太子甯親忒煞迂三世十方相涉入人牛不見月輪孤加持誦十波羅蜜真言歌讚學佛修行大乘為養進修六度波羅施心戒本堅忍復如何精進曾無懈怠增智慧月逗禪和嬰兒笑化他斷見皈佛怖群魔剎塵含法界一乘為養悲智諧和法身慧命生長感恩多賴有普賢長子興萬行折桂登科須深信人人有分明月照前坡敘父母成佛儀當演大方便佛報恩經雪山教主號能仁演說三乘報二親圓滿一乘為究竟至真至孝絕無倫三乘四諦請為諮詢天倫佛性自圓常今日方知孝道昌點鐵成金恩愛礦採花作蜜智悲鄉已知有父如無等寧可無兒似月光自利利他俱滿足更無一物獻尊堂敘普勸大眾儀當演大方便佛報恩經願輪廣博孝隆昌究竟超登正覺場五戒三皈資苦本三宗四法答恩光眾皆諦聽師為分張晝宵聞見好因緣箭急將身出愛纏早是四生花報謝那堪三界火輪旋法身獨露胞胎外慧命生成繈褓前萬劫親恩俱解脫人間天上月團圓加持誦佛頂尊勝陀羅尼咒歌讚種子梨耶天倫佛性本非今日生成同登覺地不用隔銀屏從天上許多諸佛皆父子相誘修行蓮臺上同音說法賽過鯉趨庭報恩諸大眾宿緣多慶幸聽法聞經千生父母度脫至今生同作九蓮伴侶休更受胎髒微形餐禪悅樹林演法仙樂正和鳴下座勸修觀想儀當演入儀加持發菩提心真言心月孤圓真言行香宣疏入儀回禮拜別加持奉送聖賢真言發遣鬼神真言南無解脫月菩薩獻衣偈馬鳴願力何其多吐出玄機錦繡羅亦似當年親奉獻報恩會上沐恩波咦滿門貴眷呈祥瑞萬古光輝獻佛陀獻食偈天廚妙供是酥酡老母曾將獻維摩六味馨香充法界繽紛遍滿於娑婆咦施主虔誠獻三寶人天三界供餐和獻財偈天地儲精琥珀金銀玫瑰瑪瑙玳瑁珠珍無垢界中龍女獻楊子江心居士傾打開歡喜藏能妝觀精神施主虔誠而奉獻供養如來及報恩咦金輪種智從今種果報何曾不現成放生偈成形雖有異佛性總相同一念迴光照脫禽覺本空咦從此翻身歸聖域祗隨鸚鵡伴圓通又偈搖頭擺尾水中遊祗因迷悟不曾修從今放你超脫去直到波羅彼岸頭咦今朝這裏翻身去龍宮海藏任遨遊
