body:
  text: 人天同聽梵音聲梵音聲菩薩摩訶薩各三聲梵音初震一聲雷無限人天眼豁開怪得香風拂庭戶龍天圍遶世尊來伏聞詞句輕清初傳於鷲嶺梵音雅唱得自於漁山阿難陀首唱於竺乾陳思王終和於華夏古今同詠凡聖交參斯可以接物導迷斯可以契凡達聖爰將法句演唱梵音面位仁師云何請舉云何於此經究竟到彼岸願佛開微密廣為眾生說上來梵音雅唱出生正音不向二乘不向三有回因向果回事向理回向無上佛果菩提伏願群生息妄眾聖垂慈內行則妙用常存外護則靈明永固天地正觀日月昭輝民歌太古之風化啟不言之道三寶常住萬善流通常明覺照之心盡出樊籠之表四恩總報三有均資法界含情同圓種智普念摩訶般若波羅蜜南無大方便佛報恩經大孝釋迦牟尼佛壇前教誡儀當演黃面瞿曇老古錐始從兜率降王幃撑天柱地開爐韝鍛煉人天是與非比丘某稽首和南謹白清淨大眾今此孝順設供拔苦報恩道場幾晝霄中兩案陞猊壇前教誡恭聞釋迦演教思覺著儀開眾生行孝之門行如來出世之理出髓療父割肉養親躬自舁棺說法化世勸令孝順設供拔苦酬恩報答劬勞良可哀憫今乃道場初闡法席宏開敷演教科奉行法事先伸教誡然後行持掌壇法師一一布露儀至密垂加護加持啟白諸聖真言道場大義儀當演世尊說法報雙親從起舁棺放光明阿難問言行孝道廣開方便化群生大意初演啟迪由深天地生人原以恩人有父母兩稱尊割肉代醫酬罔極出棺說法啟晨昏無身誰作三才主有孝方開百行門奉勸世人須自醒釋宗儒訓古今存大孝釋迦牟尼佛道場所祖儀當演大方便佛報恩經道場所祖叩宗門儒釋兼全不可論法匠宗門明道眼二彰孝行理尤存仁師提唱大眾樂聞報恩海會佛菩薩孝子首重是彜倫孝有所祖規範真昊天廣大恩難報藏教分明語最親侍讀歐陽皆奉旨圭峰慈覺再來人留將錄論非胸臆知恩劬勞福自申道場儀式當宣演道場儀式孝雙全禮佛投誠懺罪愆目擊道存當觀想澄心止水慕親緣洪儀軌范請師敷宣各發恭敬志誠心從來儀式有規程須以三時作證盟欲知出世並入世更揣單行與雙行作觀謹嚴思濟渡誦經心口要真誠放生未了財施去難報高堂顧復情道場功德儀當演大方便佛報恩經道場功德阿難言父畫左邊母右邊晝夜六時聞大法薰成種智孝心堅其中行相師乃敷宣過現父母佛菩薩道場左右把香焚兩向從來各有分五趣四邊情更切老聃孔子告猶勤聖凡合處忘人我名姓陳來檢疏文安置為何知不二如來聖訓總難聞道場合用儀當演道場合用總包羅種種行持事相多女子裸形遭業火縱饒衣妙被如何掌壇宗主請講玄科薰沐投誠建法壇婉如在世日承歡放生以數佛有訓布施將錢人所難須信懸幡亡脫化不然衣擲火催殘兒孫若把慳來破過去親心永得安道場警策儀當演道場警策佛流傳逆殺闍王謝罪愆三業端莊興大法發心勇猛孝心專仁師敷宣大眾默然報恩德菩薩摩訶薩警策原從一念生香燈掩映法壇清欽尊三寶神偏凜悖逆雙親報不輕闍世悔心消積苦圭峰誡語釋無明會須猛勇為佛事福祿來臨萬事亨道場勸勉儀當演大方便佛報恩經道場勸勉敘其中鼎足三分善不同道德中庸存性命深恩十種佛流通宗師慈憫請解玄宗大孝釋迦牟尼佛欲垂勸勉仗諸天為想高堂結佛緣三老化身皆助釋一乘妙理定宗禪指迷始破眾生惑篤孝當為明教先遵奉大師應有戒是非消卻道場圓加持香水灑淨真言至淨十方世界真言表揚咒水儀當演咒功甚大化熱惱而作清涼善力無邊捨塵勞而登解脫請師宣揚普及見聞報恩勝會啟壇場密咒醍醐甘露漿安息飛煙雲霧捲蘭膏發焰慧燈光緇流濟濟皆精潔賢聖巍巍盡讚揚法雨滿空甘露灑道場何處不清涼南無無垢淨光佛加持淨衣真言誦大悲咒加持一切如來淨身口意真言誦六部咒加持甘露水真言誦大明咒經誦灑地水真言誦諸部因緣聞經佛子罪消滅仰啟真空無相教梵音不譯頗難思昔因三藏往西天遂感觀音親教授誦念除危並滅罪聽聞獲福與延齡咸希不退菩提心庶令善根速成就加持誦梵語心經陀羅尼歌讚一缽寒泉蠲除熱惱功勳莫可量注想曹溪水別來幾度春光凝然湛寂灌清淨醍醐甘露漿霏法雨楊枝灑處遍滿壇場普願霑濡使含情俱蒙出苦鄉餓殍焦面了悟自性真常今法會仗密語伽陀咒讚揚周沙界無人無我盡獲清涼回向無上佛菩提恭聞佛心無礙伽陀開甘露之門咒力所加屋宅化琉璃之色伏願諸佛菩薩以慈悲力滿一切心鑒懇禱於周旋回威光於傾刻金鈴一振薝蔔之香徐來寶篆騰空樓閣之慈雲大佈革此穢土速成淨邦器用變七寶之珍服飾等六銖之妙一聞密語俱發上心業火熾者即獲清涼障垢重者俱蒙蕩滌前趍人天之勝果後超圓頓之上乘宜憑檀信之所求圓滿道場之勝事再勞清眾結增上緣請十方三世一切佛一切菩薩摩訶薩摩訶般若波羅蜜止第一時開科開壇請佛舉偈炷香大方便佛報恩經各發恭敬志誠心參禮大孝釋迦佛各三聲報恩會啟某筵開領眾登壇參禮三寶皈依靈山教主雪嶺能仁唵引薩哩嚩釋迦佛皇宮內院因向四門遊生老病死苦雪山修六載餐麻麥日充饑證金軀我佛金身丈六若人皈依佛消災障增福壽永不墮地獄道皈依常住十方佛皈依龍宮海藏七佛真經戶引唵達哩摩三乘法我佛說下貝葉與靈文波羅蜜多海藏般若經慈悲懺妙法華最堪誇法寶功能無價若人皈依法消災障增福壽永不墮餓鬼道皈依常住十方法皈依天台方廣南嶽高僧戶引唵僧伽南六和僧一切賢聖羅漢與辟支具方袍圓頂每日伽藍院安禪定誦真經有功能感得鬼神恭敬若人皈依僧消災障增福壽永不墮傍生道皈依常住十方僧報恩海會佛菩薩報恩會啟某筵開領眾登壇開演第一時豎宗立教法事開壇請佛一段洪文掌壇布露大眾志誠心同誦三寶偈法身報身及化身經律論藏甚深文開迷化導阿羅漢參禮南無佛法僧誦三寶咒入儀眾等各運志誠一心頭面敬禮波羅蜜滿足淨性覺智慧勝心得成就故號名為佛過現未來常住佛寶願共諸眾生一心頭面禮眾等各運志誠一心頭面敬禮無染性清淨永離於世間不觀世五陰常住名為法過現未來常住法寶願共諸眾生一心頭面禮眾等各運志誠一心頭面敬禮身心常無為遠離四種食為世良福田故稱和合僧過現未來常住僧寶願共諸眾生一心頭面禮投疏加持讚嘆三寶滅罪真言開壇門部陀羅尼三聲法不孤起仗境方生法隨法行建立法幢法幢既立必有因由今此道場寧無由致先當入壇清淨三業焚香灑淨淨壇結界散花行道以為佛事三業論文法師布露身口意業本來同一念纔迷失本宗喝散漫天雲霧捲一輪杲日照當空除蓋障菩薩淨三業真言三業六根悉清淨報親恩甚奇哉本來心地豁然開旃檀牛首無價寶儘是能仁藏裏來焚香論文法師弘開五分法身真妙香人人具足露堂堂無根樹下親拈出供養如來大法王香供養菩薩焚香真言香嚴童子大菩薩老瞿曇報親恩自然清淨絕纖塵更將一滴曹溪水洗淨天邊孤月輪灑淨論文法師宣陳八功德水自天真善洗眾生業垢塵流入毗盧華藏界個中無處不超倫清淨慧菩薩灑淨真言壇場內外悉清淨證覺位住靈山自來非小亦非寬拈開臨濟正宗眼提起眉毛仔細看淨壇論文法師敷宣聚沙成塔亘青天舉止分明在目前法界道場今潔滌自然湧出一枝蓮淨壇場菩薩淨壇真言雪山童子大菩薩無我相念念空妙色圓明逐處同劫火洞然毛未盡青山依舊白雲中結界論文法師流通荊棘林中業火生經由大地任縱橫金剛結出摩訶力直向如來行處行尊勝幢菩薩結界真言結大界菩薩釋迦佛舉花時金色頭陀笑展眉堪嘆靈山百萬眾香風撲面有誰知散花論文法師拈提一花五葉祖師傳淺白深紅有萬般晏座岩前無法說紛紛墜落紫雲端花供養菩薩散花真言行道真言入壇作梵如來妙色身云云如來色無盡云云如來智慧燈云云願共諸眾生一心頭面禮入儀加持警覺如來真言歌讚已滅瞿曇未生彌勒像季法弱魔強迷頭認影終日只顛狂鬥爭人我堅固毀正法違背爺娘華報現三災八難苦海絕津梁我師龜鑒報恩設供火急迴光圭峰明教慈覺為提綱世出世間行孝思罔極正好承當斯法會難遭難遇信手炷心香南無大孝釋迦牟尼佛大眾志誠心同嘆讚佛偈稽首三界主大孝釋迦尊累劫報親恩積因成正覺將永錫眾類應請演斯經欲使報恩人咸能酬罔極宣疏禮請照儀召集神祗南無越三界菩薩入儀大眾志誠心同誦灌沐偈我今灌沐諸如來淨智莊嚴功德聚願五濁眾今離垢同證如來淨法身淨身器菩薩摩訶薩加持灌頂清淨真言至施無畏真言獻五養供止第一時陞座加持四十二字母真言歌讚秘密伽陀如雲似海難思難議最要無他事世尊金口親宣示四十二字母須詳細有頓教華嚴廣大一一明宗旨自善財童子親參禮曾為舉揚奧義法界之中罪垢多除洗陀羅尼藏無邊際濫觴爰從慈氏信至道人間天上渴仰生歡喜南無大方便佛報恩經大孝釋迦牟尼佛豎宗立教儀當演大方便佛報恩經比丘某稽首和南謹白清淨大眾今此道場初登寶座會集人天開百行之孝門演三時之大法豎宗則高峰岌岌立教則巨海汪汪儒釋兼濟則簇錦攢花真俗混融則鳴珂玉佩恩愛網從今墮壞悲智海正好優遊立教洪文掌壇布露大孝瞿曇道最尊都緣累劫報親恩三牲日奉非真養萬德身嚴乃本根返拜不妨驚梵釋初行已解指乾坤堪嘆我輩相違悖虛負劬勞血一盆儒釋以孝為宗儀當演大方便佛報恩經如來設教孝為宗理孝形容事亦同置塞普之橫四海一如慈覺古途通法師慈愍廣布慈風儀至即其善也我聞佛語孝為宗孝行原來佛行同內蘊佛心遵雅訓外行孝行紹宗風母胎集會真身露父臆捫摸妄業空多少知恩菩薩子古今盡入此門中大孝釋迦佛加持大獻藥真言歌讚宗為酬恩教由知本先須立教提宗乃知宗教興建豈無蹤我佛堪稱大孝垂千古孰敢追蹤嵩明教後來著論行相頗雍容孝能先百行為宗為本儒釋相通生成養育何以報圓功三藏無逃於此神明與天地欽崇佛菩薩奇功勝行盡出此門中敘明孝行所因儀當演大方便佛報恩經乞食親嘗試苦甜阿難歡喜讚奇言梵志邪師將佛毀現身五趣遍三千仁師提唱大繫法船如來孝行有何因一一如經為指陳喜見婆羅供母氏空驚梵志毀能仁后薨王哭情雖隔光遶蓮花道最親若論我師非孝敬誰於五趣現多身敘正明宿世苦行因緣儀當演經題剜睛出體報如何感得旃檀窣堵波剪羽慈烏娘餓死採花鸚鵡過新羅雖然如是必竟如何正明苦行報恩時諦聽令人重愴悽割肉闍提原是我捨身忍辱更求誰剪翎竟免西天鳥脫網曾為鸚鵡兒淨飯摩耶今日看方知有子大慈悲大孝釋迦佛加持誦佛頂身印真言至毗盧無見頂相真言歌讚人豈無非佛猶遭毀咄哉梵志狂生婆羅負母乞食不勝情卻道瞿曇違背辭王位半夜逾城佛聞了身光七遶曠劫事分明我佛慈忍力難行苦行為報雙親剜睛割肉喜捨表無瞋況乃曾為鸚鵡盲父母情愛過人諸佛子當思養育圖報耐艱辛敘返生慰勞儀當演大方便佛報恩經賧子求泉主箭傷傳書白雁海邊翔捨身濟虎生兜率妙用難思孰可量法師掌教請為宣揚回身三界孝慈深悲救還生慰勞心賧子更生天遺藥盲親再見主傾金採珠歸國方饒益飼虎生天解訪尋笑彼法華窮子意捨身