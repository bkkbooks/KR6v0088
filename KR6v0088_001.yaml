body:
  text: 西山郡學士化眾設初會疏有初生人必本為孝稟一德而莫與及百行以稱先古道下衰格言中晦罔知為教不得其傳或約法以禁民至設科而取士類生平所無知物幸天下僅有其人已久失之可不哀也近因淨侶廣探寶函深思不報之恩是為甚盛之舉以夫勸勉特裁上儀文字一開善類四集惻恃怙於罔極等覆載以難酬生祈祿筭美增歿冀神明升濟必眾誓之不墜仰至德之可憑謹疏孝順設供拔苦報恩道場漢洲綿竹大中祥符寺住持長講華嚴海印大師思覺集法事標名總分為六十七節壇前教誡法事分為九節開壇請佛法事分為十四節第一時豎宗立教法事分為十一節第二時儒釋兼濟法事分為十六節第三時真俗混融法事分為十七節壇前教誡法事分為九節啟白諸聖道場大義道場所祖道場儀式道場功德道場合用道場警策道場勸勉表揚咒水且啟白諸聖我佛廣運悲心發明孝順眾生仰憑法力普濟幽冥今遵儀範而闡揚先約條章而教誡是用啟白上聖庶幾勸勉下凡惟願憐憫密垂加護加持啟白諸聖真言道場大義儀當演比丘眾等伏聞情欲為身凡輩皆違恩養智悲行孝如來已遂旨甘人為天地之靈生必資於怙恃佛乃聖凡之主孝尤動於乾坤欲引導於方來亦可遵於先覺是故本師釋迦如來初成正覺先往天上以道諭母還歸故國說法化父乃至父王順世親自舁棺經云爾時世尊思念當來不報父母養育之恩為是人故躬自舁棺又如來入滅摩耶從天而下金棺忽開母子相見阿難問言何故如是耶佛即告言如來為後世不孝之人故從棺中起身毛孔中放千光明一一光明有千化佛悉共合掌向母摩耶此乃如來遍為不孝之人說法化世明矣且住世七十九年說教三百餘會貴令為子者必孝為臣者必忠為君者必仁為親者必愛又云方便以為父智度以為母則示菩薩修行之本也無明以為父貪愛而為母則示眾生輪迴之本也又於前世割肉養親出髓治病是能行世間之孝今成正覺說法化導令得證入是能行出世間之孝法門廣大孝道圓明而世人冥然不知者良可悲愍今集而成文名曰豎宗立教儒釋兼濟真俗混融釋迦如來孝順設供拔苦報恩道場儀文啟請加持偈章讚詠靡不備具可傳於世矣昔考叔純孝而施及莊公今如來純孝一施及一切切宜自省當念所生報本奉親斯為允當者也天地生人原以恩人有父母兩稱尊割肉代醫酬罔極出棺說法啟晨昏無身誰作三才主有孝方開百行門奉勸世人須自醒釋宗儒訓古今存道場所祖儀當演唐圭峰禪師禪門宗匠教海龍象至於為親應思報本廣探藏教獲遇盆經遂造疏文深究二宗之說每歲中元日講明孝行以福雙親時裴公相國喜師之說故有吾常遊禪師閫域之語又本朝慈覺禪師單傳心印大唱禪宗亦為雙親勸受大戒修淨土行至於母氏臨終之日靈驗昭然禪師喜不自勝遂秉筆跡書孝行錄一百二十篇書成大地為之震動又明教大師真吾門法匠為明道眼歷遍叢林恨不再見母氏哀號惋切報效無門力著孝論一十二章示其心也發明如來大孝兼證儒者之說殆亦盡矣開封侍讀王公素上之有旨下翰林考時歐陽文忠公一見大奇之遂聞之朝庭特許編入大藏兼賜命服加號夫三大士所述雖殊是皆明其孝也故感王臣外護天地徵祥今述儀文皆本於此並檢閱藏教摘取因緣非敢以胸臆之談徒欺誑也又擬諸家儀範皆本藏乘如藥師壽尊觀音彌勒之道場皆我本師所讚之文華嚴涅槃法華圓覺之道場皆我本師所讚之法而世人能依佛說不知佛行能敬彼佛先敬本師又見世間凡設道場多為父母為無儀範故假旁求今既有文是為正轍奉勸孝子可力行之報恩海會佛菩薩孝子首重是彜倫孝有所祖規範真昊天廣大恩難報藏教分明語最親侍讀歐陽皆奉旨圭峰慈覺再來人留將錄論非胸臆知念劬勞福自申道場儀式儀當演此道場儀分為三時蓋取始於事親中於事君終於立身亦表天之經也地之義也民之行也故於第一時中敘如來雙行世出世間之孝於第二時中敘孝子單行世間之孝於第三時中敘孝子單行出世之孝又第一時下報本奉親第二時下禮佛放生第三時下讚禮作觀一一各冀謹嚴庶希感格唯作觀之際切須五體投地三業歸依身不動如須彌心澄湛如止水專注想念萬劫親緣同會道場盡蒙濟度如有輕忽不信懶惰睡眠自招殃咎正作觀時不勞入會其餘宣疏請佛行道誦經結界放生施財施食請依科式如法行持自利利他功德無量各發恭敬志誠心從來儀式有規程須以三時作證盟欲知出世並入世更揣單行與雙行作觀謹嚴思濟度誦經心口要真誠放生未了財施去難報高堂顧復情道場功德儀當演此道場中所供養者總而言之則三世十方一切聖凡而已別而言之則於父母孝子之中曾受其勸化故宜專禮所有名字如禮請文中指陳此不煩述如老聃告於上智孔子告於曾參是皆權現聖人亦當禮請經云如來於淨身中現五趣身告阿難言一切眾生亦曾為如來父母故今所挂下位者惟父母兩幀而已於左邊畫父右邊畫母於親四邊分開五趣庶知五趣所有眾生皆是我等昔日父母如是安置則不虧孝子之心若父母已亡既安靈座但平等供養功德尤殊勝爾若專為現在父母亦於兩向別為設座請父母坐於晝夜中獲聞大法熏成種智此乃孝子慕如來之至養者也過現父母佛菩薩道場左右把香焚兩向從來各有分五趣四邊情更切老聃孔子告猶勤聖凡合處忘人我名姓陳來檢疏文安置為何知不二如來聖訓總難聞道場合用儀當演凡設此齋先置生命四十九數或一百八或不限數不問飛沈皆可釋放又造五色彩幡長四十九搩手或隨父母形量寫父母名而挂佛前以表父母常在佛前也又以淨財安排五分每分一百二十文五分者供養佛法僧父母也百二十者表孝行錄中百二十門孝也或有父母著不淨衣服或是未經著皆可奉獻法華經云名衣上服價值千萬或無價衣施佛及僧此數者多見經文非誑惑爾而世人為幽冥奏納或不限數又欲得上妙衣方可堪之如諸佛菩薩福德具足世無以加只以兩文三文奉之豈表施心殊勝然布施者誠人情之難能也人苟能其難能其為善不可至乎語曰如有博施於民而能濟眾可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸蓋言聖人難之亦恐其未能為也佛必以是而勸之者亦釋人慳吝之心故也若慳吝之心未息則布施之福不臻又見國王擲衣與彼裸衣女子衣纔被體業火自焚如是至三竟不能得若專為奏禭衣者彼果得耶是不得耶若已生於人天之中則自有衣服莊嚴若尚滯三途縱得好衣如何被體敢明正理宜切遵依大方便佛報恩經熏沐投誠建法壇婉若在世日承歡放生以數佛有訓布施將錢人所難須信懸幡亡脫化不然衣擲火摧殘兒孫若把慳來破過去親心永得安道場警策儀當演佛言世間之人行二種行即得現報一者供養三寶二者悖逆二親於現世中便得苦樂二受如阿闍世王犯殺逆罪身生惡瘡投佛謝愆重苦解除以得輕受良可證也又言於父母所少作不善得大苦報少作善事得大樂報慈童長者之得失可不思之經云末法之時孝順者少背恩者多圭峰云富貴者荒於財色貧賤者迫於饑寒此乃煩惱無明使之然也我今警策大眾各各追念所生恭恪一心端莊三業皈命三寶奉事雙親或發菩提大心或修菩提大行或興大願或運大悲念念精專心心勇猛切勿耽荒放逸掉舉昏沈天地降災悔何所及報恩德菩薩摩訶薩警策原從一念生香燈掩映法壇清欽尊三寶神偏凜悖逆雙親報不輕闍世悔心消積苦圭峰誡語釋無明會須猛勇為佛事福祿來臨萬事亨道場勸勉儀當演此方聖人曰儒曰道西方聖人字之曰佛如鼎足三不可闕也雖然為善不同究竟同歸於孝清淨法行經云吾遣迦葉示為老子又遣淨光童子示為仲尼老子曰吾師化遊西竺善入泥洹孔子曰西方有大聖人不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉且三教聖人何故如此相是後世學者何故如此相非君不見明教大師云人情莫不專己而略人是此而非彼非過則爭專過則拒君子通而已矣何必苟專君子當而已矣何必苟非或曰儒教存中庸老教存道德則性命之說著矣何必俟佛而明答曰中庸乃性之造端欲人知也道德與性命之指深欲諸人也佛教盡性命之圓極欲人究也故今遍舉佛者俾令我等父母德道之極故也伏望大眾消磨彼此之見泯絕是非之情以一乘之教門酬二親之罔極更望大眾互為主伴而表率之皈依海會聖賢眾欲垂勸勉仗諸天為想高堂結佛緣三老化身皆助釋一乘妙理定宗禪指迷始破眾生惑篤孝當為明教先遵奉大師應有戒是非消卻道場圓加持香水灑淨真言至淨十方真言表揚咒水儀當演伏以諸佛從真如海起大悲心眾生入塵勞門由煩惱障所以現身現土莫不利物利人顯教則十二分經總持乃一切密語持誦之者觀想之流或見或聞或信或受則乃背塵合覺如還丹點鐵以成金決然入聖超凡若片幡遇風而至海今茲勝會普度有緣四生六道感應而來十地三賢混融無礙法事所務咒水為先憑仗伽陀即成甘露滅瞋心之業火潤功德之叢林灑道場則濁穢頓除霑會眾則塵勞解脫變飲食則法喜禪悅化黑暗則智慧光明然後悟法水之真空登菩提之妙座報恩法會所謂廣大勝緣普與含情同歸華藏報恩勝會啟壇場密咒醍醐甘露漿安息飛煙雲霧捲蘭膏發焰慧燈光緇流濟濟皆精潔賢聖巍巍盡讚揚法雨滿空甘露灑道場何處不清涼南無無垢淨光佛加持淨衣真言大悲咒加持一切如來淨身口意真言六部咒加持甘露水真言大明神咒經加持灑地水真言諸部因緣加持直字梵語心經陀羅尼歌讚一缽寒泉蠲除熱惱功勳莫可量注想曹溪水別來幾度春光靈源湛寂灌清淨醍醐甘露漿霏法雨楊枝灑處遍滿壇場普願沾濡使含情皆蒙出苦鄉餓殍焦面了悟自性真常我今法會仗密語伽陀咒讚揚周沙界無人無我盡獲清涼南無清淨慧菩薩回向摩訶般若波羅密大明咒經觀自在菩薩行深般若波羅密多時照見五蘊皆空度一切苦厄舍利弗色空故無惱壞想受空故無作想想空故無智想行空故無識想識空故無覺覺想何以故舍利弗非色異空非空異色色即是空空即是色受想行識亦復如是舍利弗是諸法空相不生不滅不垢不淨不增不減是空法非過去非未來非現在是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦寂滅道無智亦無得以無所得故菩提薩埵依般若波羅密多故心無罣礙無罣礙故無有恐怖遠離一切顛倒夢想苦惱究竟涅槃三世諸佛依般若波羅密多故得阿耨多羅三藐三菩提故知般若波羅密多是大神咒是大明咒是無上咒是無等等咒能除一切苦真實不虛故說般若波羅密多咒即說咒曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶止如來廣孝十種報恩道場教誡儀文漢洲綿竹大中祥符寺住持常講華嚴海印大師思覺集第一時開壇請佛豎宗立教皈依法身毗盧佛皈依報身盧舍那佛皈依化身釋迦佛重伸教誡比丘某稽首和南謹白大眾今此道場欲報父母大恩再於佛前重伸教誡各各善思奉親報本伏聞三德之基人倫為主百行之首孝道為先是以太昊炎帝謂之務本武王周旦稱曰大哉至如訓子憂於色難示子遊於知敬先王奉法乾象著名哲后尊親山川表瑞遂有青鷹合節白雉馴飛墳柏春榮潛魚冬躍傳之邦國政令型於四海用之鄉人德教加於百姓況釋迦佛五趣齊現而大悲佛三會普收嬰兒引導於勝觀太子推稱於勝日月光月雲母子互讚藥王藥上兄弟現通俱使出邪途盡令歸正道必欲親證小果彌勒功能母發大心辟支恩力目犍連飯持一缽須闍提肉割三斤海水為之波騰須彌為之搖動賧子誤死國王悲哀德護著邪童子幾諫光目女供僧則脫母苦於九泉之下須彌多見佛則受親記於大會之中須知教光功越於恩光法乳味甘於血乳普使得全慧命長保法身無量壽佛已證菩提由福焰王子順理逆情之力寶花如來今成正覺實威德太子聞法讚佛之功夫天上天下之尊尚不忘於誕育佛前佛後之子安敢昧於生成所以今日苦口叮嚀勸勉會中各希猛省共報大恩俾令歷劫親緣得滿十種利益所謂得壽命故獲富饒故離災難故值好眷屬故壽終不墮三惡道故不生卑賤故常受人天身故得生佛淨土故乃至究竟出離三界故成就佛果故憶佛菩薩是人之子我輩亦是人之子佛菩薩度親已訖我輩今日何為若願度親當發菩提大心而為其本向下敘述發菩提心因緣伏願大眾各各志誠如法諦聽今此第一時開壇請佛豎宗立教法事分為二十四節勸發菩提心勸發四心參禮三寶清淨三業薰香供養灑淨潔滌淨壇結界散花行道白佛敘意嘆佛宣疏禮請上聖啟祝聖賢召集神祗豎宗立教儒釋以孝為宗明孝所因正明苦行因緣返生慰勞因孝成佛方便化導父母為父母轉大法輪究竟奉親普勸大眾讚十種恩且第一勸發菩提心夫菩提心者即覺心也眾生本有昧而不知常興無明而供止住菩薩由之廣興萬行諸佛由之而般涅槃故華嚴經云菩提心者猶如慈父訓導一切諸菩薩故菩提心者猶如慈母生長一切諸菩薩故菩提心者猶如乳海養育一切諸菩薩故菩提心者猶如善友成益一切諸菩薩故佛報恩經云菩薩摩訶薩知恩者當發阿耨多羅三藐三菩提心報恩者亦當教一切眾生令發阿耨多羅三藐三菩提心昔有轉輪聖王已發大心遂告五百太子言汝真實孝子者當發菩提大心時五百太子聞是語已感父母故尋聲即發菩提大心今日今時敢問大眾能為父母於此菩提大心能發不能發答能發既能發已宜在堅持縱遇熱鐵輪此心無退轉各發無上菩提心第二勸發四心眾等雖發大心了知心體廣大圓滿包含一切森羅萬像皆現其中父母宗親皆不外此然不能起大方便作大津梁者為體中缺用故也是故重勸會眾又發四心庶令體用雙彰理行俱顯所謂四心者即孝順心設供心拔苦心報恩心者也且分為二一約世間二約出世間且約世間者為父母之教令奉父母之甘旨即孝順心也值父母之誕辰延父母之壽考即設供心也進父母之醫藥免父母之病惱即拔苦心也承父母之顏色念父母之生成即報恩心也若約出世之孝者息父母造惡之念發父母作善之心即孝順心也勸父母不捨成正覺之因令父母不捨度眾生之願即設供心也於六趣中出父母分段生死之苦於三乘中出父母變易生死之苦即拔苦心也非但度脫一世父母必欲度脫歷劫父母即報恩心也又如阿闍世造五逆罪非孝亦非順也董黯報讎雖孝非設供也郭巨埋兒雖孝非拔苦也樂春不出雖孝非報恩也又忍辱太子療父亦孝亦孝順也福焰王子施佛亦孝亦設供也光目女子飯僧亦孝亦拔苦也淨藏淨眼回邪亦孝亦報恩也會眾若能依佛言教行佛孝行當具發四心具行四行敢問大眾能為父母於此四心能發不能發答能發既能發已切在行持此心即是佛心此行即同佛行如此則佛不請而自現神不召而自來罪不懺而自消福不求而自至悖逆者自生敬愛毒惡者必啟慈心若發無上菩提心則指日可待者也各發無上孝順心各發無上拔苦心各發無上設供心各發無上報恩心加持發菩提心真言堅固菩提心真言第三參禮三寶佛是三界大師法乃群生眼目僧具六和上士並為真淨福田背之則邪順之則正我今皈命建立道場惟願慈悲加持覆護眾誦讚嘆三寶陀羅尼信禮佛法僧三寶南無一心奉請十方三世一切諸佛諸大菩薩摩訶薩眾聲聞緣覺一切賢聖願共諸眾生一心頭面禮大眾志誠心同嘆三寶偈法身報身及化身經律論藏甚深文開迷化導阿羅漢參禮南無佛法僧眾等各運志誠一心頭面敬禮波羅蜜滿足淨性覺智慧勝心得成就故號名為佛過現未來常住佛寶眾等各運志誠一心頭面敬禮無染性清淨永離於世間不觀世五陰常住名為法過現未來常住法寶眾等各運志誠一心頭面敬禮身心常無為遠離四種食為世良福田故稱和合僧過現未來常住僧寶投疏加持三寶滅罪真言止開壇門部陀羅尼法不孤起仗境方生法隨法行建立法幢法幢既立必有因由今此道場寧無由致先當入壇清淨三業焚香灑淨淨壇結界散花行道以為佛事先當清淨三業三業論文法師布露伏聞色身危脆始從虛偽而生六欲不迷要會真空之理蓋為妄生十惡縈纏業垢俱蒙若非秘咒洗除難使真金離礦欲得一身清淨多身清淨方可登壇頓令上根修行中根修行只教契理淨三業咒振鐸誦持眾等三業肅恭六根慶快請三藏法師誦淨三業偈身口意業本來同一念纔迷失本宗喝散障雲無點翳一輪杲日照當空除蓋障菩薩淨三業真言三業六根悉清淨伏聞纔炷龍涎非泛常之臭味便同麝腹有分外之馨香要知五分法身別是一般氣息也何用調和之法又不因薰染之功信手拈來直穿透諸人鼻孔從頭爇處聊表出檀那善根庶機感格於聖賢可以充塞於天地氤氳無盡空中結寶蓋而低垂紛馥有餘座上噴篆煙之縹緲更憑神咒以表信心五分法身真妙香人人具足露堂堂無根樹下親拈出供養如來大法王香供養菩薩焚香真言香嚴童子大菩薩伏聞妙湛靈源無三世十方之影像真空性水現六凡四聖之波瀾遶華藏世界而來從阿耨達池而出滔滔覺海浩浩潮宗何妨細灑楊枝莫不普霑香水洗心滌慮如八德之清涼激濁揚清同一時之瀟灑更憑神咒盡化醍醐灑淨有偈今為舉揚八功德水自天真善洗眾生業垢塵流入毗盧華藏界個中無處不超倫楊枝手菩薩灑淨真言壇場內外悉清淨大集無邊弗留一新寶坊法華有謀皆同三變淨土鶖子不如螺髻祗園何異鷲峰毫端中現一切道場拂子上有三世諸佛矧茲勝會普徹上方浩浩難思放佛光於壇壝重重無盡如帝網之寶珠更仗密言莊嚴法席聚沙成塔亘青天舉止分明在目前法界道場瀟灑處自然湧出一枝蓮淨壇場菩薩淨壇真言雪山童子大菩薩域民不以封疆為界有德則來海眾盡列華藏之都無往不利將奉佛於不可及之處先遣魔於無何有之鄉便同寶地莊嚴自有金剛圍遶九十六種惶惶破膽千萬億眾拳拳服膺纔聞振鐸琳琅莫不列堵清淨荊棘林中業火生經由大地任縱橫金剛結出摩訶力直向如來行處行尊勝幢菩薩結界真言結大界菩薩桃花換卻眼睛不知誰悟蓮香穿透鼻孔返被人嫌仰天攀桂而來撥雪探梅而去更休問姚黃魏紫也莫辨李白桃紅帝釋勘破空生二俱有過天女簸弄鶖子一向無端如今開啟法筵且與拈提公案翠浮霞彩紛紛飄下九霄濃剪白花馥馥散來四座一花五葉祖師傳淺白深紅有萬般晏座岩前無法說紛紛墜落紫雲端寶曇花菩薩散花真言花供養菩薩止仰告諸佛諸菩薩誦梵相讚如來妙色身世間無與等無比不思議是故今讚禮願共諸眾生一心頭面禮如來色無盡智慧亦復然一切法常住是故今讚禮願共諸眾生一心頭面禮如來智慧燈同嘆一切僧能生三世佛是故我皈依願共諸眾生一心頭面禮仰告諸佛諸菩薩第九白佛請聖伏聞凝然一相釋迦不會而迦葉難傳大矣雙親忉利歸寧而迦維往省人人法爾佛佛道同法身慧命本自圓明病眼空花原來妄現蘊貪瞋癡之業種惱害所生墜戒定慧之聖胎甘為夭折累劫改形易報何時返照迴光此日今時報恩設供比丘某稽首和南至誠仰告報恩海會諸佛菩薩三界四府萬靈十方滿空賢聖今當第一時宣演如來行孝法門開導人天覺路伏願諸聖不捨慈悲加持覆護願此法音周遍法界凡見聞者悉皆迴光依教修行不違恩養普及一切同證菩提皈依大孝釋迦佛百億剎中號大雄四王捧足誕皇宮遊城知苦觀假幻入騎雪山了悟空阿耨乳恣金色相菩提樹下玉毫容獨尊十號天人主開教源流剎海中加持警覺如來出定真言已滅瞿曇未生彌勒像季法弱魔強迷頭認影終日只顛狂鬥爭人我堅固毀正法違背爺娘華報現三災八難苦海絕津梁我師龜鑒報恩設供火急迴光圭峰明教慈覺為提綱世出世間行孝思罔極正好承當斯法會難遭難遇信手炷心香南無大孝釋迦牟尼佛第十嘆佛宣疏今此道場會主即是本師釋迦牟尼如來先當總伸讚禮本師德業然後運心平等敬禮眾等當禮拜時如法應和稽首三界主大孝釋迦尊累劫報親恩積因成正覺將永錫眾類應請演斯經欲使報恩人咸能酬罔極仰告諸佛諸菩薩世尊功德難盡讚揚具有疏文謹當宣讀宣一時疏文入意至稽首和南志心仰告真淨法界海微剎土中敘聖位如禮文敘願意至香燈告就具疏虔誠禮請上位聖賢者伏願天花瑞像巍巍堂堂而直下寶階白毫相中燦燦爛爛而遍周沙界一真獨露五趣皆空凡我有情人同證無生忍仰冀覺慈俯遂凡懇和南謹疏外壇化納凡情上達大圓鏡加持諸佛願智真言第十一禮請上聖經云凡禮拜時須得五體投地先發大願然後作禮作如是言我今五體於佛作禮為斷五道離於五蓋願諸眾生無壞五道具足五眼願我右膝著地之時令諸眾生得證覺道願我左膝著地之時有著邪見者令住正法願我右手著地之時如佛手指著地震動現瑞證大菩提願我左手著地之時於諸外道以四攝法而攝取之願我首頂著地之時令諸眾生悉得成就無見頂相眾生各各深會此言發願作禮加持禮拜真言志心皈命禮法身不動化現隨緣真慧日之騰空實曇華之應世二千年前為真孝子三千界內作大醫王累劫報恩忘軀命而難捨能捨三祗成道度父母而從生至生併眾苦於一身火輪墮地攝雙親於五趣毫相遶身說法九夏而安慰摩耶身湧七多而攝受淨飯願王報本道力寧親大慈大悲大孝釋迦牟尼佛伏願開為親之方便運同體之慈悲攝受報恩人同行出世孝慈愍故悲愍故大慈悲愍故加持佛頂奉請印咒請一切諸佛咒請釋迦佛咒請聖賢咒信禮大孝釋迦佛炷香禮請聖賢禮拜能除我慢障禮拜能感尊貴身禮拜能滅七支愆禮拜能生三業善今當禮請報恩會上諸佛菩薩降臨道場受請供養誠心仰請報恩會上此法會中一時禮請清淨法身毗盧尊師圓滿報身盧舍那佛三類化身釋迦文佛伏願慈悲憐愍俯降道場為我報恩作大利益誠心仰請報恩會上此法會中一時禮請成利慧佛勝日身佛勝光佛雲雷音宿王佛華智佛覺華定自在王佛清淨蓮華目佛伏願慈悲憐愍俯降道場為我報恩作大利益誠心仰請報恩會上此法會中一時禮請無量壽佛寶華佛彌勒佛十方三世一切諸佛伏願慈悲憐愍俯降道場為我報恩作大利益誠心仰請報恩會上此法會中一時禮請文殊普賢二大菩薩觀音勢至二大菩薩藥王藥上二大菩薩天藏地藏二大菩薩伏願慈悲憐愍俯降道場為我報恩作大利益誠心仰請報恩會上此法會中一時禮請無垢光女菩薩月光童子菩薩大自在天子菩薩迦葉菩薩淨光童子菩薩諸大菩薩摩訶薩伏願慈悲憐愍俯降道場為我報恩作大利益誠心仰請報恩會上此法會中一時禮請阿難目連二尊者辟支伽阿羅漢眾圭峰禪師慈覺禪師明教大師遍法界中報恩海會一切聖賢伏願慈悲憐愍俯降道場為我報恩作大利益上來禮請報恩海會諸佛菩薩已沐雲臨道場伏願天眼遙見慧耳遙聞他心遙知神通遙鑒以大悲力啟無緣慈憐憫有情哀受我請慈悲護念降臨道場證盟此齋充遍法界願此善力廣大無邊猶若虛空具諸功德奉請已一心皈命禮常住三寶加持諸佛集會真言至蓮華捧足真言第十二啟祝聖賢經云十方諸佛各告眾言釋迦如來為諸大眾說報恩經為欲饒益諸眾生故為欲拔苦眾生邪疑毒箭故為初發心菩薩堅固菩提不退轉故為令二乘究竟一乘道故為令菩薩速成菩提報佛恩故為令眾生念重恩故欲令眾生越苦海故欲令眾生孝父母故又按陀羅尼經云奉請釋迦牟尼佛當坐道場中一心卻坐合掌瞻仰世尊即以偈誦三面讚說頂禮捧足即得如來加持護念眾等志誠如法應和南無佛智慧清淨那羅延力骨鎖身波羅蜜多六度行大慈悲父常為人加持如來護念真言外壇拜召陀羅尼力信無邊普召含靈在佛前由恐四生中漏落更祈六道外招筵淨壇坐遣香雲去陰界遙聞寶鐸傳願自會中生樂國不辭佛敕為重宣炷香設禮南無越三界菩薩第十三召集神祗上來禮請諸佛菩薩已沐降臨今當召集神祗普伸津濟故修行地道經云若有修行見始終患所謂地獄之毒餓鬼之苦畜生之惱人中憂悲天上無常不可堪矣又無始來與父母違兄弟離間涕泣流淚超於大海飲親之乳逾於江漢設積身骨過須彌山其髓塗地可遍天下其血流墮多天下雨或父哭子或子哭父顛倒上下不可紀極修行自察如是之厄積功累德欲度一切視之如父視之如母視之如子視之如身等無有異為六道人對苦無量雖歷五道生死之患心不回動行大慈悲救濟十方免眾想念當如是觀五道眾生無非父母今欲召集發願為先今依大方廣佛華嚴經發大誓願眾等志誠如法應和孝養父母當願眾生善事於佛護養一切見報恩人當願眾生於佛菩提能知恩德見背恩人當願眾生於有惡人不知其報加持天龍八部真言普召請真言菩薩遍觀於六道莫非皆是宿親緣普伸召集赴香壇願奉旨甘並法施唵引阿鼻娑摩耶拔折黎達囉囉吽唵引俱嚕陀娑婆提婆那耶莎嚩訶天道咒唵引俱胝俱胝俱那哩遮哩娑婆訶修羅咒唵引阿訶滯伽耶摩訶帝難陀經底摩訶滯答鍐娑婆素喃娑婆訶人道咒唵引摩訶梵摩訶耶伊呬伊呬娑婆訶畜生咒唵引娑婆枳吒耶伊呬伊呬娑婆訶餓鬼咒唵引莎婆提婆迦羅賀那娑婆訶地獄咒唵引俱摩哩吒娑婆訶六道咒唵引娑婆者陀囉尼伽囉耶娑婆訶鬼神咒唵引暮伽迦履沙野吽普召請咒唵引步步哩怛他伽哆耶唵引薩婆薜荔哆誐囉沙伊呬伊呬婆婆訶止南無香雲蓋菩薩拜召下凡今當召請下凡有情眾等志誠如法拜請香花一心奉請遍法界中一切天仙道眾伏願承佛神力降臨道場攝受報恩速求解脫香花一心奉請遍法界中一切人倫道眾伏願承佛神力降臨道場攝受報恩速求解脫香花一心奉請遍法界中一切修羅道眾伏願承佛神力降臨道場攝受報恩速求解脫香花一心奉請遍法界中一切地獄道眾伏願承佛神力降臨道場攝受報恩速求解脫香花一心奉請遍法界中一切餓鬼道眾伏願承佛神力降臨道場攝受報恩速求解脫香花一心奉請遍法界中一切畜生道眾伏願承佛神力降臨道場攝受報恩速求解脫香花一心奉請道場會主二門四門歷代宗親當齋亡者含靈等眾伏願承佛神力雲集道場同前信禮解脫月菩薩上來仗佛神力召請六道有情已竟運動法樂歸壇奉安我以大悲佛神力召請冥陽諸有情曠劫饑虛餓鬼等不違佛勅來降臨炷香設禮益聞一靈真性本無去以無來四大幻身乃有生而有滅虔爇信香恭伸奉安香花一心奉安遍法界中一切天仙道眾修羅人倫地獄餓鬼畜生道眾以上同前伏願靈通萬物心配三才由五種之業根迷一真之佛性人身失卻趣類托生輪迴逼迫於多生寒苦侵淩於萬物今憑大覺建設法筵禮蓮臺而返本還源不生不滅聞正法而超凡入聖無去無來出娑婆之苦海生華藏之玄都面奉玉毫親蒙授記上來安奉已竟大眾志誠稱誦五如來聖號南無寶勝如來南無廣博身如來南無妙色身如來南無甘露王如來南無離怖畏如來若人稱念此名者所生之處多饒財寶離諸貧乏所獲身量如淨琉璃人所喜見處大眾中有大名稱我等今日與諸有情得聞此經願罪消滅後二句重念稱念大般若波羅蜜經一切有為法如夢幻泡影如露亦如電應作如是觀稱念大寶積經假使百千劫所造業不忘因緣會遇時果報還自受稱念大方廣佛華嚴經若人欲了知三世一切佛應觀法界性一切惟心造稱念大般涅槃經諸行無常是生滅法生滅滅已寂滅為樂如來證涅槃永斷於生死若能志心聽常得無量樂小乘四諦法門苦聖諦集聖諦滅聖諦道聖諦中乘十二因緣法門無明緣行行緣識至憂悲苦惱滅大乘六度萬行布施般若波羅蜜持戒忍辱精進禪定智慧摩訶般若波羅蜜皈依三寶皈依諸如來五智十身佛皈依最上乘自覺真如法皈依不退轉大悲菩薩僧聞經佛子罪消滅上來仗佛神力安奉已周法樂回壇大眾志誠心同誦灌沐偈我今灌沐諸如來淨智莊嚴功德聚願五濁人今離垢同證如來淨法身淨身器菩薩摩訶薩加持灌頂清淨真言施無畏真言是諸眾等人各胡跪嚴持香花如法供養加持五供養真言普供養菩薩摩訶薩止如來廣孝十種報恩道場教誡儀文終
