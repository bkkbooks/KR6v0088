body:
  text: 壇前教誡加持啓白諸聖真言大圓鏡智常清淨法界真身遍十方我今啓白作加持洞鑒圓明臨法會唵引鉢頭麼步惹摩訶播拾陀囉尼曼怛囉耶彌暮伽嚩囉耶步嚕步嚩薩畝嚕畝嚕吽止加持香水灑淨真言毗盧身土曾無際塵界交參廣狹融無明無垢妄情昏法水霑時心垢淨南無三滿哆勃陀喃阿鉢囉底三迷伽耶三迷三摩哆奴揭諦鉢囉吃嘌底微輸睇達摩馱睹微輸達你娑婆訶淨十方界真言唵引入嚩哩哆摩尼盧囉室哩尼𤙣𤙣癹吒止加持淨衣真言妙身金色銖衣襯紺頂螺紋百寶嚴如來藏內德塵沙密語宣時皆顯發唵引娑囉婆怛哆伽陀跋折梨你陀囉陀囉虎吽唵引摩尼毗布梨地哩地哩虎𤙣癹吒止誦大悲咒加持一切如來淨身口意真言身三口四多諸業意識攀緣造本根返源塵相日消冰念念圓成無漏善那謨薩嚩勃陀菩提薩埵喃唵引戌殿都奈囉秫陀那耶娑婆訶止誦六部咒加持甘露水真言法界靈源真性海流為甘露廣無邊願憑法力灑幽途普使清涼除熱惱那謨婆伽嚩帝素嚕婆耶怛哆蘗哆耶怛姪他唵素嚕素嚕鉢囉素嚕鉢囉素嚕薩婆沒馱地瑟恥帝娑婆訶止大明咒經加持灑地水真言濁世紛紛多垢染六塵境界妄攀緣我今灑地誦真言庶使壇場無穢濁唵引阿暮伽沒履嚲嚩利娑婆訶止誦諸部因緣直字梵語心經陀羅尼鉢囉娘鉢囉密哆逆鄰那野素怛囉阿梨耶嚩嚕吉帝濕嚩母囉帝薩埵沒嚴鼻藍叭囉娘波囉密多左焰左夜嚩汝夜嚩嚕伽耶底薩麼畔左思蹇多薩埵寫娑波波嚩戌涅波設帝娑嚩易賀舍利卜怛囉戌涅戌涅多嚩汝耶嚕畔那波那戌涅多戌涅多耶那波那雪嚕畔耶汝耶嚕畔莎戌涅多耶戌涅多娑嚕畔易嚩微嚩吠那曩散虔娘散娑婆伽囉尾虔娘南伊賀舍利卜怛囉莎囉嚩達麼戌涅哆沒叉拏阿耨多畔左阿寧也嚕他阿麼囉阿耨耶摩那阿拏那阿婆離布囉拏他娑沒舍利卜怛囉戌涅馱耶戌涅多娑嚕畔曩吠那喃娑伽娘娑娑伽囉尾伽娘曩研初楚嚕怛囉伽囉拏即賀婆伽耶摩那枲雪嚕畔扇答研答囉娑娑叭囉瑟吒尾演達麼曩斫初大都那微涅那微涅叉欲那微涅叉欲夜嚩那左囉嚩囉喃那左囉嚩囉那叉欲那奴伽三昧陀耶寧嚕他嚩實憐娘尾伽娘那叭囉微帝那脾三摩耶多婆沒那波囉微帝薩埵沒底薩埵喃鉢囉娘波囉密多嚩室憐也尾賀囉耶只多嚩囉拏只多嚩囉拏南悉體達摩耶叭囉速都尾波哩薩羝迦𩕳寧瑟吒寧哩摩囉的鄰達摩耶嚩昔底多薩埵沒馱叭嚩娘波囉密多嚩室鄰也拏答覽三藐三菩提麼鼻三沒多嚩室鄰娘微演叭囉娘波囉密多摩訶曼怛囉摩訶微欲曼怛囉阿耨多囉曼怛囉阿娑摩娑鼻曼怛囉薩嚩奴佉鉢囉舍摩那莎底也摩舍讚演達摩叭囉娘波囉密多暮忌都曼怛囉雪帝雪帝波囉雪帝波囉僧雪帝菩提莎嚩訶止歌讚回向第一時開壇請佛加持發菩提心真言建設報恩清淨會發心觀想趣菩提大悲願力廣無邊四種大心常不退唵引菩提即答毋怛婆那耶銘堅固菩提心真言塵剎劫中修苦行鐵輪磨頂苦無邊為求法出火坑中念念進修永堅固唵引即答巴臘底未能迦嚕彌止讚嘆三寶陀羅尼南無佛陀耶瞿嚕吠南無達摩耶馱以彌南無僧伽耶摩訶帝諦毗舍左迦摩囉穆佉迦摩囉路左曩迦摩囉薩那迦摩囉賀薩多迦摩囉娑敏𩕳迦摩囉三婆嚩薩迦囉麼囉乞叉囉南無窣都帝止加持三寶滅罪真言三身四智俱圓滿五教三宗悉混融方袍圓頂火中蓮密語誦持同讚德南無娜婆婆羝那𤙣三藐三菩陀俱智那吽南無娜婆婆羝那𤙣達摩俱智那吽南無娜婆婆羝那𤙣僧伽俱智那吽多姪他唵引摩隸毗麼隸昵麼梨麼梨薩婆跋婆迦生羯梨娑婆訶止開壇門部加持淨三業真言業垢本來無自性還因妄執起根塵但存一念妄不生業性了然無可得唵引薩嚩婆皤秫陀娑嚩達摩娑嚩婆嚩秫度含止焚香真言信心一念周沙界五分香雲遍十方願憑感格聖賢心寶網中齊出現唵引鉢折囉杜鞞惡止灑淨真言華藏海波融性相閻浮檀水自清涼今將密語更宣揚遍灑道場周沙界南無三滿多沒馱喃阿鉢囉底三迷伽耶三迷三滿多奴揭諦鉢囉乞嘌底微輸睇達摩馱都微輸達你莎婆訶止淨壇真言凡地輒將嚴法席唯憂垢濁未蠲除金仙祕密舉揚時所冀香壇悉清淨唵引囉儒祖跛誐多薩哩嚩達摩止結界真言唯是娑婆多穢汙邪魔外道悉侵淩今將密語淨香壇憑此結成金剛界唵引商伽迦哩摩訶三昧耶槃陀槃陀娑婆訶止加持散花行道真言已淨香壇無垢濁結成地界悉嚴持我今敷演妙伽陀散衆寶花陳供養唵引暮伽阿拏舍蹉耶鉢頭麼蔓杜利吽空際飄飄成不斷坐中燦燦色尤鮮聖人結習已消除身相居然無染著唵引薩婆怛他伽哆布度摩你𤙣吽止加持警覺如來出定真言如來妙證金剛定海印森羅不動搖初無出定遍群機警覺龍天歡喜護唵引鉢頭麼播舍陀囉暮伽婆囉那散注那野吽止加持啓白諸佛願智真言聖人本自心中現情見難忘著相求即心即色兩無妨一念才興知見了唵引薩婆怛他伽哆喃嚩庾杜鞞多囉吽哆囉吽摩尼迦那寧耶娑婆訶止加持禮拜真言無始劫來生我慢恰如山嶽聳千尋我今投地禮如來願使慢山俱破碎南無陀舍喃蒲陀俱知喃唵引護嚕護嚕悉陀盧者你薩婆羯他娑達你耶娑婆訶止加持佛頂奉請真言佛念衆生過父母同於形影不乖違輒憑祕咒表丹誠願賜慈悲垂降赴唵引吽迦摩囉那娑婆訶加持一切諸佛真言唵引蘇微布囉鉢囉鉢囉嚩哩杜嚕吽杜嚕吽加持釋迦牟尼佛真言南無三滿多勃馱喃薩婆乞麗奢涅素捺那薩婆達摩嚩始多鉢囉鉢多伽伽那三摩三摩娑婆訶加持諸聖真言多姪他阿伽車阿伽車婆伽畔阿梨耶婆嚕枳帝攝婆囉耶囉怛那怛囉耶薩帝那娑婆訶止加持諸