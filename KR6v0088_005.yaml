body:
  text: 漢州綿竹大中祥符寺住持長講華嚴海印大師思覺集第三時真俗混融法事分為十八節啓白敘意懺悔罪愆警策大衆宣疏禮請廣陳供養真俗混融敘法供養勸父母皈依三寶勸持五戒勸修四諦勸修中乘勸修六度勸修一乘法門勸父母成佛普勸大衆勸修觀想讚禮行香設散禮別賢聖第一啓白敘意伏聞古佛未生誰為之父而誰為之母混元既判以辨乎陰而以辨乎陽豈知無陰陽地原在目前須信先父母身非從他覓摩耶幻生諸佛淨飯返拜如來文殊乃傑出小男普賢真絶倫長子以一乘三乘為至養修五戒十戒為正因統法界於我家攝光明為眷屬塵塵出現法法全彰從前貪愛恩情全是智悲行願倘不皈依覺路爭能履踐法門比丘某謹與會主某稽首和南一心仰白報恩會上諸佛菩薩三界四府萬靈十方滿空賢聖今當第三時中將升寶座宣演法門願我音聲遍周法界普使聞者各各回光會三乘而入一乘融五性而皈一性十身滿足萬德俱圓慈愍故悲愍故大慈悲愍故信禮海會佛菩薩第二懺悔罪愆三業六根不無違理損物五逆十惡未免帶果招因今欲報二親之深恩須當懺五逆之重罪志心奉為今生父母歷劫親緣法界含情道場懺主並皆明悟一一斷除業障今當懺悔自有後文大衆志誠如法應和弟子衆等合道場人奉為四恩一切父母自從無始曠大劫來捨身受身越塵沙劫惱亂父母不可稱量從生至生改形易報不復相識豈念生成造作無邊五逆重罪或有父母已證菩提我不自知返出身血或有父母住聲聞乘我返於他斷其身命或有父母作比丘僧我亦於中破壞和合或有父母墮在三途或趣邪論或生邊地或居三界或住三乘或處富饒或淪下賤舉手所指縱目所觀此界他方無非父母我於如是彼等親緣棄恩背恩或殺或害或於今世不孝尊親甘旨全無朝昏不顧由斯業力枉受輪回今遇正因深生慚愧誓於今日稽顙皈依願聖慈悲攝受懺悔不孝五逆盡獲消除改往修來更不敢造願罪消滅願罪消滅願罪消滅多生五逆罪消滅誦阿閦神咒無邊惡業罪消滅加持普懺罪真言上來懺悔已遂周諧罪障既消應須發願大衆志誠如法應和願我孝心不退轉願我孝行速周圓願我父母證菩提願我子孫存至養願此功德周沙界普施六道諸有情同歸無上涅槃門盡泛毗盧華藏海隨心所願皆圓滿加持釋迦説懺悔真言第三警策大衆上來懺悔發願已遂周諧今當警策衆等各各發志誠心如法應和道場清淨衆各各當志心志心勤皈依志心勤禮拜大聖大慈悲釋迦牟尼佛唯我釋迦尊能行於大孝唯我釋迦佛能報於大恩是故我等衆今日須控告惟願聖慈悲開受我等請令我於父母能酬廣大恩令我於父母能宣廣大法能化悖逆者令生孝順心盡出苦泥犁同生佛淨土念我無量劫常生不孝心違背父母恩無由得解脫我從今日去遵奉如教行常發菩提心常修普賢行功德俱回向父母及宗親行願悉圓滿同證菩提果願佛加護我不使墮邪途假使鐵輪旋此心無退轉三白信禮大孝釋迦牟尼佛第四宣疏禮請大衆志誠心同誦讚佛偈智慧高廣山峰嶺極嚴峻溪谷深俱曠清泉常流滿以愍所生母普及於一切願速聞正法悉令衆聽受信禮海會佛菩薩宣疏凡情上達大圓鏡加持諸佛願智真言至禮拜真言炷香禮拜能除我慢障禮拜能感尊貴身禮拜能滅七支愆禮拜能生三業善今當禮請報恩會上諸佛菩薩光臨道場受請供養誠心仰請報恩會上此法會中三時禮請清淨法身毗盧遮那佛圓滿報身盧舍那佛三類化身釋迦牟尼佛成利慧佛勝日身佛勝觀佛伏願慈悲憐愍俯降道場為我報恩作大利益誠心仰請報恩會上此法會中三時禮請雲雷音宿王華智佛覺華定自在王佛清淨蓮華目佛無量壽佛寶華佛彌勒佛十方三世一切諸佛伏願慈悲憐愍俯降道場為我報恩作大利益誠心仰請報恩會上此法會中三時禮請文殊普賢二大菩薩觀音勢至二大菩薩藥王藥上二大菩薩地藏菩薩無垢光女菩薩伏願慈悲愍憐俯降道場為我報恩作大利益誠心仰請報恩會上此法會中三時禮請月光童子菩薩大自在天子菩薩迦葉菩薩淨光童子菩薩諸大菩薩摩訶薩伏願慈悲憐愍俯降道場為我報恩作大利益誠心仰請報恩會上此法會中三時禮請阿難目連二尊者辟支伽阿羅漢衆圭峰禪師慈覺禪師明教大師遍法界中報恩海會一切聖賢伏願慈悲憐愍俯降道場為我報恩作大利益上來禮請報恩海會諸佛菩薩聖衆已沐雲臨道場伏願天眼遙見慧耳遙聞他心遙知神通遙鑒以大悲力啓無緣慈憐愍有情哀受我請慈悲護念降臨道場證盟此齋充遍法界願此善力廣大無邊猶若虛空具諸功德奉請已一心皈命禮常住三寶蓮花捧足降臨來加持獻花寶座真言第五廣陳供養道場開啓法席精嚴既儀物以廣陳庶誠心之可表戒香定香雲騰霧靄智炬慧炬月映星輝優曇花吐帶祥煙菩提果熟凝甘露碧琉璃瓶內雪浮三汲趙州茶紅瑪瑙甌中霜清一滴曹溪水珍寶般般具足神珠顆顆光圓塗漿百味澄清膳饌五香精潔霞衣鮮彩品藥芬芳今將一一獻能仁望聖慈悲垂納受加持十供養真言普供養菩薩摩訶薩止第三時升座加持三寶字母真言南無大方便佛報恩經和大孝釋迦牟尼佛真俗混融儀當演比丘某伏聞慈覺禪師云夫孝也者有出家之孝有在家之孝出家者割愛辭親參微契本深入無為之理上酬罔極之恩此乃趣十力之要門報二親之捷徑非但未來獲益亦於現世成功所以如來子夜逾城道圓雪嶺盧能黃金遺母法繼黃梅是故華嚴經云父母及親屬宮殿及財産一切皆捨離謙下求知識雖則洞山和尚十種不歸趙州禪師不願再見為成道故以法斷恩然而道力有餘應思報德是以迦維省父忉利寧親至於貧乏無依理合躬親給侍是故畢陵迦起盡心之戒忍大師有養母之堂陳陸州織履供親朗法師荷擔遊學然則出家者以法味為甘旨而不忘返哺之心以佛事為勤勞而不違世諦之理非但一世父母而多生父母皆報非但一身父母而法界父母皆度同登覺岸豈止周公之配天普示迷津故逾考叔之純孝出家之士其利溥哉其或因緣未至父母不聽宜盡在家之孝勸修出世之因若能即俗而真亦有成佛之路經云兄弟二人為喪父母志念各異兄好道誼弟受家業弟曰凡為人子者當立功效繼續父母功勳不廢乃為孝爾兄曰五戒十善供養三寶奉行六度坐禪念定以道化親乃為孝爾道俗相反自然之數道之所樂俗之所惡俗之所珍道之所賤而智愚不同謀猶明暗不共處兄修行業得成道果弟受家業後生牛中兄又化之使令皈向得生天上是知世間之孝止於現身出世之孝盡未來際孝子應念人命無常過於山水雖得孝養日月無幾況乎三途長夜永劫沈淪雖有孝心如何濟度所以孝養父母之外更勸父母回心向道稱佛為師至成無上菩提方是報恩事畢夫孔子之説孝經終於喪祭者世間之機未熟也釋迦之行孝道纍劫報恩者出世之法如是也曾參盡孝之時惟知有世間之孝摩騰竺法之後又知有出世之孝方知古人深為慶幸事父母者可不勉哉於是輒覽真乘具明至孝反覬嬰兒之行無虧膝下之嚴報雙親顧復之勞致一乘圓滿之地遂使在家菩薩解行無疑出俗高人因斯可鑒嗚呼光陰易失父母難逢仲尼志風樹之悲子路有枯魚之嘆而況人身數少加之地獄時長既交臂而失之雖噬臍而何及若取一生事辦要須三復斯文普祈法界衆生盡獲金剛種智真俗混融見法身偉哉慈覺導迷津不歸只願求成佛再見無期待出塵以法斷恩恩豈斷酬恩入法法尤親胞胎愛欲君休戀正覺初成看漸新大孝釋迦牟尼佛敘法供養為最儀當演謹按佛説報父母恩德經云爾時阿難白佛言世尊云何報得父母深重之恩佛告阿難汝等當知假使有人遭飢饉劫臠割其肉供養父母經百千劫終不能報得父母深重之恩假使有人手持利刀割其心肝獻於父母終不能報得父母深重之恩假使有人敲骨出髓千百鋒戟一時刺身經千劫終不能報得父母深重之恩假使有人左肩擔父右肩擔母研皮至肉研肉至骨研骨至髓血流沒踝繞須彌山經百千劫終不能報得父母深重之恩假使有人為於父母入阿鼻地獄經百千劫吞熱鐵丸令身燋爛終不能報得父母深重之恩阿難白佛言我等今日深生慚愧云何報得父母深重之恩佛言若有善男子善女人欲報父母恩者為於父母書寫大乘為於父母讀誦大乘為於父母聽受大乘為於父母供養三寶為於父母布施修福為於父母懺悔罪愆為於父母書寫此經為於父母持齋奉戒汝等若能如是名為孝子若不行此行者終是地獄之人阿難聞已即白佛言我等從今已往盡未來際寧碎此身猶如微塵百千萬劫終不忘於如來聖教寶積經云佛告迦葉言在家菩薩成就三法不退菩提謂父母不信令其住信父母毀戒令其住戒父母慳貪令其信捨又阿難白佛言是大施主於世尊處誠有大恩佛言實有斯事於我有恩我已報訖由因我故得知三寶受五學處於四諦理無復疑惑得預流果當盡苦際證會無生如是之恩更為難報非衣食等可相比喻普賢行願經云法供養者所謂如説修行供養利益衆生供養攝受衆生供養代衆生苦供養勤修善根供養不捨菩薩業供養不離菩提心供養善男子若諸菩薩行法供養則得成就供養如來如是修行是真供養如月光童子知其慈父信受外道欲害如來即諫父言佛為大聖三界之尊道德清淨言教正真佛成道時第六天魔尚不能壞莫不稽首受佛化者如來之身金剛德體相好光明猶星中月佛之道德神化如此願父改悔皈依三寶時父德護即於佛前生大信心以上妙衣覆佛身上白言我本愚癡受六師教今於佛前志心懺悔今因月光令我信佛我今殷勤更不作罪願佛救我世尊我子月光於千萬億劫難可值遇憐憫我故來生我家善為我説諸佛功德於千萬劫恩難可報佛言此月光者能令未信衆生令生淨信未調伏者能令調伏未成熟者能令成熟於其父所作善知識何以故能以導師法教化其父令生信心必定當得無上菩提月光童子又白母言我敬母故為報母恩奉上此語何以故母懷我身滿足十月生我身時半死半生我念此恩未曾遺忘我願奉母往見百千億那由他佛常願奉母聽諸佛法常願奉母往見一切菩薩行處常願奉母往見一切菩薩淨佛法處常願奉母往見一切不壞信處常願奉母往見一切作佛事處常願奉母往見一切供具供養三寶處常願奉母往見一切聖人行法之處常願奉母往見一切信根成就至涅槃處時母月雲告月光言善哉善哉得聞汝説汝實大悲於父母所深生憐憫開導善事我今亦願發菩提心即説偈言汝今來生在我家我今見汝如導師能使我心清淨信不可思議諸佛法汝今猶如我父母亦如諸佛生我家我於無量千萬劫不能報汝今日恩汝真是我善知識世世常為清淨道令我安住最勝念決定信佛無有疑奇哉月光能以佛法奉養父母者可謂專意承志諭父母於道也是知古有真規敢不遵奉向下專為過現父母勸歸三寶修習三乘俾令善力轉增強各得其門而趣入父母橫擔左右肩未能少報半分全血流沒踝非為孝道以資親始是賢德護因兒生正信月雲為子脫塵緣奇哉童子真難繼直養為懷志可憐大孝釋迦牟尼佛加持誦七俱胝佛姆準提大明咒至無量法門陀羅尼歌讚勸父母皈依三寶儀當演經云迦葉白佛言世尊我從今始當以佛法僧事啓導父母乃至七世父母當令奉持佛言善哉善哉汝今善能護持正法不欺於人不欺他人善業因緣故而得長壽善知宿命佛報恩經云優婆離白佛言皈依佛者為皈色身為皈法身答曰皈依法身不皈色身不以色身為佛故問曰若色身非佛身者何故出佛身血而得逆罪答曰色身是法身器故法身所依故又問皈依法者為皈自身盡處他身盡處答曰皈自身盡處皈他身盡處是名皈依法謂斷欲無欲盡處涅槃即是法也又問皈依僧者為皈俗諦僧為皈第一義諦僧答曰皈依第一義諦僧問若皈第一義諦僧者佛與提謂波利受三自皈不應言未來有僧汝應皈依答曰以俗諦僧是名第一義諦僧所依故言未來有僧汝應皈依又欲尊重俗諦僧故作如是説問佛亦是法法亦是法僧亦是法正是一法有何差別答曰雖是一法以義而言自有差別無師大智及無學地一切功德是謂佛寶盡諦無為是謂法寶聲聞學無學功德智慧是謂僧寶問若佛以法為師者於三寶中何不以法為初答曰雖法是佛師而法非佛不弘是故佛在初問若受三皈戒時先稱法寶後稱佛寶成三皈否答曰無所曉知説不次第者自不得罪得成三皈若有所解故倒説者得罪亦不成三皈問曰若稱佛及法不稱僧者成三皈否若稱法僧不稱佛者成三皈否若稱佛僧不稱法者成三皈否答曰不成三皈問曰若不受三皈得五戒十戒否答曰一切不得問若先受三皈作優婆塞後若受五戒十戒更須三皈否答曰不受三皈一切得戒以先受三皈故維耶離國有一長者其妻有娠子在母胎日自三皈始生墮地亦跪自皈言南無佛南無法南無比丘僧皈命佛皈命法皈命比丘僧母即深怪意欲殺之即白長者長者言此兒非凡人生百歲每尚不曉自皈三尊況兒墮地能稱三寶好養室之切勿瞋慢兒年七歲於道邊戲時舍利弗等驚怪小兒能禮比丘兒言道人不識我耶佛於天上為母説經我時為天當下作豬從佛之教自皈得人尊者即禪尋亦知之兒言願以我身因請世尊諸菩薩等尊者然之兒便還家白父母言適見佛弟子即因請佛及四輩飯願辦甘脆父母受之為極珍妙過逾兒意佛及衆僧作神足來到兒舍飯又為説法父母及兒內外眷屬皆得道果故知自皈之福能福雙親今日會中故宜信仰可謂禪是大溈詩是朴大唐天子只三人胎中已解奉三皈墮地稱名也大奇長者若教無慧眼慈親安得破狐疑融歸一法原同體兼攝群凡作住持無上福田最尊貴酬恩佛子可忘之大孝釋迦牟尼佛敘勸持五戒十善以作人天之孝儀當演賢愚經云五戒者一者慈仁不殺恩及群生二者清讓不盜損己濟衆三者身潔不淫不犯諸欲四者誠信不欺言無華飾五者奉孝不醉行無點汙又不殺仁也不盜義也不淫禮也不妄信也不酒智也又經云殺者為説夭壽之殃盜者為説貧乞之苦淫者為説滅身之禍讒者為説滅信之患醉者為説色身之變言十戒者佛告勝思惟菩薩言若菩薩守護如來一切戒藏如諸菩薩自愛命者則不應殺自愛財者則不應盜自愛妻者則不應侵他自愛實語不應誑彼自愛和合不應離間自愛正直不應邪倚自愛柔軟不應惡罵自愛知足終不於他而生貪愛自愛仁恕終不於他而生瞋恚自愛正見終不於他而生邪見又佛報恩經云優婆離白佛言若白衣不受五戒直受十戒為得戒否答曰一時得二種戒問曰若一時得何須次第先受五戒次受十戒耶答曰雖一時得而染習佛法必須次第先受五戒以自調伏信樂漸增次受十戒如是次第得佛法味如遊大海漸漸入深入佛法海亦復如是若一時受即失次第又破威儀復次或有衆生因受五戒而得道果或有衆生因受十戒而得道果是故如來説此次第若先受五戒次受十戒受十戒時亦成就二戒又分三品若微品心受得微品戒若中品心受得中品戒若上品心受得上品戒以是義故隨心高下得戒不同無定限也孝論云持五戒者資之以人也持十戒者報之以天也有一於此則成其人而顯其親不亦孝乎有一不修則棄其身而辱其親是得為孝乎故天下福不臻而孝不篤也今天下求福不若篤孝篤孝不若修戒戒也者大聖人證果之勝法也以清淨意守之其福若取諸左右也嘗聞須密多長者遊五天竺偶至佛所諦觀威儀殊勝無比乃念父母平昔持戒修福廣植善根獨不得見佛而沒嘆惋切至遽見父母從西方作禮而來佛為授記長者歡喜隨佛證悟獲漏盡通今日會主當為父母勸持五戒十戒於天上人間任意受生豈不快哉可謂鑿池不待月池成月自來法中正勝戒宜遵守護須還清淨人過海浮囊無缺漏先天妙物出陶甄如能檢束方知本倘不堅持反辱親天上人間增妙報密多見佛了前因加持皈依三寶真言百千印咒真言歌讚勸修四諦以作小乘之孝儀當演法華經云諸苦所因貪欲為本若滅貪欲無所依止滅盡諸苦名第三諦為滅諦故修行於道離諸苦縛而得解脫所言諦者審也實也而聲聞人但有審義而無實義故涅槃經云佛言善男子諸凡夫人有苦無諦聲聞緣覺有苦有諦而無真實諸菩薩等解苦無苦是故無苦而有真實乃至集滅道諦亦復如是天台禪師以藏通別圓四教而分四諦謂生滅四諦無生四諦無作四諦無量四諦今所明者即藏教中生滅四諦也且知苦斷集染法滅也證滅修道淨法生也故知四諦法門必須三轉謂此是苦此是集此是滅此是道即是相轉也此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修即勸修轉也此是苦汝已知此是集汝已斷此是滅汝已證此是道汝已修即作證轉也而聲聞人我生已盡即苦諦智梵行已立即滅諦智所作已辦即道諦智不受後有即集諦智此四智圓即得究竟證無學果是知當來彌勒世尊初會之中説法化度其父儴佉王聞佛成道往到佛所欲得聞法時佛為説初中後善義理深遠爾時大王將八萬四千衆往到佛所求作沙門盡成道果得阿羅漢其母梵摩越復將八萬四千婇女往到佛所求作沙門爾時諸女人得阿羅漢道唯梵摩越斷三結便成須陀洹又大悲如來初成佛時為度聲聞三會説法第一大會度諸弟子有百俱胝第二大會度諸弟子有那由他俱胝第三大會度諸弟子有百千那由他俱胝如上所説三會數量所度弟子成阿羅漢者皆是往昔所生父母會衆若能如佛度脫所生父母令證小乘雖然未達上頭關已免輪回於苦海小乘為養事堪呈三轉回環四諦分應斷應知禪兀兀已修已證醉醺醺能行自利逃紅焰求證單空坐碧雲三會度人皆父母大悲彌勒豈謾君大孝釋迦牟尼佛勸修中乘以作緣覺之孝儀當演華嚴經云十二因緣者所謂無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死此中無明有二種業一令衆生迷於所緣二與行作生起因行亦有二種業一能生未來報二與識作生起因識亦有二種業一令諸有相續二與名色作生起因名色亦有二種業一互相助成二與六處作生起因六處亦有二種業一各取自境界二與觸作生起因觸亦有二種業一能觸所緣二與受作生起因受亦有二種業一能領受愛憎等事二與愛作生起因愛亦有二種業一染著可愛事二與取作生起因取亦有二種業一令諸煩惱相續二與有作生起因有亦有二種業一能令於餘趣中生二與生作生起因生亦有二種業一能起諸蘊二與老作生起因老亦有二種業一令諸根變異二與死作生起因死亦有二種業一能壞諸行二不覺知故相續不絶凡夫無智執著於我常求有無不正思惟起於妄行行於邪道如是但有苦樹增長無我無我所無作無受者三界所有唯是一心如來於此分別演説十二有支皆依一心如是而立了知無我無人無壽命自性空無作者無受者即得空解脫門現前觀諸有支皆自性滅畢竟解脫無有少法相生即得無相解脫門現前如是入空無相已無有願求即得無願解脫門現前此十二支總攝為四一能引支謂無明行能引識等五果種故二所引支謂識等五是前二支所引發故三能生支謂愛取有近生當來生老死故四所生支即生老死是愛取有近所生故而緣覺人修習此者若利根者四生得果若鈍根者百劫得果亦有一生而成就者如鹿母夫人生五百子子年長大共相與言一切諸法如幻如化體無真實我等今日雖處富貴不得久保物成有敗會亦當死即白父母言世間皆苦無可樂者父母今者聽我出家父母許之即就後園各各出家如是次第得辟支佛果上升虛空現諸神變即自燒身取般涅槃夫人取骨起塔供養而作誓言我雖生五百子而無一人發菩提心願我供養辟支迦故所有功德普及一切令我來世但生一子能發大心現世出家得一切智佛告阿難時鹿母者即摩耶夫人是也因供養辟支迦故得生如來之身若不供養辟支迦寧得今為佛母是知為佛母者由供養辟支迦也能供養者由辟支為其子也為其子者意令其父母發大心也則生死之路雖隔而母子之情不可忘所謂不得春風花不開花開須藉春風力中乘為養死生窮緣獨雖殊二覺同不向支支分四種何由法法會三空四生證果根機利百劫成功觀智融鹿母當年因供養後生一子法王雄加持四聖諦陀羅尼歌讚勸修六度以作大乘之孝儀當演華嚴經云文殊問智首菩薩言佛子如來何故或為衆生讚嘆布施或讚持戒或讚忍辱或讚精進或讚禪定或讚智慧而終無有惟有一法而得出離成阿耨多羅三藐三菩提時智首菩薩以偈答曰佛子甚希有能知衆生心如仁所問義諦聽我今説過去未來世現在諸導師無有説一法而得於道者佛知衆生心性分各不同隨其所應度如是而説法慳者為讚施毀禁者讚戒多瞋者讚忍好懈讚精進亂意讚禪定愚癡讚智慧如是次第修漸具諸佛道如先立基堵而後造宮室施戒亦復然菩薩衆行本譬如建城郭為護諸人衆忍辱亦如是防護諸菩薩譬如大力王率土咸戴仰定慧亦如是菩薩所依賴所言六度者為對六蔽漸修佛法漸熟有情故但説六六中前三增上生道感大財體及眷屬故後三決定勝道能伏煩惱成熟有情及佛法故又前三饒益有情後三對治煩惱又由前三故不住涅槃由後三故不住生死能為無住涅槃資糧也又通名波羅密多者要具七最勝故一安住最勝要安住菩薩種性故二依止最勝要依止大菩提心故三意樂最勝要慈愍一切有情故四事業最勝要具行一切事業故五巧便最勝要無相智之所攝故六回向最勝要回向無上菩提故七清淨最勝要不與二障間雜故若七隨闕非到彼岸而菩薩修習經歷三祗謂初阿僧祗劫勢力微細煩惱未伏但名波羅密多第二阿僧祗劫勢力漸增能伏煩惱名近波羅密多第三阿僧祗劫勢力轉增能畢竟伏一切煩惱名大波羅密多若能以此引導父母則成佛有分也昔有迦羅婦其身懷孕在於佛前腹中女子叉手聽經佛即問言汝叉手聽經以何故爾女即答言乃世間人不孝順父母不供養沙門是故叉手聽經爾時女子即從右脅而生名無垢光為佛作禮而白佛言今此會中有諸迦羅婦願佛為説經令得男子身佛方説經又有七十五迦羅越來至佛所而作是言此七十五迦羅婦者是我曹父彼若出家合先度我作比丘僧爾時佛呼善來彼等皆作比丘時七十五婦用佛威神得成男子前白佛言我等願作比丘佛令彌勒即為出家爾時無垢光女自然有花蓋七重即持與母言佛是天上天下度人之師母以花蓋蓋佛之後亦當為天上天下之蓋又當發菩提心若母發心我為已報母氏之恩母言我已發心所以者何汝於十月在我腹中從是已來不生慳心破戒等心我自念言今所懷子必是菩薩汝今勸我當隨汝語更發大心佛告舍利弗我前迦羅婦者皆是此女前世父母此女發願若有衆生是我父母必當令其於佛菩提而不退轉舍利弗此三千大千世界所有星宿其數易知此女前世父母受其勸導於佛菩提而不退轉其數難知又寶積經云有大長者名曰安隱妻名焰慧彼生一男當初生時三反微笑言云何今日生斷見家即引導父母至勝觀如來所時有八萬四千衆生聞是奇異即共俱往兒至佛所修敬已畢復白佛言願我來世當得作佛時八萬四千衆生亦白佛言我等亦願後成如來爾時勝觀如來告侍者曰此嬰兒者曾於六十四俱胝那庾多百千佛所恭敬供養又於過去十那庾多佛所修行梵行今此所將八萬四千者於過去世並是嬰兒本生父母何以故此嬰兒曾發願言願我今生在在處處所有父母皆令安住於佛菩提又令慈母更無第二再受女身由是願故彼諸衆生至於今日隨逐嬰兒來至我所爾時嬰兒聞已歡喜詣父母所而説偈言如是多千衆我前生父母皆已住菩提父母心何趣父母亦答言如子至所趣我心亦如是當成一切智此決定無礙子已生我家願後勿相捨常當憶念我令速證菩提佛言昔時嬰兒者今自在天子是也於當來世得成作佛號曰大悲於第一會度諸菩薩有百俱胝第二大會度那由他俱胝第三大會度百千那由他俱胝彼菩薩衆皆是往昔所生父母是知度脫過去父母皆由願力世世生生還復相遇令得見佛成就佛果則我等衆自作自受自救不了何暇及親然而道力未充亦宜勉勵勤行六度成佛為期豈不見古語云豫何人而舜何人彼既丈夫我亦爾大乘為養智悲全頓發菩提出愛纏劫滿三祗方殺賊行鋪六度好行船腹中女子因無限膝下嬰兒果漸圓色究竟天增氣焰必須託彼坐紅蓮勸修一乘法門以作如來之孝儀當演法華經云如來為一大事因緣故出現於世令諸衆生開示悟入佛之知見華嚴經云一切世界諸群生少有欲求聲聞乘求獨覺者轉復少趣大乘者甚難遇趣大乘者猶為易能信此法倍更難又出現品云設有菩薩經無量百千那由他劫行六波羅密具六神通若未聞此如來不思議大威德法門或時聞已不信不解不順不入不得名為真實菩薩以不能生如來家故若得聞此如來無量不可思議無障礙大智慧法門聞已信解隨順悟入當知此人生如來家隨順一切如來境界故清涼云高不可仰則積行菩薩曝鰓鱗於龍門深不可窺則上德聲聞杜視聽於嘉會且如夕釣磻溪朝升臺輔豈與夫明經常選而語其優劣者哉況初生王宮貴極臣佐寧同百戰夷項備歷艱辛故知初發心人亦非聊爾人語其智等虛空而非類論其德碎塵剎而難量極念劫之圓融盡法門之重現而初心契於智海豈有邊涯猶微滴入於天池齊無終始長者亦名此經為乘如來乘直至道場頌云有大寶乘住四衢文殊引導普賢扶肥壯白牛甚多力一念遍遊無捲舒故如來出現品中放眉間光灌文殊頂放口中光灌普賢口令此二人互相答問明如來出現也又文殊以理會行普賢以行會理以理會行則融通隱隱以行會理則涉入重重則文殊普賢俱遍法界故經云一切處文殊師利一切處普賢菩薩佛是二法之中無作之果即三而一即一而三三一互融俱存俱泯舉因即果舉果即因是知初發心時即得阿耨多羅三藐三菩提義必然也不同權教因果階差須歷三祗方成正覺故威德王太子白父王財主言大王當知勝日身如來出興於世成等正覺於今未久時王聞已歡喜無量即往佛所到已禮足退坐一面爾時如來白毫相中放大光明名一切世間心燈普照十方又以自在神力現身超出一切世間以圓滿音普為大衆説陀羅尼名一切法義離暗燈佛剎微塵數陀羅尼而為眷屬彼王聞已即時獲得大智光明遂乃出家未久之間悉得成就一切法義離暗燈陀羅尼又得菩薩十神通門又得無邊辨才門復以神通遍十方剎諸如來所聽受其法為大法師演説妙法隨衆生心而為現身稱揚如來自在神力又聞如來初誕生時能令摩耶一一毛孔皆現如來往昔修行又諸毛孔皆現如來往昔所住世界在在生處摩耶夫人常為佛母又摩耶夫人言悉達太子初生之時盡此世界海所有一切毗盧遮那如來皆入我身示現誕生又菩薩將欲下生之時一一毛孔咸放光明來入我頂我身形量雖不逾本我身爾時量同虛空悉能容受十方菩薩爾時菩薩降神入胎有十方佛剎微塵數菩薩來入我身於我腹中或以三千大千世界而為一涉或以不可説不可説佛剎微塵數世界而為一涉又念念中十方不可説不可説一切世界諸如來所菩薩衆會乃至諸天欲見菩薩來入我身而我腹中悉能容受而身不廣大亦不迫窄此四天下乃至三千大千世界百億四天下閻浮提中菩薩受生我為其母然我此身本來無二非一處住非多處住如此世界過現未來一切世尊我自現身而為其母善男子此解脫門非最後身菩薩神通道眼所能知也故知一乘之養是為圓滿是為究竟是為廣大是為殊勝以此為孝又何以加焉所謂道千峰勢到嶽邊止萬派聲歸海上消一乘為養妙嚴都塵剎衆生父母軀長子全身周沙界小兒無處不文殊摩耶生佛原來幻太子寧親忒煞迂三世十方相涉入人牛不見月輪孤加持十波羅密真言歌讚勸父母成佛儀當演孝行録云若人以一乘為養者如來之孝也以六度為養者菩薩之孝也以十二因緣為養者緣覺之孝也以四諦為養者聲聞之孝也以五戒十善為養者人天之孝也人天小果不出輪回緣覺聲聞未登寶所權乘菩薩猶滯化門圓滿一乘方為究竟夫親者身之本孝者行之宗天下固莫重於親聖人無以加於孝事父母以如來之孝則其孝至矣報父母以一乘之養則其養極矣故知福焰王太子之父今無量壽佛是也威德王太子之父今寶華如來是也月光童子之父當來無等身是也淨藏淨眼之父當來娑羅樹王如來是也我等今日普為父母自過去一生乃至阿僧祗劫生自一阿僧祗劫乃至不可説不可説阿僧祗劫現在未來亦復如是又自東方一世界乃至阿僧祗世界自一阿僧祗世界乃至不可説不可説阿僧祗世界南西北方四維上下亦復如是盡法界虛空界於中受生一切父母願於此夕同集道場頓悟無生俱成正覺如彼父母所有男女皆為孝養各以一乘之孝奉親之後隨侍二親亦成正覺如月光童子當來成佛名離垢月光不動無障礙大莊嚴大自在天子當來成佛名曰大悲故慈覺云一切衆生皆父也一切衆生皆母也如一父母未成佛者孝子誓願不成正覺一切父母成佛俱盡是時孝子爾乃成佛故頌云父母皆成佛綿綿法界如爾時心願足方乃證無餘天倫佛性自圓常今日方知孝道昌點鐵成金恩愛礦採花作蜜智悲鄉已知有父如無等寧可無兒似月光自利利他俱滿足更無一物獻尊堂大孝釋迦牟尼佛普勸大衆儀當演比丘某謹白大衆古今諸佛如來願輪廣大孝道昌隆運父母於妙覺之都濟群生於一乘之地方便權施則五乘不等真實開導則大道無差如驅三駕而等賜白牛似會百川而同歸大海故辨正論云孝感神明功侔造化方深則四瀆流淺比重則五嶽山輕風雨不能亂其波濤虛空未足棲其令譽甚哉孝之大也又何以加焉夫識體輪回六趣無非父母生死變易三界孰辨冤親故令出家者捨俗趣真均庶類於天屬遺榮即道等含氣於己親大戒經云一切男子是我父一切女子是我母我於生生世世無不依之受生君不見嬰兒引導八萬四千丈夫衆又不見女子度脫七十五個迦羅婦此皆昔日所生父母由宿願故還相會遇更不以三牲為養但能以一乘為諭知此者孰不欽向行此者孰不超升所以上來自淺至深以法奉養謂皈依三寶者且救父母三途之苦也五戒十善者且惠父母人天之樂也四諦十二緣六度者且寄父母三乘之位也一乘法門者終置父母究竟佛果也若父母果然成佛則孝子方可休心自然天地同根是非一氣聖凡平等彼此圓融如或未然切希黽勉行持莫使翻為讎對如佛在世時有一老翁獨與子居投佛出家佛即許可既出家後共至一村持鉢乞食迫暮方歸父老行遲其子排之執之不固仆地而死時諸比丘具以白佛佛告衆言過去世時父子二人共住一處時父病極於時臥處多有蚊蠅父令兒遮逐其蠅望得安眠時兒急遮蠅亦數來競至父額兒即打之誤殺其父是故當知彼父彼子實非故殺還相受報一一無差以此驗之何冤不報豈可道彼常為父母此常為子孫耶更望衆等始從今日終至菩提直須報本奉親切勿背恩忘義依佛言教學佛修行同歸無上涅槃門盡泛毗盧華藏海晝宵聞見好因緣箭急將身出愛纏早是四生花報謝那堪三界火輪旋法身獨露胞胎外慧命生成繈褓前萬劫親恩俱解脫人間天上月團圓加持佛頂尊勝陀羅尼歌讚下座勤修觀想儀當演各發無上菩提心三觀澄明先要用心見境萬緣寂照直須息慮忘言欲度其親宜修觀想按祭統云君子之齋專致於精明之德也故散齋七日以定之致齋三日以齊之定之之謂齋齋者精神之致也然後可以接於神明又云致齋於內散齋於外齋三日思其居處思其笑語思其致意思其所所嗜齋三日乃見其所為齋者梁武懺云若人發菩提心必須起想先緣所親念己父母師長眷屬又念地獄餓鬼畜生人天等道有受苦者當云何救見已起想應作是念唯有大心能拔彼苦若一想成應作二想乃至滿一室想滿一閻浮提想滿三天下想如是漸廣滿十方界見東方衆生盡是其父西方衆生盡是其母南方衆生悉是其兄北方衆生悉是其弟下方衆生悉是姊妹上方衆生悉是師長其餘四方悉是沙門婆羅門等見已作念若受苦時自作我想詣諸人所調身按摩誓拔其苦得解脫已為其説法讚佛讚法讚僧作是讚已心生歡喜見其受樂如己無異比丘某謹白大衆今依二教之説專為父母親緣作諸觀想各各專注更無異緣然則觀想欲成必仗諸聖加被欲求加被直須總伸讚禮向下讚禮昔日化導父母者諸佛菩薩然後修習觀想各望志誠同為緣助讚禮諸佛諸菩薩胡跪讚禮願我速成無上道猶如一切諸如來都緣孝子報劬勞為度慈親無間歇或為嬰兒明宿願或因太子演華嚴或於夢裏現金身或向空中垂誥語利慧放光持福焰宿王説法度莊嚴已成正覺住東方願顯報身居極樂今古互融歸一念自他相涉遍微塵我今為報自他親普願慈悲常攝受讚禮三世一切諸佛願我速成無上道猶如大孝釋迦尊大悲心上報圓功王體智中明孝行或樂濟飢能割肉或因療父喜剜睛或為太子導慈嚴或作商人暌母氏劫劫報恩難可紀塵塵有舌莫能宣我今為報自他親普願慈悲常攝受讚禮大孝釋迦佛願我速成無上道猶如大孝釋迦尊摩耶蒙佛破煙然淨飯聞經登法忍暫處天宮並極樂終圓四智與三身我今為報自他親惟願慈悲常攝受讚禮當來彌勒佛願我速成無上道猶如彌勒度雙親儴佉慈父住聲聞摩越母親除結使三會度人人普度一生成佛佛親成我今為報自他親惟願慈悲常攝受讚禮觀世音菩薩願我常修菩薩行猶如大士聖觀音憐憫慈父著邪宗不捨女人申孝行被難入山雖不告為親捨臂亦難能我今為報自他親惟願慈悲常攝受讚禮地藏王菩薩願我常修菩薩行猶如地藏宿因緣婆羅喜聽鬼王言光目善操羅漢供夢裏現身由孝德空中垂語察哀情我今為報自他親惟願慈悲常攝受讚禮藏眼大菩薩願我常修菩薩行猶如藏眼孝慈深委令慈父妙莊嚴睹見宿王華智佛兄弟總施神變力爺娘俱證法華宗我今為報自他親惟願慈悲常攝受讚禮月光大菩薩願我常修菩薩行猶如童子月光心父因諍子捨邪宗母聽法音修大行見佛是名為至養發心方稱報元功我今為報自他親惟願慈悲常攝受讚禮自在大菩薩願我常修菩薩行猶如昔日小嬰兒六十四億供如來八萬餘人皆父母已遇勝觀明宿願終成佛果度慈親我今為報自他親惟願慈悲常攝受讚禮無垢女菩薩願我常修菩薩行猶如無垢處胎中忽從右脅誕生來便發大心思救母轉女成男求解脫出家離俗即超騰我今為報自他親惟願慈悲常攝受讚禮目連阿羅漢願我常修菩薩行猶如尊者目犍連此生始獲六神通是處遍觀三惡趣鉢飯雖甜難拯濟盂蘭有力可擠持我今為報自他親惟願慈悲常攝受讚禮海會衆聖賢願我常修菩薩行猶如法界報恩人或修四諦與三空或造一乘並十地普度雙親皆解脫總令真俗悉圓融我今為報自他親惟願慈悲常攝受讚禮海會佛菩薩舉觀想父母求解脫四聲伏地作觀諸佛子等觀想志心聽我今欲説道場殊勝事各各思惟令心眼見想道場地忽然廣博與法界虛空界等無量衆寶間錯莊嚴一切寶網彌覆其上又當想念釋迦如來於淨身中現五趣身所謂地獄餓鬼畜生人天一一趣中現八千種形類皆是如來昔日父母又想十方如來各各説法化導父母至一乘道又想世間一切男子是我父一切女人是我母我於生生世世無不依之受生又想一切父母常隨逐我願欲見佛度脫生死又想自身不離此處分身十方往父母所承順供養勸發大心又想一切父母咸受我化即發大心修大乘行求佛菩薩無有退轉五趣中父母便解脫重伸觀想諸佛子等重伸觀想無量劫來一切父母有修戒者戀著三界者我當為説三界無安猶如火宅衆苦充滿甚可怖畏又當想念有修四諦已住阿羅漢位者為説羊車有修十二因緣已住辟支迦位者為説鹿車有修六度已住菩薩乘者為説牛車此三車者即喻三乘然此三乘是一乘方便故如來虛指故有名無體故諸子不得故又想三乘之人聞我説已即捨權乘趣一乘道又想諸佛如來見是事已同共讚言善哉善哉善男子若能行此者即住三世諸佛家故何以故此一乘道法如是故三乘中父母早回心三聲三回作觀諸佛子等重伸觀想我等父母聞佛讚嘆故承佛神力故自善根力故即能知一切法即心自性睹見法界無所障礙能以一身作無量身身剎互融重重示現與諸如來體性平等功德亦等何以故稱法界修稱法界證只在剎那成正覺故舉一乘中父母成正覺四聲加持發菩提心真言心月圓滿真言行香投詞宣疏禮別聖賢恃怙深恩如來尚酬於纍劫香燈妙供佛子欽奉於終宵上荷諸佛垂慈放光入會復蒙梵天護念合掌趍筵堅一念之真誠聽三時之妙法豎宗則高峰岌岌立教則巨海汪汪儒釋兼濟則簇錦攢花真俗混融則鳴珂珮玉恩愛網從今墮壞悲智海正好優遊非但薰習今生父母之道心亦可報答多生父母之恩德直得待渠成佛後卻須還我未生前方信此齋不為虛設子夜金鍾欲扣梵唄頻催倏驚長夜漫漫將啓大明杲杲真淨界中本自無來無去凡常情上不妨有送有迎寶車輅軋軋而將上重霄獅子座巍巍而復歸淨土伏願大衆人人知本念念報恩常居不散之道場始是榮親之孝子今當禮別各望精勤衆等志誠禮別賢聖法鼓三鍾誠心禮別上來所請此法會中清淨法身毗盧遮那佛圓滿報身盧舍那佛三類化身釋迦文佛伏願來時降福去後留恩望聖慈悲乞歸蓮界惟願慈悲還本土誠心禮別上來所請此法會中大慈大悲成利慧佛勝日身佛勝觀佛伏願來前降福同前誠心禮別上來所請此法會中大慈大悲雲雷音宿王華智佛覺華定自在王佛清淨蓮華目佛伏願誠心禮別上來所請此法會中大慈大悲無量壽佛彌勒佛寶華佛十方三世一切諸佛伏願誠心禮別上來所請此法會中大慈大悲文殊普賢菩薩觀音勢至菩薩藥王藥上菩薩地藏菩薩無垢光女菩薩伏願誠心禮別上來所請此法會中大慈大悲月光童子菩薩大自在天子菩薩迦葉菩薩日光童子菩薩諸大菩薩摩訶薩伏願誠心禮別上來所請此法會中大慈大悲阿難目連二尊者辟支迦阿羅漢衆伏願誠心禮別上來所請此法會中開壇應供賓頭盧大德尊者圭峰禪師慈覺禪師明教大師遍法界中報恩海會一切賢聖伏願來時降福法筵將散能事雲終誠心拜別上方上界上元天官天府部衆珍乃拜辭各還天界中方中界中元地官地府部衆珍乃拜辭各還地界下方下界下元水官水府部衆珍乃拜辭各還水界一心拜別諸廟祀典諸廟靈聰家奉香火福德正神司命土地禁忌龍神虛空過往糾察善神傳奏功曹見聞真宰繞舍支幹禁忌神祗是日見聞隨喜一切賢聖伏願各還雲馭大布慈光俾施主願力以周諧降福留恩於此宅諷誦真言以伸拜別加持奉送聖賢真言發遣鬼神真言
