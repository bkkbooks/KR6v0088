利秫帝尾呬娑普吒設殿秫帝左野左野尾左野又娑摩囉又薩嚩沒馱帝瑟恥多秫帝嚩日隸又薩陛嚩日覽婆嚩都麼都麼薩嚩娑怛嚩舍利喃薩嚩埵喃難左迦耶跋利秫帝薩嚩誐帝缽利秫帝薩嚩怛他誐多室者銘三摩濕嚩娑演都娑婆怛他誐多三摩濕嚩薩地瑟恥帝沒恥耶耶尾摩馱耶又三滿多缽利秫帝薩嚩怛他誐多迄利馱耶地瑟吒曩地瑟恥多摩訶母捺隸莎婆訶止下座加持發菩提心真言愛水欲泥淨染汙瞋心見火怎焚燒本來清淨了無瑕好向今時同顯發唵引冒地即多步怛波那野弭唵引即多波囉帝吠鄧迦嚕弭唵引三昧耶娑埵鍐加持觀想真言六根寂靜無餘想心月孤圓朗十方塵沙父母許重重盡向此時俱轉了唵引欠嚩囉馱都加持心月圓滿真言心地無塵境界寬了明真性悟玄機單空月輪照法筵一一普令皆圓滿唵引底瑟吒摩尼跋囉缽頭麼止禮別加持奉送聖賢真言聖凡一體何來去隱顯同時絕送迎專誠奉送表丹衷母子歷生難捨離唵引嚩囉目枳叉目散界真言唵引商迦伽哩摩訶三昧耶盤陀盤陀文闍文闍娑婆訶奉送父母生十方淨土真言歷劫親緣蒙降赴仰瞻金相聽圓音未成佛果已前來隨願往生佛淨土唵引阿弭哩哆帝際訶囉吽唵引逸帝律尼娑婆訶加持發遣鬼神真言鬼神承佛天仙力面百由旬盡護持如來示現微微笑各願深恩歸本土唵引阿暮伽布囉利跋囉跋囉蘖奢塞勿皤勿喃阿彌嘌哆布臡吽止錄文完
