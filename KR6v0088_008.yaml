body:
  text: 第二時陞座加持楞嚴字母真言稽首光明大佛頂如來萬行首楞嚴光中化佛演微言念誦普令祛宿業摩訶佛陀烏瑟尼沙哆陀阿伽度鞠醯耶醯都般帝般帝毗勃陀地瑟吒阿羅陀薩婆菩提薩埵遮利舍那娑訶薩羅首楞嚴摩修多囉止加持釋迦佛真言妄情擾擾風飄絮障垢昏昏鏡受塵虛空諸佛已哀憐教主由斯宣咒力南無佛陀耶南無達摩耶南無僧伽耶南無釋迦牟尼佛夷哆陀伽哆耶阿囉訶胝三藐三佛陀耶哆地他懼迷懼迷摩訶懼迷哆利哆利摩訶哆利柘利柘利摩訶柘利失利失利摩訶失利帝利帝利摩訶帝利呵呵趐隸趐利摩訶趐隸諸盧諸盧摩訶諸盧覓隸覓隸摩訶覓隸帝隸帝隸摩訶帝隸度迷度迷摩訶度迷柘梨柘梨摩訶柘梨諸梨諸梨摩訶諸梨折隸折隸摩訶折隸薩訶加持拔除罪障真言自造自招無間歇個中誰識本來心為宣密咒力加持一念迴光俱寂靜南無薩婆怛他揭帝飄阿囉訶帝驃唵揭摩囉呼盧此那毗輸利三婆三婆阿揭車阿揭車咯呼咯呼勃攬勃攬含含氏那市曼殊利耶蘇室哩也哆賴也曼薩波毒溪驃癹驃癹苫摩耶苫摩耶阿彌睹溫婆菩溫婆婆波謎那勢薩訶止加持護念善門陀羅尼真言真如佛性無修短煞業滋繁致夭傷善門護念力祛除須信人天無量壽怛致他鄔俱莽俱鳴俱摩比丘毗拖你呼婆囉者摩你虎利婆虎利婆禳虎虎虎梨跋哆耶娑婆訶爾時如來說此灌頂陀羅尼咒已於是世尊復說諸佛之所護念陀羅尼咒長壽法門怛姪他跋折喇跋折喇跋折囉跋折囉拖梨跋折囉婆底禮跋折囉薜底跋折囉拖帝斫訖囉跋折梨斫訖囉拖梨拖梨摩梨摩梨摩梨拖梨梨鼻梨莽梨質梨虎迦梨明梨鼻始梨主黎主梨旨婆梨者梨主梨莽梨者梨曼叉梨曼叉你娑婆播跋鼻那舍你薩婆嚕迦缽囉奢末你阿迦囉密哩柱缽囉底煞拖你夜婆柱娑婆莽那莽羅底煞拖你怛姪他曼茶你伽囉尼謨茶你三缽囉謨茶你那舍你三缽囉那舍你娑婆毗帝缽囉舍末你婆拖婆社娑婆奔那阿迦囉密哩柱缽囉底煞拖你怛姪他捨那你捨你畔拖你拖你瞋陀瞋拖鼻梨彌梨娑梨訶怛泥跋梨婆梨婆梨毗帝毗梨毗梨烏沙梨奢囉泥婆囉波嚕泥波囉迦茶曳婆囉歇彌紇麼遮哩尼因達囉波底地地囉野尼納暮莫醯濕筏囉囉曳你紇梨師婆社你播跋闍歌你迦囉婆帝你部哆婆地你薩哆耶羯梯素摩跋你奔囉鞞娑婆訶怛姪他歇囉囉呬哩薩訶怛姪他歇雉多缽雉多阿曳那阿梨蟾跋泥醫迦羯拖泥補多囉茶歇你末伽毗盧歇你虎娑跋底虎娑跋底補娑跋底補娑跋底呬哩呬哩也他闍耶他阿耆你也他缽監者也他跋監也他跋監也他跋折藍也仙訶哩拖監止加持華聚陀羅尼真言萬行因華相涉入重重無盡遍莊嚴芬芳秀麗與馨香由此陀羅尼咒力多狄度囉尼陀囉尼陀囉尼麼你波步婆散尼悉題旃題涅目脂涅呵梨盧伽缽帝佛陀缽帝帝梨烏迦囉知佉伽囉知囉殊缽伽帝帝聞知帝毗舍囉佛題但摩波斯阿叉夜羯鞞迦波和帝阿彌多羯卑伏哆舍尼帝聞和帝泥句婆一唏帝帝聞伽阿利帝因題耶佛題致拏佛題薩訶止佛說莊嚴王陀羅尼三寶三乘親父母背恩衣食不豐饒猛風沙聚總飄颺受用自然如意足南無薩婆怛他伽哆喃怛姪他勃帝蘇勃睇盧迦毗盧計盧迦伐帝揭蘭帝薩埵阿伐盧羯泥薩婆怛他揭哆阿提瑟恥帝薩婆阿門缽梨脯喇泥聚丁達麗捺囉提婆布侍帝怛他揭哆慎若那達睇怛他揭多阿提瑟吒泥娜薩婆盧迦速企婆跋都薩婆揭摩缽利釵耶野麼麼阿木羯寫薩婆娑埵難者曷洛叉婆跋睹怛他誐哆阿提瑟吒娜娑婆訶加持廣大寶樓閣秘密善住陀羅尼真言經云寶藏菩薩白世尊言今請如來為眾宣說廣大寶樓閣秘密善住清淨陀羅尼法為諸眾生獲大利益佛受請已告諸大眾言我昔曾為淨居天時於虛空中說此廣大寶樓閣秘密善住陀羅尼諸有情聞者決定不退無上正覺成就六波羅密一切地獄餓鬼傍生等聞此咒者皆蒙解脫生老病死苦永得超越當來之世於此贍部洲中眾生有於父母不孝順者不敬沙門者不敬耆舊者誹謗正法者誹謗聖人者誹謗諸佛者誹謗菩薩者殺阿羅漢者造五逆罪者抄劫盜者故妄語者負言背信者匿他財物者一切惡業所攝者彼等眾生聞此陀羅尼讀誦受持若佩身上若書衣中若置幢上乃至見者聞者及影中過者彼等眾生由斯陀羅尼大威力故決定當得無上正覺爾時世尊於大眾中以淨梵音即說咒曰淨居天上親宣說受請今時再舉揚見聞帶佩與瞻依五逆罪根俱寂靜唵引薩婆怛他伽哆摩尼捨哆你畢低社嚩囉嚩囉達麼馱都羯哩鞞摩尼摩尼摩訶怛他誐哆纈哩摩尼莎嚩訶爾時世尊為諸大眾說此陀羅尼王咒能成就無上菩提能除一切罪業身心清淨即說咒曰那摩薩婆怛他伽哆喃唵肥布囉孽鞞摩尼缽臘鞞怛姪他那捺你捨你摩尼摩尼蘇缽臘鞞肥摩麗娑孽囉鉗鼻麗吽吽釋皤囉吽吽釋皤囉勃陀嚩路枳羝虞醯耶地瑟那哆孽鞞莎嚩訶爾時世尊說此廣大寶樓閣善住秘密清淨陀羅尼已於此大地六種震動天雨寶華及天妙衣一切大眾咸皆歡喜嘆未曾有證不退轉是時十方諸如來等同聲讚嘆釋迦如來言善哉善哉釋迦牟尼佛乃能說是入菩薩道場陀羅尼大眾聞已一切惡趣皆得消滅下座加持滅五逆大罪真言殺父及害母羅漢眾聖賢破和合真僧出佛身血罪薩遮尼乾教五逆眾罪愆願誦秘密言定業悉消滅羝釤跋囉蒲陀那夜三摩末祗陀波那寤毗摩隸輸檀柰毗摩囉輸檀你趐輸檀尼移薩賀輸檀那摩羝移薩婆訶唵引嚩囉劍摩尼戍馱喃娑婆嚩囉拏你沒馱三底曳三昧耶吽癹止加持放生真言迷真逐妄甘淪轉水陸飛沈被網羅我今釋放仗真言永劫更無籠罩難那謨婆伽嚩帝缽囉枳夜欠娘哆嚕婆耶怛哆伽哆耶南