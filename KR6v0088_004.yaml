body:
  text: 漢州綿竹大中祥符寺住持長講華嚴海印大師思覺集第二時儒釋兼濟法事分為十七節啓白敘意燒香供養禮請上聖懸幡獻衣施食施財儒釋兼濟禍福淺深居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴化風遠被行孝感驗普勸大衆禮佛懺悔壇外放生且第一啓白敘意比丘衆等伏聞瞿曇設教實指乎心孔聖立言唯存於孝心乃萬緣之祖孝為百行之先非心無以了萬緣離孝孰能敦百行故龐老心空而及第曾參孝感以成名圭峰標儒釋兼濟之科慈覺立真俗混融之論若欲立身行道何如設供報恩營辦珍饈將酬厚德比丘衆等謹與會主某稽首和南志誠仰告報恩會上諸佛菩薩三界四府萬靈十方滿空賢聖今當第二時中欲升寶座演説世諦法門伏冀聖慈密垂加護庶使法音周遍顯正摧邪使末法人俱遵孝行慈愍故悲愍故大慈悲愍故惟願慈悲常攝受第二燒香供養上來敘意已竟今當燒香供養謹按陀羅尼集經云佛言善男子手執香爐燒香供養為其七世父母現存父母著一丸香普為六道著一丸香又為自身著一丸香又為一切病苦衆生著一丸香如法供養釋迦文佛運心周遍諸衆生處香雲遍至滿十方界稱揚三寶遍至六道滿衆生願病苦衆生香雲入體除去一切種種病苦今請會主燒香一一注想衆等志誠心同誦燒香偈戒定慧解知見香遍十方剎常芬馥願此香雲亦如是回作自他五分身加持燒香真言第三禮請上聖大衆志誠心同誦嘆佛偈敬禮金色相面淨如滿月敬禮智無比離垢三界尊髮淨光潤澤頂高如須彌觀者無厭足眉間白毫相為衆宣微妙度脫無量衆我讚功德聚無垢清淨福信禮大孝釋迦佛宣疏凡情上達大圓鏡加持諸佛願智真言至禮拜真言炷香禮拜能除我慢障禮拜能感尊貴身禮拜能滅七支僭禮拜能生三業善今當禮請報恩會上諸佛菩薩光降道場受請供養誠心仰請報恩會上此法會中二時禮請清淨法身毗盧遮那佛圓滿報身盧舍那佛三類化身釋迦文佛十方三世一切諸佛伏願慈悲憐憫俯垂道場為我報恩作大利益誠心仰請報恩會上此法會中二時禮請文殊普賢二大菩薩觀音勢至二大菩薩藥王藥上二大菩薩諸尊菩薩摩訶薩衆伏願同前誠心仰請報恩會上此法會中二時禮請阿難目連二尊者辟支伽阿羅漢衆圭峰禪師慈覺禪師明教大師報恩海會一切聖賢伏願同前上來禮請報恩海會諸佛菩薩十方聖賢已沐雲臨道場伏願天眼遙見慧耳遙聞他心遙知神通遙鑒以大悲力啓無緣慈憐憫有情哀受我請慈悲護念降臨道場證盟此齋充遍法界願此善力廣大無邊猶若虛空具諸功德奉請已一心皈命禮常住三寶蓮花捧足降臨來加持獻花寶座真言第四懸幡獻衣釋氏會要説造幡如人身形以表翻惡向善翻邪向正別而言之有三意爾一者欲令己身常住三寶前故二者欲令策心不退轉故三者欲表自心能皈向故昔阿育王造金幡千二百首懸諸剎土遂延壽二十五年故名續命神幡又優波迦多於過去世作一長幡懸毗婆尸佛塔上緣是功德九十一劫不墮惡道天上人間常有大幡覆之今建齋會主某奉為父母獻新淨幡願此功德亦復如是趙秦晉太始五年七月初三日夜半忽死再蘇自言陰司令我按行諸獄至一獄中自見父母及二弟又見二人齎文書來敕獄吏言有三人家奉佛懸幡救解生時過犯出就福舍即見大殿莊嚴極勝有佛於中踞師子座頂有日光泰山府君來為作禮吏人告泰山曰佛是天上天下度人之師今欲普度此惡道人皆令出離時有百萬九千人一時得出地獄遂空此乃造幡功德能福於冥路耳今設齋會主某奉為過現父母獻新淨幡願此功德亦復如是南無持幡蓋菩薩加持獻幡真言獻衣功德衣供養諸佛菩薩佛佛相傳雞足山中捧持不倦祖祖密付大庾嶺上提起便休忍辱正好為衣慚恥亦能被體須信理由事顯道要人弘慮衆生慳習之未除冀會主施心之大展道存目擊事要深思故經云昔有國王行至曠澤飢渴疲極有一女人悉能與之王見女子裸形無衣即時付與衣才被體自有火焚如是至三終不能得王問其故女子言由我往昔慳吝衣故今受此報若王想念者作衣施佛及僧我即得之王受其言作衣布施時彼女子持著新衣自鬼道中生於天上會主某施新淨衣願聖慈悲俯垂攝受衣供養菩薩加持獻衣真言獻食供養禪悅食菩薩長養法身須憑禪悅支援慧命必假資糧王舍城中時節因緣已至毗耶城裏飯食想念難除陸績懷橘而奉親之事彌彰目連餉飯而救母之心愈切然考叔不食為化莊公維摩託來莫非香積休問何時消化要明來處自然故賢愚經云有大長者初生一男面貌端嚴福慧絶倫既生數日問父母言世尊在否舍利弗阿難等悉為在否父母答言悉皆現在又言唯願二親為我請佛及比丘僧父母告言當須供具非猝可辦兒曰但掃堂舍莊嚴床席施三高座百味飯食自然而至又我先身之母今猶存在為我請之父母隨語一一依之三高座者一為如來二為本生三為今生父母佛與衆僧既入其舍次第坐定甘膳美味自然豐足佛為説法父及二母合室眷屬聞法歡喜盡得初果又經云施三種人果報無盡一者病人二者父母三者如來今會主某奉為某謹辦齋食上獻聖賢伏冀慈悲俯垂攝受禪悅食菩薩摩訶薩加持獻食真言施財功德財供養菩薩報本奉親儒釋皆能孝也博施濟衆堯舜其猶病諸欲父母之福果大臻唯佛法之福田最勝慈童女上獻兩鏹四鏹八鏹給孤獨善了下財中財上財非唯玉女承顏直得大千無侶要保金錢滿藏好看貧女賣薪經云有一長者初生一男其手握拳披而視之有二金錢父母取之復生如故如是勤取金錢滿藏阿難白佛此人何因得如是手佛言此人宿世乏於財寶常於野澤取薪賣之得兩文錢即以奉施佛愍此人即為受之因施財故九十億劫常把金錢無有窮盡又佛告廣博仙人言復有五種無上之施何者為五一者施於如來其施無上二者施於衆僧其施無上三者施説法者其施無上四者施於父其施無上五者施母其施無上今會主某奉為佛法僧父母辦五分財專誠奉獻伏願慈悲俯垂攝受財供養菩薩摩訶薩加持普供養真言衆等志誠如法應和若人狹劣者雖多行布施受者不清淨故今果報少若行慧施時福田雖不淨能生廣大心果報亦不淨隨心所願皆圓滿是諸衆等人各胡跪嚴持香花如法供養加持五供養真言普供養菩薩摩訶薩止第二時升座加持楞嚴字母真言儒釋兼濟儀當演比丘某等伏聞圭峰禪師云始乎混沌塞乎天地通人神貫貴賤儒釋皆宗之其唯孝道矣孝經云先王有至德要道戒經云孝順至道之法設教雖殊至道一也始自天子至於庶人家國相傳各立宗廟雖五孝之用各別而百行之原不殊此則儒宗所明之孝也舍那如來初成正覺頓説華嚴大經菩薩大戒戒雖萬行以孝為宗此則釋宗所明之孝也儒則愛護髮膚揚名後代致樂春不出曾子開衾釋則祝髮壞衣法資現世故難陀通信淨藏回邪此明二宗侍養之異也儒則棺槨宅兆安墓留形釋則念誦追齋薦其去識此明二宗居喪之異也儒則內齋外定想其音容釋則設供講經資其業報此明二宗齋忌之異也儒則四時煞命春夏秋冬釋則三節放生施戒盆會此明二宗祭享之異也儒則條越五刑犯當五摘而恩赦不該釋則名標七逆戒出七遮而阿鼻定入此明二宗不孝之罪異也儒則旌表門閭上天之報釋則瑩明戒德淨土之因此明二宗行孝之福異也略明數義餘可較量然先王立於祭法者令孝子敬事於神靈也神靈者即父母之識性也是知形有生滅性非生滅既形滅而神不滅豈厚形而薄神哉又殺命而祭神者非聖人之本意也何以知其然耶禮曰父母既歿必求仁者之粟以祀之孟子云見其生不忍見其死聞其聲不忍食其肉故君子遠庖廚也詩云愷悌君子求福不回且福之大者莫大放生是釋梵之本因實天地之大德今殺彼祭此豈近仁心是為可忍孰不可忍雖云祈福福實是立讎自徇虛名殃於神識經云昔有賢者奉法精進得病奄亡妻子哀戀火葬收骨安葬已訖月旦晦朔烹殺生命上冢號哭亡者戒德終乃生天天眼遙見愍而笑之變作小兒於邊牧牛牛便卒死兒即號哭割草著前曉諭令食如此終日衆人怪笑共往語言牛死號哭牛豈知乎汝愚癡也小兒曰我不愚也牛死常在猶可有望汝父已死設百種食共向號哭燋骨豈知吾本汝父蒙佛生天見子愚癡故來啓導欲得如我宜當進道忽然不見妻子奉教同時生天以理推之難憑血祭若父母生於鬼趣當設祭者豈不聞黍稷非馨蘋蘩可薦應知礿祭勝於殺牛況鬼神等差豈皆受饗夫應孝子之懇誠救二親之苦厄酬昊天之罔極唯釋氏之教焉遂乃搜索聖賢之教虔求報答之方得此法門實為妙行冀諸聞聽勉力修行庶幾點化背恩人盡使回心酬罔極儒釋皆宗道貫通星分爪剖賴圭峰放生作福恩堪報改祭為齋善可從施戒更當資福業歲時休但想音容先王古佛相弘濟類我螟蛉可指蹤大孝釋迦牟尼佛禍福淺深儀當演説文曰父者矩也母者收也矩也者軌則之謂也授之以性成之以形傳之以義方教之以詩禮故曰有父以瞻也收也者涵育之謂也十月懷耽三年乳哺憂勞盡力憔悴甘心故曰有母以依也父母之恩卒難可紀然則順之則福至逆之則禍生禍福之門皆因於我故經云慈童長者其父喪後財賄用盡役力賣薪因得兩錢奉養於母次得四錢及八錢十六錢亦奉於母孝心轉勝衆人語云汝父在日入海採寶後歸問母母同前説遂稟其母欲作父業母戲許之子便辭母母曰我有一子當待我死何由可放子曰以信立身許我已定母即以手牽挽髮髻子便絶髮而去既入大海多獲珍寶於時一夜大風卒起衆商既失遙見一城紺琉璃色飢渴奔投有四玉女擎如意珠作娼伎樂而共來迎四萬歲中受大快樂自然生厭又欲前去至頗璃城有八玉女受八萬歲又至白銀城十六玉女受十六萬歲又至黃金城三十二玉女受三十二萬歲準前捨之但當前行近見鐵城心中疑怪遂入鐵城見有一人頭戴火輪捨置頭上即便出去慈童問言何時得免火輪之苦答言世間有人作其罪福一如汝者由汝先於閻浮提內日以兩錢奉母故得琉璃城四萬歲受樂由奉四錢八錢十六錢故得八萬十六萬三十二萬歲受樂末後背母恩絶髮而去故得受此火輪之苦有人如汝作此罪福方可代汝汝可得脫因即問言此有罪人如我類否答言其數百千慈童聞已便發願言所有罪苦併集我身念已火輪即時墮地佛告比丘時慈童者我身是也比丘當知於父母所少作不善獲大苦報少作供養獲福無量當作是學應盡心孝順父母者也故孝行録云行孝之人有十種功德不孝之人有十種過患且十種功德者一者父母歡喜二者衆人樂見三者諸聖加護四者州縣推舉五者官賜粟帛六者朝廷獎譽七者旌表門閭八者往生淨土九者常值諸佛十者成等正覺十種過患者一者父母憂愁二者人不喜見三者多遭霹靂四者或陷王法五者死入地獄六者出為餓鬼七者為梟獍蝮蠍八者遺棄小兒九者為孤貧獨老十者永沈苦海此數者罪福如前淺深有別遠害就利可不孝乎然上根者率性而孝中根者循禮而孝下根者畏刑而孝畏刑則循禮循禮則率性此古人立法之本意也向下摘取孝經五句之文以辨三教生前歿後奉親之道切希會衆決意行持乾枯業海之波瀾成就聖人之德業賣薪行孝見慈童順逆皆由一念中玉女承顏花報謝火輪墮地業因空經標十種排功過道被三根品異同火急修行勤奉養背恩何日出樊籠大孝釋迦牟尼佛加持釋迦佛真言拔除罪障真言歌讚居則致其敬儀當演居而能敬則容止可觀尊卑有分如不能敬雖群會屯聚犬馬何別是以古人有色難之誡孝子懷知敬之心定省如期溫清不懈侍坐則衣冠濟濟承顏則言貌溫溫縱斑衣彩戲則尤懷謹恪之心任銀屏隔坐而豈無戰悅之色誠非偽行性出天資故經云菩薩慈孝於父母者性存報恩恭敬承事遠惡就善隨時供給夙興夜寐瞻父母意無事不辦所得教訓未曾遺失心所修行常自觀察當辦何事所聞教誨尋即知之常懷歡喜一心愛敬盡知父母之心常念報恩之事又佛告舍利弗言復有專修義利謂於身命無所顧惜於覺分法有所希望妙菩提心以為前導而於父母專修供養曲躬合掌謙下問訊迎送給事並和順業是則名為專修義利又佛告給孤獨言孝養父母出辭還返不失顏色晨定暮省小心翼翼念二親恩而無窮極道經云元始天尊告上智仙人言若或有人能為父母當以降生之日默念二親生我之恩精勤齋戒廣修衆善以報劬勞孝行録云孝子目無異觀耳無異聽怡聲下氣叉手正容癢不敢搔寒不敢襲問然後對時然後語言不爭先事不專決不命之坐不敢坐不謂之去不敢去所居必有常所習必有業惡言不出於口忿言不反於身父母之過不外揚妻妾之言不專用一舉足不敢忘父母一出言不敢忘父母斯可謂之敬矣咄嗟我輩有親而不能敬出入不告用度不常狹侮尊親交結群小耽荒酒色較量是非父母忍之則恃氣虛憍父母責之則反睛怒目甚者至於違禮越禁敗業破家根其原由是皆不能敬其居也仰觀如來之教豈不愧哉蓋如來是三界之至尊常有天人侍衛故屈慈父而反拜之王欲拜時如來舉身高七多羅樹且受其拜者道在子也不正受者表致敬也故圭峰云居則致其敬者儒則別於犬馬釋則舉身七多而世人只知子敬其父而不知父敬其子故當知情可泯而行不可虧恩可微而道不可屈敬事雙親問起居歸寧色養日無虧晨昏定省看承我冬夏溫涼點檢渠泣竹冬月天生筍扣冰淵躍雪天魚踴身高七多羅樹方信如來道有餘大孝釋迦牟尼佛養則致其樂儀當演親能養我我不能養親則背恩也若能不背於養則樂在其中矣孝子當念十月懷耽三年乳哺推乾就濕咽苦吐甘至於成人委之以家門訓之以詩禮蓋孟母有三遷之教柳親有和膽之勤此皆親能養我也我既成立義當養之歷觀古人屈指可數如負米之子路懷橘之陸績老萊戲綵潘嶽捧輿朱雋販繒江革傭力或尊榮於富貴或卑下於貧賤是其能養均矣故佛告郁伽長者言在家菩薩積聚財寶非不如法平直正求不逼切他如法得對起無常想悉捨無吝給事父母又經云是諸衆生尊重供養於父母者是人常有梵釋護世之所扶持能令居家安隱豐樂如是現世果報珍寶皆因供養父母而得又於來世生在人中或復當來得生天上何有智者聞是法音於父母所不勤供養又佛告給孤獨言財有三種一曰下財謂能積聚不孝父母不奉聖人不好布施不達悉空故二曰中財謂孝順父母又施他人但不信死後更生不肯布施修後世福故三曰上財能以衣食孝順父母奉敬先聖布施無乏使成道德獨步無侶故僧祗律云父母不信三寶即少供給若信三寶理宜恣與此明出家之士奉為父母增益經云父母與一生補處菩薩等故應承事供養道經云若或有人能為父母多修齋供廣造真經讀誦受持教人遵奉當知是人及於父母承此果報即得長生給養自然心靈快樂孝行録云且如天降黃金林生紫筍並非常道不若治生或市井經營或田疇布種或日求升合或富有家資應思儉則有餘勤則不匱操持上味奉給雙親下品蔬食自供口腹又為修治寢室開豁軒窗熱則通風寒則貯火或捶背而理髮或設浴而授衣又宜選買紬綿多藏羅綺不厭盈箱之奉況當衣帛之年夏則薄涼冬則輕暖裁縫既畢奉獻尊親至如嘉果茗茶亦合常時奉養果能如是樂莫大焉恐或悖逆凶頑荒淫無度朝昏不顧甘旨全無致使爺娘悲愁哽噎甚者穿花踏柳走馬鬥雞一己浮遊二親飢餒根其原由是皆不能樂其養也諦觀如來昔為太子割肉奉養父母者豈不愧哉得道之後又以其道諭於父母亦非世人所能及也故圭峰云養則致其樂者儒則怡聲下氣溫清定省故有扇枕溫席之流釋則節量信毀分減衣鉢故有割肉充飢之類古規有在善法宜遵月虧卻許重圓親老無由再復養須致樂善看承和意怡顏侍寢興捧檄經年伸悅懌戲斑終日笑憑陵陸郎甘旨欣懷橘朱雋寧親喜販繒爭似如來全道力淨居忉利等間升大孝釋迦牟尼佛加持護命善門真言病則致其憂儀當演親病子亦病親安子亦安親之身即子之身也父母有病痛徹子身如此相知豈不憂也漢文帝口嘗湯藥庾沙彌身試艾針蔡順嘗吐士岩吮癰肩輿奉親設拜求藥十旬不解帶七旬不寢寐或賣身破産或禱鬼祈神燈點長明幡懸續命古人於此親病懷憂故目連白佛言世尊若未來世一切佛弟子救度現世父母可為爾否佛言我正欲説汝今復問善男子若比丘比丘尼國王太子大臣宰相三公百官萬民庶人行慈孝者皆先為所生現在父母以百味飯食施十方自恣僧願我父母壽命百年又藥師本願經云佛告阿難若帝后妃主儲君王子大臣輔相中宮綵女百官黎庶為病所苦及餘厄難亦應造立神幡燃燈續明放諸生命散雜色花燒衆名香病得除愈衆難解脫道經云或因父母疾病纏綿建立道場修崇道法其病即愈平復如常或因父母險厄囚繫惡鬼害身蟲獸為妖夢寐驚恐但能恭潔念道修齋退殄災殃消除魔鬼孝行録云忽爾雙親有疾猶如萬箭攢心自代無門宜求諸聖又念業通三世病起多端理宜色不滿容行不正履怒而不篤言而不聞曉夕憂勤左右扶策衣不解帶藥必先嘗淨洗唾壺躬安濁器縱逢瞋怒不退精勤或於塔寺祈禱或仗僧徒懺悔感蒙聖力冀得親安所以文王一飯武王亦一飯母氏不食符表亦不食良可鑒矣其或略無垂顧縱任沈疴荏苒因循遂致離別考之藏教謂之橫死既為人子安能忍哉根其原由是皆不能憂其病也觀夫忍辱太子敲骨出髓治父王病者豈不愧哉圭峰云病則致其憂者儒則武王不脫冠帶文王先嘗湯藥釋則太子以身為藥高僧以身為誓而世人以草木金石之藥療病是為極矣而不知以頭目髓腦之藥治病愈勝又如來能以法藥治其心病必置父母於無患之地究竟常樂矣然衆生身病不少誰知心病尤多身心之病能除佛法始知玄妙親病當知子負憂求醫問藥莫知休賣身破産終無吝設拜肩輿不用羞代死要為潛耀輩吮癰當作士岩儔更能仰叩真慈父天理爭教疾弗瘳喪則致其哀儀當演身之喪不如心之喪身之喪止於三年心之喪永劫在念故如來報親於纍劫大悲發願於前生況我凡夫敢忘喪制孝子當念父母初生我時憂懼萬端我臨父母之喪寧不哀慟遍觀上古誰不悲哀所以曾參七日不餐王延三年泣血守真哀毀骨立樊宏病不自支顏烏助土成墳董永貸錢助葬許孜悲號而鳥獸翔集王褒泣血而樹色慘悽方儲感白兔之祥蔡雍有連理之瑞梁武帝踐霜雪而傷嘆陸士衡痛慈景之先違偉哉真哀壯哉古哲如婆羅門女福德深厚諸天欽仰為母死亡哀號之甚禮覺華定自在王如來以資冥福忽聞空中有聲報曰聖女勿致悲泣我今示汝母之去處女曰是何神德寬我憂慮空中再報曰我是汝所瞻禮者覺華定自在王如來見汝憶母倍於常情衆生之分故來告汝又波斯匿王為太后崩泣不自勝揮淚而言世尊太后無常年在期頤無少壯力夙夜孝養未曾違忘命可贖者盡當持贖若以金銀城郭若以人民可以贖者盡當持贖佛言大王當知有四大恐畏無能避者云何為四老為大恐畏肌肉消盡病為大恐畏無強健志死為大恐畏盡無有壽恩愛別離為大恐畏哀號迷悶此四者不可以刀杖避即説偈言一切人歸死無有不死者隨行種禍福自獲善惡業地獄為惡行善者必生天明慧能分別唯福能遏禍又孝論云法雲在母之憂哀號殊甚飲食不入口纍日慧約之父母垂死皆號泣不能自存然佛教略彼喪制哭泣者蓋欲泯愛惡而趣清淨也苟愛惡之心未息尚留於物臨喪而弗哀亦人之安忍也律曰不展哀苦者亦道俗之同恥也堪嗟末俗忽略所生棺槨不施衣衾不舉聞樂而樂臨喪弗哀根其原由是皆不能哀其喪也諦觀釋迦親自舁棺人天為之哭泣目連見母不食哀號聲震三千者豈不愧哉圭峰云喪則致其哀者儒則武丁不言子臯泣血釋則目連大叫調御舁棺然世人能劈踴哭泣哀以送之終不知父母精神之所往我佛了知父母俱在天宮受生或破煙然或登實際衆若未明天眼不睹慈顏也須當克苦修行免使歷生辜負臨喪孝子具真哀劈踴號咷五內摧嘔血數升悲在膂忘餐七日淚橫腮目連大叫真賢者調御舁棺信善哉不向真乘消愛見從前感動總癡孩大孝釋迦牟尼佛加持花聚陀羅尼真言祭則致其嚴儀當演祭而不嚴如不祭能嚴於祭君子嚮之佛法未來三代謹嚴於祭佛法既至理宜改祭為齋齋祭雖同損益有異蓋祭具牲醴齋獻蘋蘩存歿有因禍福相倚故有扣冰魚躍泣竹筍生澗溪沼沚之毛蘋蘩蘊藻之菜筐筥錡釜之器潢汙行潦之水可以薦於鬼神可以饈於王公又云東鄰殺牛不如西鄰之礿祭此乃古人祭之嚴者也經云餓鬼好人各具五百而餓鬼家子孫歌舞好人家子孫啼哭或問世尊何爾如是耶佛言餓鬼家子孫為其作福當得解脫故乃歌舞好人家子孫為其殺害將受大苦故乃啼哭地藏本願經云大辨長者白地藏言南閻浮提衆生命終之後眷屬大小為修功德乃至設齋造衆善因是命終人得解脫否答言若有善男子善女人命終之後眷屬骨肉為修營齋及營齋之次米泔菜葉不棄於地乃至諸食未獻佛僧勿得先食如有違食及不精勤是命終人了不得力若能精勤七分之中亡者獲一六分功德生者自利道經云若復有人或為亡者七七修齋轉誦靈文以資魂識不歷塗毒便得生天孝德傳説孟宗母喪毀瘠致病母性嗜筍宗欲以筍祭即入竹園哀告天地乃得以祭傷嗟末法宗廟墮頽禮法崩壞衣冠不具齋祭不嚴根其原由是皆不能嚴其祭也諦觀如來示目連以方便令設盆供脫母氏一切餓鬼之苦者豈不羞哉圭峰云祭則致其嚴者儒則孟宗薦筍釋則目連餉飯故梁武懺云為亡人作福如餉遠人若人生天增益功德若在三途八難速令解脫蓋人之精神歷變化亘古今終不滅也如火之在薪薪雖盡而火曷嘗燼乎但恐其善惡之習淺深不同或升或墜亦自別耳正好以慧為炬以慈為舟冀不滯於昏衢得永超於苦海當思祭則致其嚴礿禘蒸嘗禮法兼明法唯欣陳簠簋克誠配享奉虀鹽休將大辨齋蔬棄須信青提鉢飯甜人哭鬼歌無用怪來昆善惡佛能占大孝釋迦牟尼佛化風遠被儀當演天下之有為者莫盛於生也吾資父母以生故先於父母者也孝子當念身從何來從父母來父從何來從祖父母來母從何來從外祖父母來又念伯父叔父舅氏之屬皆父之類也伯母叔母姑姨之屬皆母之類也推父母甘旨之心則無不供承推父母教令之心則無不隨順推父母醫藥之心則無不看侍推父母修行之心則無不勸助雖禮有先後事有通扃而愛敬之心皆如父母乃至兄弟姊妹甥姪子孫皆父母之支派也執勞運力仆妾之屬皆父母之使令也雖尊卑貴賤有殊而愛敬之心則一故得上下歡心以事父母古有聚族數百口同居數百年豈有他哉皆愛敬父母而及於宗族故也所以邵興榮八世共住封延伯三世同財至如尺布共之積年合爨牛馬相乳鴉鵲同巢此數者皆由內和故能外感又乃自愛其親施及一切者如彼男子在家女子在室上有慈父下有慈母勸以全功專修孝行此孝之根本也次又勸彼為孫者孝於祖父母為外孫者孝於外祖父母為養子者孝於所養父母為婦者孝於舅姑為壻者孝於妻之父母為仆妾者孝於主人此孝之枝葉也然皆不忘養育之恩一一孝於本生父母如枝葉不離本根也此則孝無不在而父母為宗若以此為宗則無施不可若孝子之事君也以孝道養君之心則為師臣以孝行行君之法則為大臣敬君而君亦敬其宗廟社稷則為社稷之臣愛君而君亦愛其黎民百姓則為天下之臣推色難之心則為良臣推幾諫之心則為直臣皆移忠之道也是故四海之內皆孝子四海之內皆忠臣若孝子之臨民也以孝道感民之心則不言而化以孝行為民之法則不令而威敬其民而不敢慢則民亦敬之如父愛其民而不敢傷而民亦愛之如母推事父母之善巧則可使為能吏推事父母之謹畏則可使為循吏治一國則一國之人孝治一鄉則一鄉之人孝傷夫人皆有親而鮮能養人皆有子而鮮能孝若有孝子能養其親則聞其名者無不讚嘆見其面者無不瞻仰觀其行者無不誠服仰其風者無不教化亦能振天地感鬼神則鬼神匡扶天地覆載自然禍亂不作災害不生五福聚於雙親百順流於九族風雨調順國家安寧者也所謂頭頭俱挺露物物盡瞻依淳風遠被化澆漓本固須知葉不衰三世同財財愈盛積年合爨爨常炊馬牛相乳和如此鴉鵲同巢義可知禍亂不生災害殄君臣父子太平時大孝釋迦牟尼佛加持莊嚴王陀羅尼真言歌讚孝行感驗儀當演聖人之道以善為用聖人之善以孝為端為善而不先其端無善也為道而不存其用無道也用所以驗道也端所以行善也行善而未見行乎父母能溥善乎驗道而不見驗乎父母能為道乎故知龍吟雲起虎嘯風生孝越常倫自然感應特標祥瑞警策人間不孝者自格其非行孝者愈堅其志今當標舉各冀稱揚大舜微時父母使浚井從而掩之出於東家井中蓋大孝之力能爾故神龍所護也郭巨掘地得黃金一釜上有文曰天賜孝子郭巨官不得奪人不得取劉殷夜夢西籬下有粟掘之得百石名曰七年粟賜孝子劉殷食七年方盡宋思禮母病思泉以大旱泉水皆涸思禮禱之泉忽湧於庭下日不乏汲薑詩母好飲江水詩因取水被溺而死後泉湧於舍傍味如江水徐績事母至孝雖赴試省圍亦須迎侍登第還家奉養不求仕進後朝廷聞其孝就命常為本州教授以從其志滕曇恭年五歲母患熱思寒瓜土俗所不産曇恭銜悲哀切俄有一沙門曰我有兩瓜分一相遺還以與母尋訪沙門莫知所在趙符制名君錫父老肌重上下馬難人莫能於扶持每朝會請謁君錫侍行則父體輕健人以為孝感蔡順拾椹赤黑二器盛之赤眉賊見而問之順曰黑者奉母赤者自食賊知其孝乃遺米而去徐州有孝婦以二器盛菜有老人問其故婦曰美菜供姑惡菜與子老人曰岡南有菜可以取之婦至岡南見菜生滿地古翂父為吏所陷罪當大辟翂乃登聞鼓求代父死武帝異之乃宥其父許坦年十歲隨父入山採藥父為猛獸所搏坦即號叫以杖擊之獸走父全太宗謂侍臣曰坦雖幼童能致命救親深可嘉尚乃授文林郎張元其祖喪目失明元請僧誦藥師經行道七日夜夢人曰三日後祖目必差已而果然解叔謙母有疾遂向夜於庭中稽顙祈禱聞空中語曰此病得丁公藤乃差求服之果愈鄭潛耀母寢疾刺血為書請於諸神乞以身代火盡而神許二字獨不化翌日母愈楊炎一門三世以孝行稱至門樹六闕古所未有王少玄父仕於郡西隋末為亂兵所害後欲求骨以葬時白骨滿野無由可辨乃刺血滲之旬日竟獲父骨何琦喪母泣血停柩在殯為鄰火所逼煙焰已及乃匍匐撫棺號哭俄而風止火息顏烏至孝父亡負土為墳群鳥銜土以助之口中血出遂名其縣為傷鳥縣宗乘父喪躬自負土作墳不久而成墳土自高五尺松竹自生吳隱之執喪過禮家貧無人助哭每哭之時常有雙鶴鳴叫也夏方遭疫癘父母等死者十三人方年十四夜則號哭晝則負土葬畢廬於墓側烏鳥猛獸馴繞其側王褒葬其父廬於墓傍墓前有數柏樹褒涕泣所著之樹樹色慘悴與餘樹不同梁文正父母俱卒文正恨不獲終養乃穿壙為門蹬道出入晨夕灑掃其中結廬墓側自是不言三十年其後有甘露降於塋樹之前白兔馴繞鄉人以為孝感所致元德秀喪母哀甚刺血繪佛之像書佛之經而史氏稱之李觀居父之憂刺血寫金剛般若遽有奇香發其舍郁然連日及之其鄰釋道丕母許氏初生如天童子其父歿於王事丕遂出家年二十往霍邑立草庵鳩工聚集白骨晝夜誦經祝曰我今志為人子豈無靈驗者乎未數日果有髑髏躍出于前丕遂抱持歸華陰是夜母夢夫歸明晨骨至亦可謂全孝也釋宗賾母陳氏師出家後常勸母持菩薩戒注想彌陀又令剪髮為出家僧於未終時夢見尼僧十餘輩相召母夢覺以告師師曰此乃往生之祥也言已母色變白至臨終時精神爽利倍於常日合掌向西端坐於念佛中忽然坐滅此亦全孝者也如近世孝感者今大丞相虞公有減臣之算增父之年事章達於上帝嘉其純孝遂著名於輔相籍中乃邛南劉浩然拜章之驗士大夫以此敬之孝感如前驗頗詳神明造物衛行藏白鳩標瑞棲其宇芝草呈祥挺在堂陳氏夢尼生淨土李公刺血發天香隆興丞相心詞妙天下人心好忖量大孝釋迦牟尼佛普勸大衆儀當演經題比丘某謹白大衆父母者形生之本人道之恩先聖後聖成道樹教未始不先於父母者也若父母在堂如佛住世應起難遭之想當生孝養之心此則居則致其敬養則致其樂也若父母即世如佛入滅應起報恩之想常生拔苦之心此則喪則致其哀祭則致其嚴也能如是者則孝子之事親終矣歷觀自古誰不尊崇是知父母之恩既比昊天之德涓塵之孝願酬河海之親凱風念吹棘之心南陔有採蘭之詠況乎花卉有重開之日蟾蜍見復滿之期惟有雙親無多歲月所以為臣者念報劉之日短為兒者樂事親之日多莊生有過隙之言孔聖動逝波之嘆故圭峰禪師通明二宗教典設教雖異事親則同上來一一敘陳大意篤於行孝然行孝者即報恩也報恩者即度脫也欲度脫者於此三事當須了知一者了知親有遠近二者了知恩有重輕三者了知報有分全且親有遠近者遠即多生父母近即今生父母恩輕重者今生父母恩德最重多生父母漸漸輕耳報有分全者但能侍養一生名之為分必能度脫多生名之為全又儒教所宗偏重於父謂人以形質為本傳體相續故取姓於父但數父祖以上乃為七世釋教所宗偏重於母謂人以性識為本形質是性識所依母是子身寄託之處故依母而生卻推此身以前乃為多生今此道場論行孝者等而非偏論報恩者全而非分故一切諸佛成道之時多生父母皆相會遇聞法獲益又佛告諸天言父母生子多有所益要當報恩過去諸佛所生父母先取涅槃皆自供養將來諸佛亦復如是只如沙彌羅比丘年始八歲入山修道證阿羅漢果以宿命通自知一神為五母作子自云我為第一母作子時我死之後母見鄰兒出入行步便念我子在時亦當行步是以悲泣我為第二母作子時天命夭折母見乳兒便念乳我亦復悲泣我為第三母作子時十歲復死我母飯時不得俱食亦復悲泣我為第四母作子時薄命先死母見鄰兒因媒娶婦悲念我故亦復悲泣我為第五母作子時年始七歲辭家學道我母追念亦復悲泣我見五母共會而泣我一魂神展轉作子使令五母啼哭發狂是故當知得宿命通能知五母又復推徵前世父母安可較量但學如來修出世因成等正覺如上父母方得度也若不爾者但務立身行道揚名後世實於父母無少利益故石壁鈔主云生前養育猶少益於尊親歿後蒸嘗殊不利於冥路但得揚虛名於後世徒負恩於生前若其親在三途不減分毫之苦想茲遠近虛事劬勞由是遲回故不為也伏望大衆深明此理印定自心直須捨短從長切勿務華去實君看五母哭彌羅憂海無風強起波定果色墮癡愛網金剛杵碎死生魔傷嗟棄本甘纏縛黽勉知恩好切蹉念念回光酬罔極流光催老急如梭大孝釋迦牟尼佛加持大寶樓閣真言歌讚下座止第二時回禮禮佛懺悔謹按報父母恩德經云佛告阿難我觀衆生雖霑人品心行愚蒙不思父母有大恩德棄恩背義晨去暮歸不知父母動止寒溫晦朔朝晡永乖扶持安床薦枕永不知聞參問起居悉皆斷絶父母年邁形貌衰羸羞恥見人瞋呵欺抑或復父孤母寡獨處空房猶如過客寓止宅屋妻子約束每事依從父母瞋呵全無畏懼或復是女婚嫁已畢遂萌不孝之心夫壻詬打忍受甘心父母微瞋反生怨恨自家骨肉卻以為疏異姓他宗情深眷重或處他邦異郡音信不通致使雙親肝腸寸斷阿難不孝之人身壞命終墮阿鼻獄其獄縱廣八千由旬四面鐵城其地亦鐵鐵為羅網熾火洞然猛烈焰爐雷奔電爍煬銅燒鐵流灌罪人銅狗鐵蛇恆吐煙焰炮燒煮炙支節燋然劍刃刀輪如雲如雨空中亂下或斫或刺苦罰罪人歷劫受殃無時間歇阿難若復有人為父母懺悔罪愆持齋持戒若能如是名曰孝子若不行此行者終是地獄之人禮云居處不莊非孝也事君不忠非孝也蒞官不敬非孝也朋友不信非孝也戰陳無勇非孝也又云五刑之屬三千其罪莫大於不孝是知我等於父母所多有過失未曾了知雖幸免於王刑恐難逃於地獄敢依大覺披露罪根仗法力以祛除獲慈風而蕩散如阿闍世王犯殺逆罪耆婆告言大王當知如是罪者除佛更無能除滅者又佛告舍利弗若人成就五無間罪及犯餘罪者應當於三十五佛前晝夜殷勤如法懺悔修齋會主某等皈依佛皈依法皈依僧然後禮拜懺悔罪咎比丘某謹白會衆今當禮佛直須珍重發報恩心願諸世尊當慈念我當證知我若我今生若我前生所作衆罪若自作若教他作見作隨喜一切罪障皆悉懺悔今依經文先皈三寶衆等志誠同伸皈依道場懺主與諸有情歸依佛兩足尊歸依法離欲尊歸依僧衆中尊歸依佛滅身業罪歸依法滅口業罪歸依僧滅意業罪歸依佛永不墮地獄歸依法永不墮餓鬼歸依僧永不墮傍生歸依佛法僧三寶禮三十五佛衆等同運志誠心誦普禮聖衆真言唵引薩哩嚩怛他誐多伴佐伴佐囉迦嚕彌志心皈命禮三身平等四智圓明大慈大悲釋迦牟尼佛金剛不壞佛寶光佛龍尊王佛精進軍佛伏願不違本誓鑒察丹衷除多生五逆之罪愆酬歷劫二親之罔極衆誦普禮聖衆真言唵薩哩嚩同前志心皈命禮三身平等四智圓明大慈大悲精進喜佛寶火佛寶月光佛現無愚佛寶月佛伏願不違本誓云云衆誦普禮聖衆真言唵薩哩嚩同前志心皈命禮三身平等四智圓明大慈大悲無垢佛離垢佛勇施佛清淨佛清淨施佛伏願不違本誓鑒察丹衷除多生五逆之罪愆酬歷劫二親之罔極衆誦普禮聖衆真言唵薩哩嚩怛他誐哆同前志心皈命禮三身平等四智圓明大慈大悲娑留那佛水天佛堅德佛旃檀功德佛無量掬光佛伏願不違本誓云云衆誦普禮聖衆真言唵薩哩嚩怛他誐哆同前志心皈命禮三身平等四智圓明大慈大悲光德佛無憂德佛那羅延佛功德華佛蓮華光遊戲神通佛伏願不違本誓云云衆誦普禮聖衆真言唵薩哩嚩云云志心皈命禮三身平等四智圓明大慈大悲財功德佛德念佛善名稱功德佛紅焰帝幢王佛善遊布功德佛伏願不違本誓云云衆誦普禮聖衆真言唵薩哩嚩云云志心皈命禮三身平等四智圓明大慈大悲鬥戰勝佛善遊步佛不空佛周匝莊嚴功德佛寶華遊布佛寶蓮華善住娑羅樹王佛法界藏身阿彌陀佛伏願不違本誓鑒察丹衷除多生五逆之罪愆酬歷劫之罔極誦普禮聖衆真言唵引薩哩嚩怛他誐多伴佐伴佐囉伽嚕彌惟願慈悲常攝受上來禮佛懺悔已遂周諧願我會衆此世來生三障罪業悉皆消滅若我前生若我餘生曾行布施或守淨戒或修淨行所有善根及無上智所有善根一切合集較計籌量及一切父母所有善根皆悉回向阿耨多羅三藐三菩提如三世佛所作回向我今回向亦復如是衆等志誠説偈回向衆罪皆懺悔諸佛盡隨喜及諸佛功德願成無上智去來現在佛於衆生最勝無量功德海我今皈命禮普懺罪菩薩摩訶薩加持滅五逆罪真言無邊惡業罪消滅庭際放生聞見覺知皆具本來佛性羽毛鱗甲莫非宿世所生倘精神之可來非耳目之可接都緣情想稍異遂致飛走各殊為慈鳥鸚鵡則不忘反哺之心為土梟破獍則終起殺親之想表示人間之順逆甄別孝子之是非善能了知不無教化況我如來慈力菩薩願力或為善性鹿王或作金毛獅子小雁銜哀則能使獵人釋放慈鳥垂泣亦令稻主敬從忍死者為願袈娑説偈者垂恩帝主此乃方便之力攝化之方汝等莫得而知無門而入我今仗佛神力陀羅尼力施主願力悉皆釋放欲令汝等各得逍遙佛報恩經云昔有一鴿為鷹所逐入舍利弗影顫懼不解移入佛影泰然無怖大海可移此鴿無動所以爾者佛大慈悲舍利弗無大慈悲佛習氣已盡舍利弗習氣未盡佛三阿僧祗劫修菩薩行舍利弗六十劫中修習苦行以是因緣怖與不怖其理別也孝論云聖人以精神乘變化而交為人畜恐世俗莫自覺也觀彼飛走之屬恐是昔時之父母正誡於殺為篤於懷親專諭於道恐陷其精神必令孝子好生惡殺之心慎終追遠之念且至大矣經云應生孝順心愛護一切衆生斯之謂也觀夫飛禽走獸水族遊鱗或挂羅網或拘籠檻或穿腮而反翼或繫足而倒懸將臨湯火之間欲赴砧刀之上憂愁恐懼變懾慞惶望雲漢以魂消憶林泉而膽碎雖知萬死猶冀一生顧眄哀鳴以求救濟是故盆經疏云能為父母三節放生謂歲終時夏滿時忌辰時隨力所及放諸生命始自一七之數乃至七七之數或至無量何其妙也是故沙彌救蟻流水濟魚覬禪師建立生池鄭昌圖焚燒網罟楊寶之療病雀韋丹之放神龜孔愈因一龜而封侯之享由二鯉而增算顏魯公作放生池碑則著有唐之盛德孟軻氏有聞其聲誡則信君子之能仁歷觀古人皆能此事今會主某為某正好開籠釋檻斷縛解懸施水焚香合掌咒願或法樂以津濟或祕咒以加持俾令世世生生不遭羅網內在在處處常居佛影中任去任來無罣無礙向下重伸偈句再為發明一念迷真失故鄉迷頭認影只顛狂前程不睹心花發日用唯專業識忙已陷羅網遭困厄忽蒙香火作津梁掉頭展翅何來去佛影彌綸自在翔加持放生陀羅尼真言歌讚附後再宣放生文按釋氏會要云昔者南海之濱有一枯樹五百蝙蝠穴聚其中有諸商人憩止樹下時屬寒洌聚集樵薪蘊火其中煙焰大熾枯樹忽焚時商人中有誦阿毗達磨藏彼諸蝙蝠雖為火焚愛好法音忍而不去於此命終隨業受生捨家修學乘聞法音並證聖果今脅目尊者招集五百應真作毗婆娑論斯並枯樹之中五百蝙蝠也又金光明經云爾時如來知是十千天子善根成熟即便與授菩提道記汝等天子於當來世過阿僧祗百千萬億那由他劫於是世界當成菩提同共一家一姓一號名曰青目優鉢羅華香山如來如是次第出現於世時有樹神即白佛言世尊是十千天子何因何緣修行何行勝妙善根便得受記佛言於過去世有一長者名曰流水遊行聚落見有一池其水枯涸於其池中有十千魚命將不復長者見已生大慈心以象負水救彼魚命復為宣説寶勝如來名號並解説十二因緣彼魚聞已同日命終生於天上佛言爾時流水長者即我身是今十千魚者即十千天子是由聞法故今於我所得受道記所以向下普為生命稱揚法樂伏冀薰成種智作遠因緣速超六道四生早證三明八解重將法語更濟有情自利利他重重無盡今欲宣揚聖號大衆志誠如法應和南無寶勝如來南無離怖畏如來南無廣博身如來南無妙色身如來南無多寶如來南無阿彌陀如來四大部經題目云云三乘四諦法皈依三寶上來放生功德已竟憑仗良因奉報四恩均資三有水陸含情同圓種智普念摩訶般若波羅密
